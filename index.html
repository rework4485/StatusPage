};
const SPECIAL_KEYS = new Set(["ioda-na-outages","radar-us-anomalies"]);
/* @routes-end */

// Build proxy URL using route key if available; unknown URLs fall back to direct fetch.
const PROXIES=_IS_DEPLOYED
  ?[u=>u, u=>{ const k=ROUTE_KEYS[u]; return k?`/proxy?svc=${k}`:undefined; }]
  :[u=>u];

async function fetchWithTimeout(url, timeout=15000){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(), timeout);
  try {
    return await fetch(url,{signal:controller.signal});
  } finally {
    clearTimeout(timer);
  }
}

async function getText(url){
  let err;
  for(const proxy of PROXIES){
    const proxyUrl=proxy(url);
    if(proxyUrl===undefined) continue; // this strategy has no proxy for this URL
    try {
      const r=await fetchWithTimeout(proxyUrl);
      if(!r.ok) throw new Error(String(r.status));
      return await r.text();
    } catch(e){ err=e; }
  }
  throw err;
}

async function getJson(url){
  const t=await getText(url);
  return JSON.parse(t.replace(/^﻿/,''));
}

function stripHtml(txt){
  return String(txt||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
}

function eventTimeValue(item){
  const candidates=[
    item?.updated_at,
    item?.created_at,
    item?.display_at,
    item?.started_at,
    item?.start,
    item?.start_time,
    item?.timestamp,
    item?.time,
    item?.date
  ];
  for(const value of candidates){
    if(value==null) continue;
    if(typeof value==='number' && Number.isFinite(value)) return value>1e12 ? value : value*1000;
    const parsed=Date.parse(String(value));
    if(Number.isFinite(parsed)) return parsed;
  }
  return 0;
}

function latestUpdateBody(event){
  const updates=[
    ...(Array.isArray(event?.incident_updates) ? event.incident_updates : []),
    ...(Array.isArray(event?.updates) ? event.updates : [])
  ];
  if(!updates.length) return '';
  updates.sort((a,b)=>eventTimeValue(a)-eventTimeValue(b));
  const latest=updates[updates.length-1] || {};
  return stripHtml(latest.body || latest.text || latest.description || latest.summary || '');
}

function latestUpdateRawText(event){
  const updates=[
    ...(Array.isArray(event?.incident_updates) ? event.incident_updates : []),
    ...(Array.isArray(event?.updates) ? event.updates : [])
  ];
  if(!updates.length) return '';
  updates.sort((a,b)=>eventTimeValue(a)-eventTimeValue(b));
  const latest=updates[updates.length-1] || {};
  return String(latest.text || latest.body || latest.description || latest.summary || '').trim();
}

function mostRecentEvent(events){
  if(!Array.isArray(events) || !events.length) return null;
  return [...events].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a))[0] || events[0];
}

function mk(name,ind,title,body,updated,url,labelOverride,labels=[]){
  return {name,ind,label:labelOverride||LABELS[ind]||'Unknown',title,body,updated,url,labels:Array.isArray(labels)?labels:[],fetchedAt:Date.now()};
}

function errSvc(s){
  return {name:s.name,ind:'unknown',label:'Stale / Unknown',title:'Cannot reach status API',body:'We are currently unable to reach the status API. Check the status page manually.',updated:'—',url:s.hu,fetchedAt:Date.now()};
}

function fmtFetchAge(fetchedAt){
  if(!fetchedAt) return '';
  const secs=Math.floor((Date.now()-fetchedAt)/1000);
  if(secs<5) return 'just now';
  if(secs<60) return secs+'s ago';
  const mins=Math.floor(secs/60);
  if(mins<60) return mins+'m ago';
  const hrs=Math.floor(mins/60);
  return hrs+'h ago';
}

const STALE_MS=5*60*1000; // 5 minutes

function adobeSeverityToIndicator(sev, impact){
  const value=String(sev || impact || '').toLowerCase().trim();
  if(!value || value==='none' || value==='na' || value==='n/a') return 'none';
  if(/maint|scheduled/.test(value)) return 'maintenance';
  if(/major|critical|sev1|sev2|outage|down/.test(value)) return 'major';
  if(/minor|degrad|partial|sev3|sev4|performance/.test(value)) return 'minor';
  return 'minor';
}

function isOpenAdobeStatus(status){
  const s=String(status||'').toLowerCase().trim();
  return !!s && !['closed','resolved','complete','completed','cancelled','canceled'].includes(s);
}

async function fetchOne(s){
  if(s.p==='adobe'){
    try {
      const [registry, events]=await Promise.all([getJson(s.su), getJson(s.iu)]);
      const ccEntry=Object.values(registry?.clouds||{}).find(c=>String(c?.name||'').toLowerCase()==='creative cloud');
      const ccId=ccEntry?.id;
      if(!ccId) return mk(s.name,'major','Adobe source format changed','Could not locate Creative Cloud in Adobe status registry.',new Date().toLocaleString(),s.hu);

      const active=[];
      const collectActive=(collection, kind)=>{
        Object.values(collection||{}).forEach(item=>{
          if(!item?.clouds || !(ccId in item.clouds)) return;
          const hist=item.history || {};
          const keys=Object.keys(hist).sort((a,b)=>Number(a)-Number(b));
          const last=keys.length ? hist[keys[keys.length-1]] : null;
          const status=last?.status || item.status;
          if(status && !isOpenAdobeStatus(status)) return;
          if(!status && !last) return;

          const ind=kind==='maintenance'
            ? 'maintenance'
            : adobeSeverityToIndicator(last?.severity || item.severity, last?.customerImpact || item.customerImpact);

          const title=item.headline || item.name || last?.shortDescription || last?.description || '';
          const body=stripHtml(last?.description || last?.message || '');
          const updatedEpoch=Number(keys[keys.length-1] || item.startedOn || 0);
          active.push({ind, title, body, updatedEpoch});
        });
      };

      collectActive(events?.incidentEvent?.incidents, 'incident');
      collectActive(events?.maintenanceEvent?.maintenance, 'maintenance');

      if(!active.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);

      active.sort((a,b)=>(PRI[a.ind]||9)-(PRI[b.ind]||9));
      const top=active[0];
      return mk(
        s.name,
        top.ind,
        top.title || (top.ind==='maintenance' ? 'Scheduled maintenance' : 'Active incident'),
        top.body,
        top.updatedEpoch ? new Date(top.updatedEpoch*1000).toLocaleString() : new Date().toLocaleString(),
        s.hu
      );
    } catch { return errSvc(s); }
  }

  if(s.p==='follett'){
    try {
      const d=await getJson(s.su);
      let ind='none';
      if(d.generalStatus==='issues') ind='minor';
      else if(d.generalStatus==='maintenance') ind='maintenance';
      else if(d.generalStatus && d.generalStatus!=='ok') ind='major';
      const msg=stripHtml(d.systemMessage||'');
      return mk(s.name,ind,msg?'Follett Announcement':'',msg,new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='statusio'){
    try {
      const h=await getText(s.su);
      let ind='none';
      const statusBarMatch=h.match(/id=["']statusbar_text["'][^>]*>([^<]+)/i);
      const statusBarText=(statusBarMatch?.[1]||'').toLowerCase();
      if(statusBarText){
        if(/all systems operational|operational/.test(statusBarText)) ind='none';
        else if(/maintenance/.test(statusBarText)) ind='maintenance';
        else if(/degraded|partial/.test(statusBarText)) ind='minor';
        else if(/outage|critical|down/.test(statusBarText)) ind='major';
      } else {
        const statusCode=h.match(/return\s+status\s*===\s*(\d+)/i);
        ind = statusCode ? (Number(statusCode[1])>=500 ? 'major' : Number(statusCode[1])>=300 ? 'minor' : Number(statusCode[1])===200 ? 'maintenance' : 'none') : 'none';
      }
      return mk(s.name,ind,'','',new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='duo'){
    try {
      const compMap={'operational':'none','degraded_performance':'minor','partial_outage':'minor','major_outage':'major','under_maintenance':'maintenance'};
      const [sd,id,cd]=await Promise.all([
        getJson(s.su),
        s.iu ? getJson(s.iu).catch(()=>({incidents:[]})) : Promise.resolve({incidents:[]}),
        s.cu ? getJson(s.cu).catch(()=>({components:[]})) : Promise.resolve({components:[]})
      ]);
      const updated=sd?.page?.updated_at ? new Date(sd.page.updated_at).toLocaleString() : new Date().toLocaleString();
      // Filter to only Duo Support and DUO72 components (case-insensitive)
      const watched=(cd?.components||[]).filter(c=>/duo support|duo72/i.test(c.name||''));
      let ind='none';
      if(watched.length){
        for(const c of watched){
          const ci=compMap[c.status]||'none';
          if((PRI[ci]||9)<(PRI[ind]||9)) ind=ci;
        }
      }
      // Also check active incidents that reference watched component IDs
      const watchedIds=new Set(watched.map(c=>c.id));
      const active=(id?.incidents||[]).filter(x=>{
        if(!['investigating','identified','monitoring'].includes((x.status||'').toLowerCase())) return false;
        // Include if no components listed (global) or if a watched component is affected
        if(!x.components?.length) return true;
        return x.components.some(c=>watchedIds.has(c.id));
      });
      let title='', body='';
      if(active.length){
        const sortedActive=[...active].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a));
        const a=sortedActive[0];
        if(ind==='none'){
          const impact=normalizeIndicator(a.impact||'none');
          if(impact!=='none') ind=impact;
        }
        title=a.name||'';
        let desc=latestUpdateBody(a);
        if(!desc) desc=stripHtml(a.description||'');
        body=desc;
      }
      return mk(s.name,ind,title,body,updated,s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='aws'){
    try {
      const rss=await getText(s.su);
      const items=parseAwsRssItems(rss)
        .filter(item=>isAwsNorthAmericaEvent({region_name:'', service_name:item.title, summary:item.description, description:item.description}))
        .filter(item=>isAwsRssItemFresh(item.pubDate));
      if(!items.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);

      const latest=items[0];
      const ind=awsRssItemToIndicator(latest);
      if(ind==='none') return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);

      const title=latest.title||'AWS Service Issue';
      const body=latest.description||'';
      const updated=latest.pubDate ? new Date(latest.pubDate).toLocaleString() : new Date().toLocaleString();
      return mk(s.name,ind,title,body,updated,s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='gcloud'){
    try {
      const incidents=await getJson(s.su);
      const active=(incidents||[]).filter(x=>!x.end);
      if(!active.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
      const top=mostRecentEvent(active) || active[0];
      const sev=top.severity||'low';
      const ind=/high|critical/.test(sev.toLowerCase()) ? 'major' : 'minor';
      const latestText=latestUpdateRawText(top)||top.external_desc||'';
      const formatted=formatGoogleWorkspaceMarkdown(latestText);
      const title=formatted.summary||top.service_name||'Google Cloud Incident';
      const body=formatted.body||stripHtml(top.external_desc||'');
      return mk(s.name,ind,title,body,new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='gworkspace'){
    try {
      const incidents=await getJson(s.su);
      // incidents.json is an array; active = no end date yet
      const active=(incidents||[]).filter(x=>!x.end);
      if(!active.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
      const hasHigh=active.some(x=>/high/i.test(x.severity||'')||/outage/i.test(x.status_impact||''));
      const ind=hasHigh ? 'major' : 'minor';
      const top=mostRecentEvent(active) || active[0];
      const latestText=latestUpdateRawText(top)||top.external_desc||'';
      const formatted=formatGoogleWorkspaceMarkdown(latestText);
      const title=formatted.summary||'Service Disruption';
      const affectedNames=active.map(x=>x.service_name||'').filter(Boolean).join(', ');
      const affectedLine=affectedNames ? `Affected: ${affectedNames}` : '';
      const body=[formatted.body, affectedLine].filter(Boolean).join('\n\n');
      return mk(s.name,ind,title,body,new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='azure'){
    try {
      const html=await getText(s.su);
      const americasTable=extractAzureAmericasTable(html);
      if(!americasTable){
        return mk(s.name,'unknown','Azure status format changed','Could not locate the Americas status table.',new Date().toLocaleString(),s.hu);
      }
      const {labels, impactedRows}=parseAzureAmericasStatus(americasTable);
      if(!labels.length){
        return mk(s.name,'unknown','Azure status format changed','No status labels found in the Americas table.',new Date().toLocaleString(),s.hu);
      }
      const hasCritical=labels.some(label=>/critical/i.test(label));
      const hasWarning=labels.some(label=>/warning|degraded|disrupted/i.test(label));
      if(!hasCritical && !hasWarning){
        return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
      }
      if(hasCritical||hasWarning){
        const ind=hasCritical ? 'major' : 'minor';
        const top=impactedRows[0];
        const severity=top?.labels?.find(label=>/critical|warning|degraded|disrupted/i.test(label));
        const title=top?.serviceName ? `${top.serviceName} (${severity||'Issue'})` : 'Americas Service Issue Detected';
        return mk(s.name,ind,title,'Monitoring Azure Americas status table only.',new Date().toLocaleString(),s.hu);
      }
      return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='mbta'){
    try{
      const data=await getJson(s.su);
      const now=Date.now();

      // Human-readable effect labels
      const EFFECT_LABEL={
        SUSPENSION:'Service Suspended',SHUTTLE:'Bus Shuttle in Effect',NO_SERVICE:'No Service',
        SIGNIFICANT_DELAYS:'Significant Delays',DELAY:'Delays',DETOUR:'Detour',
        STOP_CLOSURE:'Stop Closure',SERVICE_CHANGE:'Service Change',TRACK_CHANGE:'Track Change',
        EXTRA_SERVICE:'Extra Service',SCHEDULE_CHANGE:'Schedule Change',
      };
      const EFFECT_IND={
        SUSPENSION:'major',SHUTTLE:'major',NO_SERVICE:'major',
        SIGNIFICANT_DELAYS:'minor',DELAY:'minor',DETOUR:'minor',
        STOP_CLOSURE:'minor',SERVICE_CHANGE:'minor',TRACK_CHANGE:'minor',
      };
      const CAUSE_LABEL={
        CONSTRUCTION:'Construction',MAINTENANCE:'Maintenance',SPECIAL_EVENT:'Special Event',
        ACCIDENT:'Accident',WEATHER:'Weather',TRAFFIC:'Traffic',TECHNICAL_PROBLEM:'Technical Problem',
        STRIKE:'Strike',DEMONSTRATION:'Demonstration',MEDICAL_EMERGENCY:'Medical Emergency',
        POLICE_ACTIVITY:'Police Activity',POWER_PROBLEM:'Power Problem',
        SIGNAL_PROBLEM:'Signal Problem',SWITCH_PROBLEM:'Switch Problem',
        TRACK_PROBLEM:'Track Problem',VEHICLE_EQUIPMENT_PROBLEM:'Equipment Problem',
      };

      // Filter to active, lifecycle NEW/ONGOING alerts
      const alerts=(data?.data||[]).filter(a=>{
        const lc=(a.attributes?.lifecycle||'').toUpperCase();
        if(lc!=='NEW'&&lc!=='ONGOING') return false;
        // Check active_period — at least one period must overlap now
        const periods=a.attributes?.active_period||[];
        if(!periods.length) return true;
        return periods.some(p=>{
          const start=p.start?Date.parse(p.start):0;
          const end=p.end?Date.parse(p.end):Infinity;
          return start<=now&&now<=end;
        });
      });

      const serviceAlerts=alerts.filter(a=>{
        const sev=a.attributes?.severity||0;
        const eff=a.attributes?.effect||'';
        return sev>=3&&EFFECT_IND[eff]!=null;
      }).sort((a,b)=>(b.attributes?.severity||0)-(a.attributes?.severity||0));

      if(!serviceAlerts.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);

      const top=serviceAlerts[0];
      const attr=top.attributes||{};
      const eff=attr.effect||'';
      const ind=EFFECT_IND[eff]||'minor';
      const effectLabel=EFFECT_LABEL[eff]||eff.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
      const cause=attr.cause?CAUSE_LABEL[attr.cause]||null:null;
      const timeframe=attr.timeframe||null;

      // Build title: effect label + cause if meaningful
      const titleParts=[effectLabel];
      if(cause&&cause!=='Unknown') titleParts.push('('+cause+')');
      const title=titleParts.join(' ');

      // Build body: short header + timeframe + affected routes + additional alerts
      const parts=[];
      const shortHdr=attr.short_header||attr.header||'';
      if(shortHdr) parts.push(shortHdr);
      if(timeframe) parts.push('When: '+timeframe);

      // Affected route names from relationships
      const routeIds=(top.relationships?.routes?.data||[]).map(r=>r.id);
      if(routeIds.length){
        const routeNames=routeIds.map(id=>{
          if(id.includes('Providence')) return 'Providence/Stoughton';
          if(id.includes('NewBedford')) return 'New Bedford';
          if(id.includes('FallRiver')) return 'Fall River';
          return id.replace('CR-','').replace(/-/g,' ');
        });
        parts.push('Affected: '+routeNames.join(', '));
      }

      // Additional alerts summary
      if(serviceAlerts.length>1){
        const extras=serviceAlerts.slice(1).map(a=>{
          const aEff=a.attributes?.effect||'';
          return '• '+(EFFECT_LABEL[aEff]||aEff.replace(/_/g,' '))+
            (a.attributes?.short_header?' — '+a.attributes.short_header.substring(0,60):'');
        });
        parts.push(extras.join('\n'));
      }

      const body=parts.join('\n');
      const updated=new Date(attr.updated_at||now).toLocaleString();
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='cloudflare'){
    try {
      const [sd,id,cd,md]=await Promise.all([
        getJson(s.su),
        s.iu ? getJson(s.iu).catch(()=>({incidents:[]})) : Promise.resolve({incidents:[]}),
        s.cu ? getJson(s.cu).catch(()=>({components:[]})) : Promise.resolve({components:[]}),
        s.mu ? getJson(s.mu).catch(()=>({scheduled_maintenances:[]})) : Promise.resolve({scheduled_maintenances:[]})
      ]);
      let ind='none';
      const updated=sd?.page?.updated_at ? new Date(sd.page.updated_at).toLocaleString() : new Date().toLocaleString();

      const targetGroups=['north america','cloudflare sites and services'];
      const components=cd?.components||[];
      const targetGroupIds=new Set(
        components
          .filter(c=>c.group && targetGroups.includes(String(c.name||'').toLowerCase().trim()))
          .map(c=>c.id)
      );
      const northAmericaGroupId=components.find(c=>c.group && String(c.name||'').toLowerCase().trim()==='north america')?.id;
      const watched=components.filter(c=>targetGroupIds.has(c.id) || targetGroupIds.has(c.group_id));
      const watchedIds=new Set(watched.map(c=>c.id));
      const cloudflareComponentIndicator=(component)=>{
        const base=componentStatusToIndicator(component?.status);
        if(base==='none' || base==='maintenance' || base==='unknown') return base;
        const isNorthAmericaChild=!!northAmericaGroupId && component?.group_id===northAmericaGroupId;
        if(isNorthAmericaChild || hasRerouteSignal(component?.name, component?.description)) return 'rerouting';
        return base;
      };
      const affectedNorthAmerica=watched
        .filter(c=>c.group_id===northAmericaGroupId && cloudflareComponentIndicator(c)!=='none')
        .sort((a,b)=>((PRI[cloudflareComponentIndicator(a)]||9)-(PRI[cloudflareComponentIndicator(b)]||9)) || a.name.localeCompare(b.name));

      if(watched.length){
        const worst=watched.reduce((max,c)=>{
          const ci=cloudflareComponentIndicator(c);
          return (PRI[ci]||9) < (PRI[max]||9) ? ci : max;
        }, 'none');
        ind=worst;
      } else {
        ind=normalizeIndicator(sd?.status?.indicator||'none');
      }
      const hasReroutingComponents=watched.some(c=>cloudflareComponentIndicator(c)==='rerouting');

      const active=(id?.incidents||[]).filter(x=>{
        if(!['investigating','identified','monitoring'].includes((x.status||'').toLowerCase())) return false;
        if(!x.components?.length) return true;
        return x.components.some(c=>watchedIds.has(c.id));
      });
      const activeMaintenance=(md?.scheduled_maintenances||[]).filter(x=>{
        if(!['in_progress','verifying','monitoring'].includes((x.status||'').toLowerCase())) return false;
        if(!x.components?.length) return true;
        return x.components.some(c=>watchedIds.has(c.id));
      });

      let title='', body='', labelOverride='';
      let hasRerouteNotice=false;
      const extraStatuses=[];
      if(active.length){
        const sortedActive=[...active].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a));
        const a=sortedActive[0];
        if(ind==='none'){
          const impact=normalizeIndicator(a.impact||'none');
          if(impact!=='none') ind=impact;
        }
        const incidentSummaries=sortedActive.map(evt=>{
          let desc=latestUpdateBody(evt);
          if(!desc) desc=stripHtml(evt.description||'');
          return {name:evt.name||'Service Disruption', desc};
        });
        if(sortedActive.some(evt=>hasRerouteSignal(evt.name, evt.impact, evt.status, evt.description, latestUpdateBody(evt)))){
          hasRerouteNotice=true;
          if(ind==='minor') ind='none';
        }
        title=incidentSummaries[0].name;
        body=incidentSummaries[0].desc;
        if(incidentSummaries.length>1){
          const rest=incidentSummaries.slice(1).map(evt=>`• ${evt.name}${evt.desc ? ` — ${evt.desc}` : ''}`).join('\n');
          body=`${body ? `${body}\n\n` : ''}Additional active incidents:\n${rest}`;
        }
      }

      if(activeMaintenance.length){
        extraStatuses.push('Maintenance');
        const maintSummaries=[...activeMaintenance].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a)).map(evt=>{
          const desc=latestUpdateBody(evt) || stripHtml(evt.body || 'Cloudflare is performing ongoing maintenance.');
          return {name:evt.name||'Ongoing maintenance', desc};
        });
        if(ind!=='major') ind='maintenance';
        if(!title) title=maintSummaries[0].name;
        if(!body) body=maintSummaries[0].desc;
        const maintLines=maintSummaries.map(evt=>`• ${evt.name}${evt.desc ? ` — ${evt.desc}` : ''}`).join('\n');
        body=`${body ? `${body}\n\n` : ''}Active maintenance events:\n${maintLines}`;
      }

      if(affectedNorthAmerica.length){
        if(ind==='minor' && affectedNorthAmerica.every(c=>cloudflareComponentIndicator(c)==='minor') && hasRerouteSignal(title, body)){
          hasRerouteNotice=true;
          ind='none';
        }
        // Format DC names compactly: "CLT · Charlotte, NC" instead of full verbose name
        const fmtDc=n=>{
          const codeM=/\(([A-Z]{3,4})\)/.exec(n);
          const code=codeM?codeM[1]:'';
          const city=n.replace(/,?\s*[\w\s]+-\s*\([A-Z]{3,4}\)/,'').replace(/,\s*(United States|Canada|Mexico)$/i,'').trim();
          return code?`${code} · ${city}`:(city||n);
        };
        const n=affectedNorthAmerica.length;
        const numWord=['','one','two','three','four','five','six','seven','eight','nine','ten'];
        const nLabel=n<=10?numWord[n]:String(n);
        const dcList=affectedNorthAmerica.map(c=>`• ${fmtDc(c.name)}`).join('\n');
        if(!title){
          title=`Traffic re-routed at ${nLabel} Data Center${n===1?'':'s'} in North America`;
        }
        body=`${body?`${body}\n\n`:''}Affected Data Centers:\n${dcList}`;
      } else if(watched.length && ind!=='none' && !title){
        const topIssue=watched
          .filter(c=>cloudflareComponentIndicator(c)!=='none')
          .sort((a,b)=>((PRI[cloudflareComponentIndicator(a)]||9)-(PRI[cloudflareComponentIndicator(b)]||9)) || a.name.localeCompare(b.name))[0];
        if(topIssue){
          title=`${topIssue.name} is ${LABELS[cloudflareComponentIndicator(topIssue)]||'impacted'}`;
          body='Monitoring Cloudflare Sites and Services + North America categories only.';
          labelOverride=cloudflareStatusLabel(topIssue.status);
        }
      }
      if(ind==='rerouting'){
        hasRerouteNotice=true;
        ind='none';
      }
      if(!hasRerouteNotice && hasReroutingComponents && ind==='minor'){
        hasRerouteNotice=true;
      }
      if(!labelOverride && watched.length){
        const top=watched
          .filter(c=>componentStatusToIndicator(c.status)!=='none')
          .sort((a,b)=>((PRI[componentStatusToIndicator(a.status)]||9)-(PRI[componentStatusToIndicator(b.status)]||9)) || a.name.localeCompare(b.name))[0];
        if(top) labelOverride=cloudflareStatusLabel(top.status);
      }
      if(hasRerouteNotice){
        ind='rerouting';
        labelOverride='Operational';
        extraStatuses.push('Re-routed');
      }
      const statusLabels=[...new Set(extraStatuses.filter(Boolean))];
      return mk(s.name,ind,title,body,updated,s.hu,labelOverride,statusLabels);
    } catch { return errSvc(s); }
  }

  if(s.p==='oci'){
    try{
      const [st,comp]=await Promise.all([
        getJson(s.su),
        getJson(s.cu).catch(()=>null)
      ]);
      let ind=normalizeIndicator(st?.status?.indicator||'none');
      const updated=st?.page?.updated_at?new Date(st.page.updated_at).toLocaleString():new Date().toLocaleString();
      let title='',body='';
      if(comp){
        const naRegions=(comp.regionHealthReports||[]).filter(r=>r.geographicAreaName==='NAM');
        const affected=[];
        for(const region of naRegions)
          for(const svc of (region.serviceHealthReports||[]))
            if(svc.serviceStatus!=='NormalPerformance'&&(svc.incidents||[]).length)
              affected.push(svc.serviceName+' ('+region.regionCanonicalName+')');
        if(affected.length){
          if(ind==='none') ind='minor';
          title=affected.length+' North America service'+(affected.length>1?'s':'')+' affected';
          body=affected.slice(0,3).join('; ');
        }
      }
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='ibm'){
    try{
      const text=await getText(s.su);
      const doc=new DOMParser().parseFromString(text,'application/xml');
      const items=[...doc.querySelectorAll('item')];
      const cutoff=Date.now()-48*60*60*1000;
      const recent=items.filter(it=>{
        const pd=it.querySelector('pubDate')?.textContent;
        return pd?new Date(pd).getTime()>cutoff:true;
      });
      const active=recent.filter(it=>
        /incident|outage|degraded|disruption/i.test(it.querySelector('title')?.textContent||'')
      );
      const ind=active.length?'minor':'none';
      const title=active.length?(active[0].querySelector('title')?.textContent||''):'';
      const body=active.length?stripHtml(active[0].querySelector('description')?.textContent||'').slice(0,200):'';
      const updated=items[0]?.querySelector('pubDate')?.textContent
        ?new Date(items[0].querySelector('pubDate').textContent).toLocaleString()
        :new Date().toLocaleString();
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='apple'){
    try{
      const data=JSON.parse(await getText(s.su));
      const active=(data.services||[]).filter(sv=>
        (sv.events||[]).some(ev=>ev.eventStatus&&ev.eventStatus!=='resolved')
      );
      const ind=active.length?'minor':'none';
      const title=active.length?active.length+' service'+(active.length>1?'s':'')+' affected':'';
      const body=active.slice(0,3).map(sv=>sv.serviceName).join(', ');
      return mk(s.name,ind,title,body,new Date().toLocaleString(),s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='appledeveloper'){
    try{
      const raw=await getText(s.su);
      // API returns JSONP: jsonCallback({...}) — strip wrapper if present
      const jsonStr=/^\s*\w+\s*\(/.test(raw)?raw.replace(/^\s*\w+\s*\(/,'').replace(/\)\s*;?\s*$/,''):raw;
      const data=JSON.parse(jsonStr);
      // Support both old format (statusType field) and new format (events array)
      const active=(data.services||[]).filter(sv=>
        sv.statusType ? sv.statusType!=='' :
        (sv.events||[]).some(ev=>ev.eventStatus&&ev.eventStatus!=='resolved')
      );
      const isOutage=active.some(sv=>sv.statusType==='Outage'||(sv.events||[]).some(ev=>/outage/i.test(ev.eventStatus||'')));
      const ind=active.length?(isOutage?'major':'minor'):'none';
      const title=active.length?active.length+' service'+(active.length>1?'s':'')+' affected':'';
      const body=active.slice(0,3).map(sv=>sv.serviceName).join(', ');
      return mk(s.name,ind,title,body,new Date().toLocaleString(),s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='fastly'){
    try{
      const xml=await getText(s.su);
      const doc=new DOMParser().parseFromString(xml,'text/xml');
      const items=Array.from(doc.querySelectorAll('item'));
      const now=Date.now();
      // Include items from the past 7 days and up to 30 days ahead (upcoming maintenance)
      const relevant=items.filter(item=>{
        const pub=item.querySelector('pubDate')?.textContent;
        if(!pub) return false;
        const t=Date.parse(pub);
        return (now-t)<7*24*3600000 && (t-now)<30*24*3600000;
      }).filter(item=>{
        const t=(item.querySelector('title')?.textContent||'').toLowerCase();
        return !/\b(resolv|complet|restor|postmortem|ended)\b/i.test(t);
      });
      if(!relevant.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
      const latest=relevant[0];
      const title=latest.querySelector('title')?.textContent||'';
      // RSS <description> contains XML entity-encoded HTML; decode via innerHTML then extract text
      const _tmp=document.createElement('div');
      _tmp.innerHTML=latest.querySelector('description')?.textContent||'';
      const body=(_tmp.textContent||_tmp.innerText||'').replace(/\s+/g,' ').trim().slice(0,400);
      const tl=title.toLowerCase();
      let ind;
      if(/unavailable|outage|down\b/i.test(tl)) ind='major';
      else if(/degrad|investigat|identif|monitoring/i.test(tl)) ind='minor';
      else if(/re.?rout/i.test(tl)) ind='rerouting';
      else ind='maintenance'; // expansion, capacity, new DC, upcoming/scheduled maintenance, informational
      return mk(s.name,ind,title,body,new Date().toLocaleString(),s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='quad9'){
    // IATA codes of Quad9 PoPs in the United States
    const US_IATA=new Set(['ABQ','ANC','ATL','AUS','BNA','BOS','BUF','BWI','CLT','CMH','CVG','DAL','DCA','DEN','DFW','DSM','DTW','EWR','FLL','HNL','HOU','IAD','IAH','IND','JAX','JFK','KCI','LAS','LAX','LGA','LGB','LIT','MCO','MDW','MEM','MIA','MKE','MSP','MSY','OAK','OGG','OKC','OMA','ONT','ORD','ORF','PAO','PDX','PBI','PHL','PHX','PIT','RDU','RIC','RSW','SAT','SAN','SEA','SFO','SJC','SLC','SMF','SNA','SRQ','STL','TPA','TUL','TUS']);
    try{
      const [sd,id]=await Promise.all([
        getJson(s.su),
        s.iu ? getJson(s.iu).catch(()=>({incidents:[]})) : Promise.resolve({incidents:[]})
      ]);
      const updated=sd?.page?.updated_at ? new Date(sd.page.updated_at).toLocaleString() : new Date().toLocaleString();
      const active=(id?.incidents||[]).filter(x=>{
        if(!['investigating','identified','monitoring'].includes((x.status||'').toLowerCase())) return false;
        // Include: incidents with no IATA code (global/network-wide) and US-specific ones
        const m=/\(([A-Z]{3,4})\)/.exec(x.name||'');
        return !m || US_IATA.has(m[1]);
      });
      // If no US-relevant active incidents, report operational regardless of global indicator
      if(!active.length) return mk(s.name,'none','','',updated,s.hu);
      const a=mostRecentEvent(active)||active[0];
      const ind=normalizeIndicator(a.impact||'minor');
      const title=a.name||'';
      let body=latestUpdateBody(a);
      if(!body) body=stripHtml(a.description||'');
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }

  try {
    const [sd,id]=await Promise.all([
      getJson(s.su),
      s.iu ? getJson(s.iu).catch(()=>({incidents:[]})) : Promise.resolve({incidents:[]})
    ]);
    let ind=normalizeIndicator(sd?.status?.indicator||'none');
    const updated=sd?.page?.updated_at ? new Date(sd.page.updated_at).toLocaleString() : new Date().toLocaleString();
    const active=(id?.incidents||[]).filter(x=>['investigating','identified','monitoring'].includes((x.status||'').toLowerCase()));
    let title='', body='';
    if(active.length){
      const a=mostRecentEvent(active) || active[0];
      if(ind==='none'){
        const impact=normalizeIndicator(a.impact||'none');
        if(impact!=='none') ind=impact;
      }
      title=a.name||'';
      let desc=latestUpdateBody(a);
      if(!desc) desc=stripHtml(a.description||'');
      body=desc;
    }
    return mk(s.name,ind,title,body,updated,s.hu);
  } catch { return errSvc(s); }
}

function logoSources(svc){
  const sources=[];
  const companyDomain=LOGO_DOMAINS[svc.name] || '';
  let statusHost='';
  try { statusHost=new URL(svc.url||'').hostname; } catch(e) {}

  if(companyDomain){
    sources.push(`https://icons.duckduckgo.com/ip3/${companyDomain}.ico`);
    sources.push(`https://www.google.com/s2/favicons?domain=${encodeURIComponent(companyDomain)}&sz=64`);
  }
  if(statusHost){
    sources.push(`https://icons.duckduckgo.com/ip3/${statusHost}.ico`);
    sources.push(`https://www.google.com/s2/favicons?domain=${encodeURIComponent(statusHost)}&sz=64`);
  }
  return [...new Set(sources.filter(Boolean))];
}

function nextLogo(img){
  const sources=(img.dataset.sources||'').split('|').filter(Boolean);
  const idx=Number(img.dataset.idx||'0')+1;
  if(idx>=sources.length){
    img.style.display='none';
    if(img.nextElementSibling) img.nextElementSibling.style.display='inline';
    return;
  }
  img.dataset.idx=String(idx);
  img.src=sources[idx];
}

let _curFilter='all';
let _lastResults=[];
let _boardClockTimer=null,_boardLastUpdate=null;

function applyFilter(grid,filter){
  _curFilter=filter;
  grid.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.filter===filter));
  const test=el=>filter==='all'||(filter==='issues'?el.dataset.ind!=='none':el.dataset.ind===filter);
  grid.querySelectorAll('.card[data-ind]').forEach(el=>{ el.style.display=test(el)?'':'none'; });
  grid.querySelectorAll('.svc-row[data-ind]').forEach(el=>{ el.style.display=test(el)?'':'none'; });
  const issuesSec=grid.querySelector('.issues-section');
  if(issuesSec) issuesSec.style.display=[...issuesSec.querySelectorAll('.card')].some(c=>c.style.display!=='none')?'':'none';
  grid.querySelectorAll('.svc-cat-sec').forEach(sec=>{ sec.style.display=[...sec.querySelectorAll('.svc-row')].some(r=>r.style.display!=='none')?'':'none'; });
}

function renderServices(results){
  const grid=document.getElementById('services-grid');
  if(!grid) return;
  grid.innerHTML='';
  const loadEl=document.getElementById('loading-el');
  if(loadEl) loadEl.style.display='none';
  const sort=(arr)=>[...arr].sort((a,b)=>(PRI[a.ind]||9)-(PRI[b.ind]||9)||a.name.localeCompare(b.name));

  // ── Status summary banner ──────────────────────────────────────────────────
  const summary=document.getElementById('status-summary');
  if(summary){
    const total=results.length;
    const issueCount=results.filter(s=>s.ind!=='none'&&s.ind!=='unknown').length;
    const hasOutage=results.some(s=>s.ind==='major');
    const cls=hasOutage?'bad':issueCount>0?'warn':'ok';
    const msg=issueCount===0?'All Systems Operational':issueCount+' Issue'+(issueCount>1?'s':'')+' Detected';
    summary.className='status-summary show '+cls;
    summary.innerHTML=`<span>${msg}</span><span class="status-summary-count">${total} services monitored</span>`;
  }

  // ── Active Issues panel ────────────────────────────────────────────────────
  const activeIssues=sort(results.filter(s=>s.ind!=='none'&&s.ind!=='unknown'));
  if(activeIssues.length){
    const sec=document.createElement('div');
    sec.className='issues-section';
    const hdr=document.createElement('div');
    const hasOutageInActive=activeIssues.some(s=>s.ind==='major');
    hdr.className='issues-hdr'+(hasOutageInActive?' has-outage':'');
    hdr.innerHTML=`<span>Active Issues</span><span class="issues-hdr-count">${activeIssues.length} service${activeIssues.length!==1?'s':''} affected</span>`;
    sec.appendChild(hdr);
    const ig=document.createElement('div');
    ig.className='issues-grid';
    activeIssues.forEach(s=>ig.appendChild(mkIncCard(s)));
    sec.appendChild(ig);
    grid.appendChild(sec);
  }

  // ── Service directory ──────────────────────────────────────────────────────
  const dir=document.createElement('div');
  dir.className='svc-directory';

  // ── Search/filter bar ──────────────────────────────────────────────────────
  const searchWrap=document.createElement('div');
  searchWrap.className='svc-search-wrap';
  searchWrap.innerHTML=`<svg class="svc-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="search" class="svc-search" placeholder="Filter services…" autocomplete="off" spellcheck="false">`;
  dir.appendChild(searchWrap);
  const srch=searchWrap.querySelector('.svc-search');
  let _srchTimer=null;
  srch.addEventListener('input',()=>{
    clearTimeout(_srchTimer);
    _srchTimer=setTimeout(()=>{
      const q=srch.value.trim().toLowerCase();
      dir.querySelectorAll('.svc-cat-sec').forEach(sec=>{
        let any=false;
        sec.querySelectorAll('.svc-row').forEach(row=>{
          const match=!q||(row.dataset.svc||'').toLowerCase().includes(q);
          row.style.display=match?'':'none';
          if(match) any=true;
        });
        sec.style.display=any?'':'none';
        if(q&&any) sec.classList.remove('collapsed');
      });
    },150);
  });

  const addSection=(label,items,icon)=>{
    if(!items.length) return;
    const storageKey='svc-collapse-'+label.replace(/\W+/g,'-');
    const isCollapsed=localStorage.getItem(storageKey)==='1';
    const sec=document.createElement('div');
    sec.className='svc-cat-sec'+(isCollapsed?' collapsed':'');
    const issueCount=items.filter(s=>s.ind!=='none'&&s.ind!=='unknown').length;
    const hasOutage=items.some(s=>s.ind==='major');
    const badgeCls=hasOutage?'warn':issueCount>0?'warn':'ok';
    const badgeTxt=issueCount===0?'All clear':issueCount+' issue'+(issueCount!==1?'s':'');
    const hdr=document.createElement('div');
    hdr.className='svc-cat-hdr';
    hdr.innerHTML=`${icon||''}<span>${label}</span><span class="svc-cat-count">${items.length}</span><span class="svc-cat-badge ${badgeCls}">${badgeTxt}</span><svg class="svc-cat-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>`;
    hdr.addEventListener('click',()=>{
      const collapsed=sec.classList.toggle('collapsed');
      localStorage.setItem(storageKey,collapsed?'1':'0');
    });
    sec.appendChild(hdr);
    const tbl=document.createElement('div');
    tbl.className='svc-table';
    sort(items).forEach(s=>tbl.appendChild(mkSvcRow(s)));
    sec.appendChild(tbl);
    dir.appendChild(sec);
  };
  const appIcon=`<svg class="svc-cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`;
  const infraIcon=`<svg class="svc-cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6" stroke-width="3"/><line x1="6" y1="18" x2="6.01" y2="18" stroke-width="3"/></svg>`;
  const transitIcon=`<svg class="svc-cat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="13" rx="2"/><path d="M8 16v3m8-3v3M3 16h18"/><circle cx="8.5" cy="10" r="1.5"/><circle cx="15.5" cy="10" r="1.5"/><line x1="4" y1="7" x2="20" y2="7"/></svg>`;
  addSection('Applications & Platforms', results.filter(s=>s.cat==='app'), appIcon);
  addSection('Infrastructure', results.filter(s=>s.cat==='infra'), infraIcon);
  addSection('Transit', results.filter(s=>s.cat==='transit'), transitIcon);
  grid.appendChild(dir);

  // ── Filter bar ──────────────────────────────────────────────────────────────
  _lastResults=results;
  const issueN=results.filter(s=>s.ind!=='none'&&s.ind!=='unknown').length;
  const outageN=results.filter(s=>s.ind==='major').length;
  const degradedN=results.filter(s=>s.ind==='minor').length;
  const maintN=results.filter(s=>s.ind==='maintenance').length;
  // Reset stale filter if the filtered category is now empty
  if(_curFilter==='issues'&&issueN===0) _curFilter='all';
  else if(_curFilter!=='all'&&_curFilter!=='issues'&&!results.some(s=>s.ind===_curFilter)) _curFilter='all';
  const chipDefs=[
    {key:'all',label:`All (${results.length})`,cls:''},
    {key:'issues',label:`Issues (${issueN})`,cls:'',skip:issueN===0},
    {key:'major',label:`Outages (${outageN})`,cls:'fc-bad',skip:outageN===0},
    {key:'minor',label:`Degraded (${degradedN})`,cls:'fc-warn',skip:degradedN===0},
    {key:'maintenance',label:`Maintenance (${maintN})`,cls:'fc-maint',skip:maintN===0},
  ];
  const fb=document.createElement('div');
  fb.className='filter-bar';
  chipDefs.filter(c=>!c.skip).forEach(c=>{
    const btn=document.createElement('button');
    btn.className='filter-chip'+(c.cls?' '+c.cls:'')+(_curFilter===c.key?' active':'');
    btn.dataset.filter=c.key;
    btn.textContent=c.label;
    btn.addEventListener('click',()=>applyFilter(grid,c.key));
    fb.appendChild(btn);
  });
  grid.insertBefore(fb,grid.firstChild);
  if(_curFilter!=='all') applyFilter(grid,_curFilter);

  // Update board if active
  if(_boardModeActive) renderBoardView(results);
}

function renderBoardView(results){
  _boardLastUpdate=Date.now();
  let board=document.getElementById('tv-board');
  if(!board){
    board=document.createElement('div');
    board.id='tv-board';
    board.className='tv-board';
    document.body.appendChild(board);
  }
  const srt=(arr)=>[...arr].sort((a,b)=>(PRI[a.ind]||9)-(PRI[b.ind]||9)||a.name.localeCompare(b.name));
  const sorted=srt(results);
  const issueCount=results.filter(s=>s.ind!=='none'&&s.ind!=='unknown').length;
  const outageCount=results.filter(s=>s.ind==='major').length;
  const statusCls=outageCount>0?'bad':issueCount>0?'warn':'ok';

const svcCatMap=Object.fromEntries(SVCS.map(s=>[s.name, s.cat||'app']));
window._lastResults=window._lastResults||{};

async function init(){
  if(isRefreshing) return;
  setRefreshing(true);
  let results;
  try{
    results=await Promise.all(SVCS.map((s,i)=>new Promise(res=>setTimeout(()=>fetchOne(s).then(res).catch(()=>res(errSvc(s))),i*80))));
  }catch(e){
    refreshFailCount++;
    if(refreshFailCount>=2) setStale(true);
    setRefreshing(false);
    return;
  }
  refreshFailCount=0;
  lastSuccessfulRefresh=Date.now();
  setStale(false);
  setRefreshing(false);
  results.forEach(s=>{
    s.cat=svcCatMap[s.name]||'app';
    const prev=window._pi[s.name];
    if(prev && prev==='none' && (s.ind==='minor'||s.ind==='major')){
      queueAlert(s, s.ind==='major'?'outage':'degraded');
    }else if(prev && (prev==='minor'||prev==='major') && s.ind==='none'){
      queueAlert(s,'restored');
    }
    window._pi[s.name]=s.ind;
    window._lastResults[s.name]=s;
  });
  updateStats(results);
  updateIncidentPin(results);
  renderServices(results);
}

// Per-service background polling — only re-renders what changed
async function pollService(svc){
  try{
    const result=await fetchOne(svc);
    result.cat=svcCatMap[result.name]||'app';
    const prev=window._pi[result.name];
    const prevResult=window._lastResults[result.name];
    const changed=!prevResult||prev!==result.ind||prevResult.title!==result.title||prevResult.body!==result.body;
    if(changed){
      if(prev && prev==='none' && (result.ind==='minor'||result.ind==='major')) queueAlert(result, result.ind==='major'?'outage':'degraded');
      else if(prev && (prev==='minor'||prev==='major') && result.ind==='none') queueAlert(result,'restored');
      window._pi[result.name]=result.ind;
      window._lastResults[result.name]=result;
      // Full re-render: status change may move service between issues panel and directory
      const allResults=Object.values(window._lastResults);
      updateStats(allResults);
      updateIncidentPin(allResults);
      renderServices(allResults);
      lastSuccessfulRefresh=Date.now();
      setStale(false);
    }
  }catch(e){}
}

const _pollIntervals=[];
function startPerServicePolling(){
  // Clear any previously-registered intervals to prevent duplicates
  _pollIntervals.forEach(id=>clearInterval(id));
  _pollIntervals.length=0;
  SVCS.forEach((s,i)=>{
    // Stagger so they don't all hit simultaneously, spread over the 2-min window
    const offset=Math.round((i/SVCS.length)*110000)+5000;
    setTimeout(()=>{
      pollService(s);
      _pollIntervals.push(setInterval(()=>pollService(s), 120000));
    }, offset);
  });
}

let refreshInterval = null;
function scheduleRefresh(){
  clearInterval(refreshInterval);
  refreshInterval = setInterval(()=>{ if(refreshFailCount>=2) _startRefresh(); }, 30000);
}

function _startRefresh(){
  init();
}

// Direct browser fetch (no proxy) — required for IP/ISP/colo data so results
// reflect the *user's* connection, not the proxy server's.
// Falls back to proxy only if direct fetch fails (e.g. in unusual environments).
async function _netDirectText(url) {
  try {
    const r = await fetchWithTimeout(url, 12000);
    if (!r.ok && r.status !== 204) throw new Error(r.status);
    return await r.text();
  } catch(e) {
    // Fallback: try via proxy (data will reflect proxy location, not user)
    return getText(url);
  }
}
async function _netDirectJson(url) {
  const t = await _netDirectText(url);
  return JSON.parse(t.replace(/^\uFEFF/, ''));
}
// Proxy-only fetch for special server-side routes (IODA, Radar)
async function _netProxyJson(key) {
  if (!_IS_DEPLOYED) return null;
  const r = await fetchWithTimeout('/proxy?svc=' + key, 15000);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function measureLatency(url, count, noCors) {
  count = count || 5;
  const times = [];
  const baseOpts = noCors ? { mode: 'no-cors' } : {};
  for (let i = 0; i < count; i++) {
    const sep = url.includes('?') ? '&' : '?';
    const t = performance.now();
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 6000);
      await fetch(url + sep + '_t=' + Date.now(), { ...baseOpts, signal: ctrl.signal });
      clearTimeout(timer);
      times.push(performance.now() - t);
    } catch(e) {}
    if (i < count - 1) await new Promise(r => setTimeout(r, 80));
  }
  if (!times.length) return null;
  times.sort((a, b) => a - b);
  return {
    min: Math.round(times[0]),
    avg: Math.round(times.reduce((a, b) => a + b, 0) / times.length),
  };
}

function classifyResolver(ip) {
  if (!ip) return { isDoh: false, provider: 'Unknown' };
  for (const p of _DOH_PROVIDERS) {
    if (p.cidrs.some(c => ip.startsWith(c))) return { isDoh: true, provider: p.name };
  }
  return { isDoh: false, provider: 'ISP / Private DNS' };
}

async function detectDohResolver() {
  try {
    // edns.ip-api.com uses a unique random subdomain per request, forcing a fresh DNS lookup.
    // Their authoritative server records which resolver queried it and returns {"dns":{"ip":"...","geo":"..."}}.
    // Has Access-Control-Allow-Origin: * — works directly from browsers.
    // whoami.cloudflare returns NXDOMAIN; cloudflare-dns.com DoH always shows CF's own resolver IP.
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const r = await fetch('https://edns.ip-api.com/json', { signal: ctrl.signal });
    clearTimeout(timer);
    if (!r.ok) return null;
    const data = await r.json();
    const ip = data?.dns?.ip;
    if (!ip) return null;
    return { ip, geo: data.dns.geo || null };
  } catch(e) { return null; }
}

async function measureDownloadSpeed() {
  // 4 parallel streams to saturate high-bandwidth connections (TCP slow-start limits single connections)
  const STREAMS = 4;
  const SIZE = 10000000; // 10 MB per stream = 40 MB total
  const start = performance.now();
  try {
    const downloads = Array.from({length: STREAMS}, (_, i) =>
      fetchWithTimeout('https://speed.cloudflare.com/__down?bytes=' + SIZE + '&r=' + i, 45000)
        .then(r => r.arrayBuffer())
    );
    const buffers = await Promise.all(downloads);
    const elapsed = (performance.now() - start) / 1000;
    const totalBytes = buffers.reduce((s, b) => s + b.byteLength, 0);
    const mbps = (totalBytes * 8) / (elapsed * 1000000);
    return { mbps: Math.round(mbps * 10) / 10, elapsed: Math.round(elapsed * 10) / 10, bytes: totalBytes };
  } catch(e) { return null; }
}

  const loc = ip.city && ip.country ? esc(ip.city + ', ' + ip.country) : esc(ip.country || meta.city || '—');
  const asn = esc(meta.asn ? 'AS' + meta.asn : ip.as || '—');
  // navigator.connection.downlink is privacy-capped at 10 Mbps by browsers; omit to avoid misleading values.
  // Only show Data Saver which is reliable regardless of speed cap.
  const connSaveRow = (navConn && navConn.saveData) ? mkNetMetric('Data Saver', mkNetBadge('Enabled', 'warn')) : '';
  const connCard = mkNetMetricStack('Public IP', publicIp)
    + mkNetMetric('ISP', isp)
    + mkNetMetric('Location', loc)
    + mkNetMetric('ASN', asn)
    + (warp ? mkNetMetric('VPN / Tunnel', mkNetBadge('Cloudflare WARP', 'ok')) : '')
    + connSaveRow;

  // meta.colo is now a nested object {iata, lat, lon, cca2, region, city} from speed.cloudflare.com/meta
  const metaColo = (meta.colo && typeof meta.colo === 'object') ? meta.colo : null;
  const cfColo = esc(metaColo?.iata || (typeof meta.colo === 'string' ? meta.colo : null) || cf.colo || '—');
  const cfCity = esc(metaColo?.city || '—');
  const cfCountry = esc(metaColo?.cca2 || meta.country || cf.loc || '—');
  const cfHttpProto = esc(cf.http || meta.httpProtocol || '—');
  const httpBadge = /3/.test(cfHttpProto) ? mkNetBadge(cfHttpProto, 'ok') : mkNetBadge(cfHttpProto || '—', 'warn');
  const cfLatRow = cfLat ? mkNetMetric('Latency to CF Edge', cfLat.min + ' ms min · ' + cfLat.avg + ' ms avg') : mkNetMetric('Latency', '<span class="net-err">Unavailable</span>');
  const cfCard = mkNetMetric('Data Center', cfColo + ' · ' + cfCity)
    + mkNetMetric('Country', cfCountry)
    + mkNetMetric('HTTP Protocol', httpBadge)
    + cfLatRow;

  const tlsStr = esc(cf.tls || '—');
  const tlsBadge = cf.tls === 'TLSv1.3' ? mkNetBadge('TLS 1.3', 'ok')
    : cf.tls === 'TLSv1.2' ? mkNetBadge('TLS 1.2', 'warn')
    : cf.tls ? mkNetBadge(tlsStr, 'bad') : '<span class="net-err">—</span>';
  const h3Badge = /3/.test(cf.http || '') ? mkNetBadge('HTTP/3 (QUIC)', 'ok') : mkNetBadge('HTTP/2 only', 'warn');
  const ipv6Badge = (cf.ip || '').includes(':') ? mkNetBadge('IPv6', 'ok') : mkNetBadge('IPv4 only', 'muted');
  const warpBadge = warp ? mkNetBadge('Active', 'ok') : mkNetBadge('Off', 'muted');
  const protoCard = mkNetMetric('TLS Version', tlsBadge)
    + mkNetMetric('HTTP Version', h3Badge)
    + mkNetMetric('IP Protocol', ipv6Badge)
    + mkNetMetric('Cloudflare WARP', warpBadge);

  // resolverIp is {ip, geo} from edns.ip-api.com, or null on failure
  const resolverAddr = resolverIp?.ip || null;
  const resolverGeo  = resolverIp?.geo || null;  // e.g. "United States - Google LLC"
  const resolverClassification = classifyResolver(resolverAddr);
  // Use geo org from edns.ip-api.com when CIDR match doesn't identify the provider
  // (e.g. Google's recursive resolver may use 192.178.x.x, not 8.8.x.x)
  // edns.ip-api.com returns geo as "Country Name - Org Name" (full country, not 2-letter code)
  const geoOrg = resolverGeo
    ? (resolverGeo.includes(' - ') ? resolverGeo.split(' - ').slice(1).join(' - ').trim() : resolverGeo)
    : null;
  // Map verbose org names to short display names for badge
  const shortOrg = !geoOrg ? null
    : /cloudflare/i.test(geoOrg)               ? 'Cloudflare'
    : /\bgoogle\b/i.test(geoOrg)               ? 'Google'
    : /quad9/i.test(geoOrg)                    ? 'Quad9'
    : /nextdns/i.test(geoOrg)                  ? 'NextDNS'
    : /adguard/i.test(geoOrg)                  ? 'AdGuard'
    : /opendns|cisco umbrella/i.test(geoOrg)   ? 'OpenDNS'
    : geoOrg.replace(/,?\s*(Inc|LLC|Ltd|Corp|GmbH)\.?\s*$/i, '').trim();
  const knownPublicDns = /cloudflare|google|quad9|nextdns|adguard|opendns|cisco umbrella/i.test(geoOrg || '');
  const resolverProvider = resolverClassification.isDoh
    ? resolverClassification.provider
    : (shortOrg || resolverClassification.provider);
  const resolverDisplay = resolverAddr ? mkNetMetricStack('DNS Resolver IP', esc(resolverAddr)) : mkNetMetric('DNS Resolver IP', '<span class="net-err">Unavailable</span>');
  const pubDnsBadge = resolverAddr
    ? (knownPublicDns || resolverClassification.isDoh
        ? mkNetBadge(esc(resolverProvider), 'ok')
        : mkNetBadge(esc(resolverProvider || 'ISP / Private DNS'), 'muted'))
    : '<span class="net-err">Could not determine</span>';
  const dnsCard = resolverDisplay
    + mkNetMetric('Public DNS Provider', pubDnsBadge)
    + `<div class="net-note">Shows the recursive DNS resolver your browser used to look up this page. Public DNS providers (Cloudflare, Google, Quad9, etc.) offer privacy and filtering features.</div>`;

  const gLatCard = gLat
    ? mkNetMetric('Latency to Google', gLat.min + ' ms min · ' + gLat.avg + ' ms avg')
      + `<div class="net-note">Google uses Anycast BGP routing. Latency reflects your nearest Google PoP via dns.google.</div>`
    : `<div class="net-err" style="padding:10px 0">Unable to reach dns.google — may be blocked by network policy or CORS.</div>`;

  const speedCard = `<div class="net-note" style="margin:0 0 10px">Tests download speed via 4 parallel streams to Cloudflare's nearest edge. Uses ~40 MB of data.</div><button class="net-run-btn" id="net-speed-run-btn" type="button">▶ Run Speed Test</button>`;

  // ── Internet Health cards ──────────────────────────────────────────────────
  const DS_LABELS = {'ping-slash24':'Ping probes','bgp':'BGP routing','ucsd-nt':'Darknet'};

  let iodaCard;
  if (!iodaData) {
    iodaCard = `<div class="net-note" style="margin:0">Internet health data is only available when deployed (not in local mode).</div>`;
  } else if (iodaData._error) {
    iodaCard = `<div class="net-err">Unable to fetch IODA data — ${esc(iodaData._error)}</div>`;
  } else {
    // Response: { data: [{ location: "country/US", location_name: "United States", datasource, score }] }
    const events = Array.isArray(iodaData?.data) ? iodaData.data : [];
    if (!events.length) {
      iodaCard = mkNetMetric('Status', mkNetBadge('No anomalies detected', 'ok'))
        + `<div class="net-note">IODA monitors BGP routing and active probing across North America over the last 24 hours.</div>`;
    } else {
      // Group by country, keep highest-score event per country
      const byCountry = {};
      for (const e of events) {
        const code = (e.location || '').split('/')[1] || '??';
        if (!byCountry[code] || (e.score || 0) > (byCountry[code].score || 0)) {
          byCountry[code] = { ...e, _code: code };
        }
      }
      const entries = Object.values(byCountry).sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,5);
      iodaCard = entries.map(e => {
        const dsLabel = DS_LABELS[e.datasource] || e.datasource || 'anomaly';
        const name = e.location_name || e._code;
        return mkNetMetric(esc(name), mkNetBadge(esc(dsLabel), 'warn'));
      }).join('') + `<div class="net-note">Source: IODA (Georgia Tech) · Last 24 h · North America</div>`;
    }
  }

  let radarCard;
  if (radarData?.noToken) {
    radarCard = `<div class="net-note" style="margin:0">Add a <code>CF_RADAR_TOKEN</code> Worker secret to enable Cloudflare Radar traffic anomaly data.</div>`;
  } else if (!radarData || radarData._error) {
    radarCard = radarData?._error
      ? `<div class="net-err">Radar fetch failed — ${esc(radarData._error)}</div>`
      : `<div class="net-note" style="margin:0">Radar data is only available when deployed.</div>`;
  } else {
    const anomalies = radarData?.result?.trafficAnomalies || [];
    if (!anomalies.length) {
      radarCard = mkNetMetric('Status', mkNetBadge('No traffic anomalies', 'ok'))
        + `<div class="net-note">Cloudflare Radar monitors verified traffic anomalies for the US, Canada, and Mexico.</div>`;
    } else {
      radarCard = anomalies.slice(0,4).map(a => {
        const loc = esc(a.location || '—');
        const desc = a.description ? esc(a.description.slice(0,45) + (a.description.length>45?'…':'')) : 'anomaly';
        const date = a.startDate ? new Date(a.startDate).toLocaleDateString() : '';
        return mkNetMetric(loc + (date ? `<span class="net-metric-date"> · ${esc(date)}</span>` : ''), mkNetBadge(desc, 'warn'));
      }).join('') + `<div class="net-note">Source: Cloudflare Radar · Verified anomalies · US, CA, MX</div>`;
    }
  }

  const container = document.getElementById('net-diag-container');
  if (!container) return;
  container.innerHTML = [
    mkNetCard('nc-connection', _netIcons.wifi,   'Your Connection',   connCard),
    mkNetCard('nc-cf-edge',   _netIcons.cloud,   'Cloudflare Edge',   cfCard),
    mkNetCard('nc-protocol',  _netIcons.lock,    'Protocol Support',  protoCard),
    mkNetCard('nc-dns',       _netIcons.server,  'DNS Information',   dnsCard),
    mkNetCard('nc-google',    _netIcons.globe,   'Google Edge',       gLatCard),
    mkNetCard('nc-speed',     _netIcons.gauge,   'Speed Test',        speedCard),
    `<div class="net-section-hdr">Internet Health · North America</div>`,
    mkNetCard('nc-ioda',      _netIcons.signal,  'BGP &amp; Probe Anomalies', iodaCard),
    mkNetCard('nc-radar',     _netIcons.radar,   'Cloudflare Radar',  radarCard),
  ].join('');

  document.getElementById('net-speed-run-btn')?.addEventListener('click', runSpeedTest);
}

async function runNetworkDiag() {
  if (netDiagRunning) return;
  netDiagRunning = true;
  netDiagRan = true;

  const refreshBtn = document.getElementById('net-refresh-btn');
  if (refreshBtn) refreshBtn.disabled = true;

  const container = document.getElementById('net-diag-container');
  if (!container) { netDiagRunning = false; return; }

  // Show skeleton loading placeholders
  container.innerHTML = [
    mkNetCard('nc-connection', _netIcons.wifi,   'Your Connection',  mkShimmer()),
    mkNetCard('nc-cf-edge',   _netIcons.cloud,   'Cloudflare Edge',  mkShimmer()),
    mkNetCard('nc-protocol',  _netIcons.lock,    'Protocol Support', mkShimmer()),
    mkNetCard('nc-dns',       _netIcons.server,  'DNS Information',  mkShimmer()),
    mkNetCard('nc-google',    _netIcons.globe,   'Google Edge',      mkShimmer()),
    mkNetCard('nc-speed',     _netIcons.gauge,   'Speed Test',       mkShimmer()),
    `<div class="net-section-hdr">Internet Health · North America</div>`,
    mkNetCard('nc-ioda',      _netIcons.signal,  'BGP &amp; Probe Anomalies', mkShimmer()),
    mkNetCard('nc-radar',     _netIcons.radar,   'Cloudflare Radar', mkShimmer()),
  ].join('');

  const [cfTraceR, speedMetaR, ipInfoR, resolverIpR, cfLatR, gLatR, iodaR, radarR] = await Promise.allSettled([
    // Direct fetches — these endpoints support CORS and must bypass the proxy
    // so the returned IP/ISP/colo data reflects the *user's* connection, not the proxy server's.
    _netDirectText('https://cloudflare.com/cdn-cgi/trace').then(parseCFTrace),
    _netDirectJson('https://speed.cloudflare.com/meta'),
    // ip-api: direct-fetch only — proxy server IPs are blocked by ip-api as datacenter IPs.
    // Optional enrichment (city/country); failure is graceful since meta provides ISP/ASN.
    fetchWithTimeout('https://ip-api.com/json', 8000).then(r => r.ok ? r.json() : Promise.reject(r.status)).catch(() => ({})),
    // DoH resolver check — asks what DNS resolver Cloudflare sees
    detectDohResolver(),
    // Latency pings are already direct (fetchWithTimeout, no proxy)
    measureLatency('https://cloudflare.com/cdn-cgi/trace', 5),
    measureLatency('https://dns.google/generate_204', 5, true),
    // Internet health — server-side proxy routes (dynamic timestamps / auth)
    _netProxyJson('ioda-na-outages').catch(e => ({ _error: String(e) })),
    _netProxyJson('radar-us-anomalies').catch(e => ({ _error: String(e) })),
  ]);

  _renderNetCards(
    cfTraceR.value   || {},
    speedMetaR.value || {},
    ipInfoR.value    || {},
    resolverIpR.value || null,
    cfLatR.value     || null,
    gLatR.value      || null,
    iodaR.value      || null,
    radarR.value     || null
  );

  if (refreshBtn) refreshBtn.disabled = false;
  netDiagRunning = false;
}

async function runSpeedTest() {
  const btn = document.getElementById('net-speed-run-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Testing… (~40 MB, 4 streams)'; }

  const [speedResult, latResult] = await Promise.all([
    measureDownloadSpeed(),
    measureLatency('https://cloudflare.com/cdn-cgi/trace', 8),
  ]);

  const card = document.getElementById('nc-speed');
  if (!card) return;
  const body = card.querySelector('.net-card-hdr');
  // Remove everything after the header
  let next = body && body.nextSibling;
  while (next) { const tmp = next.nextSibling; next.parentNode.removeChild(next); next = tmp; }

  if (speedResult) {
    const pct = Math.min(speedResult.mbps / 1000, 1) * 100;
    const qual = speedResult.mbps > 50 ? 'ok' : speedResult.mbps > 10 ? 'warn' : 'bad';
    const latStr = latResult ? latResult.min + ' ms min · ' + latResult.avg + ' ms avg' : '—';
    const html = `<div class="net-speed-row"><span class="net-speed-val">${speedResult.mbps}</span><span class="net-speed-unit">Mbps ↓</span></div>`
      + `<div class="speed-bar"><div class="speed-bar-fill" style="width:${pct}%;background:${qual==='ok'?'var(--ok)':qual==='warn'?'var(--warn)':'var(--bad)'}"></div></div>`
      + mkNetMetric('RTT (CF Edge)', latStr)
      + mkNetMetric('Test Duration', speedResult.elapsed + 's')
      + `<button class="net-run-btn" id="net-speed-run-btn" type="button">▶ Re-run Speed Test</button>`;
    card.insertAdjacentHTML('beforeend', html);
  } else {
    card.insertAdjacentHTML('beforeend',
      `<div class="net-err">Speed test failed — check connection or try again.</div>`
      + `<button class="net-run-btn" id="net-speed-run-btn" type="button">▶ Re-run Speed Test</button>`);
  }
  document.getElementById('net-speed-run-btn')?.addEventListener('click', runSpeedTest);
}

// ─────────────────────────────────────────────────────────────────────────────

window.addEventListener('DOMContentLoaded',()=>{
  const testBtn=document.getElementById('test-alert-btn');
  if(testBtn) testBtn.addEventListener('click', runAlertTest);

  window.addEventListener('pointerdown', primeAudio, {once:true, passive:true});
  window.addEventListener('keydown', primeAudio, {once:true});

  // Tab navigation — auto-run diagnostics on first Network tab visit
  document.querySelectorAll('.nav-tab').forEach(t=>t.addEventListener('click',()=>{
    showView(t.dataset.view);
    if(t.dataset.view==='network' && !netDiagRan) runNetworkDiag();
  }));

  // Network refresh button
  document.getElementById('net-refresh-btn')?.addEventListener('click',()=>{
    netDiagRan=false;
    runNetworkDiag();
  });

  // Footer refresh button
  document.getElementById('f-refresh-btn')?.addEventListener('click',()=>{
    if(!isRefreshing) _startRefresh();
  });

  // Board mode — footer button and Escape to exit
  document.getElementById('f-board-btn')?.addEventListener('click',()=>{
    _boardModeActive=true;
    const url=new URL(window.location); url.searchParams.set('board','');
    window.history.replaceState({},'',url);
    if(_lastResults.length) renderBoardView(_lastResults);
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&_boardModeActive&&!e.defaultPrevented) exitBoardMode();
  });

  // Refresh data when the tab/window becomes visible again
  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden) return;
    const staleThreshold = 3 * 60 * 1000;
    if(!lastSuccessfulRefresh || Date.now() - lastSuccessfulRefresh > staleThreshold){
      _startRefresh();
    }
  });

  init().then(()=>startPerServicePolling());
  scheduleRefresh();

  window.addEventListener('beforeunload',()=>{
    _pollIntervals.forEach(id=>clearInterval(id));
    clearInterval(refreshInterval);
  });
});
</script>
</body>
