  "https://cloudflare.com/cdn-cgi/trace": "cf-trace",
  "https://speed.cloudflare.com/meta": "speed-meta",
  "https://ip-api.com/json": "ip-api",
  "https://cloudflare-dns.com/dns-query?name=whoami.cloudflare&type=TXT&ct=application/dns-json": "doh-cloudflare",
  "https://dns.google/generate_204": "google-204"
};
const SPECIAL_KEYS = new Set(["ioda-na-outages","radar-us-anomalies"]);
/* @routes-end */

// Build proxy URL using route key if available.
// On deployed origins, try proxy first to avoid browser-side CORS failures/noise.
// Unknown URLs still fall back to direct fetch.
const PROXIES=_IS_DEPLOYED
  ?[u=>{ const k=ROUTE_KEYS[u]; return k?`/proxy?svc=${k}`:undefined; }, u=>u]
  :[u=>u];

async function fetchWithTimeout(url, timeout=15000){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(), timeout);
  try {
    return await fetch(url,{signal:controller.signal});
  } finally {
    clearTimeout(timer);
  }
}

async function getText(url){
  let err;
  for(const proxy of PROXIES){
    const proxyUrl=proxy(url);
    if(proxyUrl===undefined) continue; // this strategy has no proxy for this URL
    try {
      const r=await fetchWithTimeout(proxyUrl);
      if(!r.ok) throw new Error(String(r.status));
      return await r.text();
    } catch(e){ err=e; }
  }
  throw err;
}

async function getJson(url){
  const t=await getText(url);
  return JSON.parse(t.replace(/^﻿/,''));
}

function stripHtml(txt){
  return String(txt||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
}

function eventTimeValue(item){
  const candidates=[
    item?.updated_at,
    item?.created_at,
    item?.display_at,
    item?.started_at,
    item?.start,
    item?.start_time,
    item?.timestamp,
    item?.time,
    item?.date
  ];
  for(const value of candidates){
    if(value==null) continue;
    if(typeof value==='number' && Number.isFinite(value)) return value>1e12 ? value : value*1000;
    const parsed=Date.parse(String(value));
    if(Number.isFinite(parsed)) return parsed;
  }
  return 0;
}

function latestUpdateBody(event){
  const updates=[
    ...(Array.isArray(event?.incident_updates) ? event.incident_updates : []),
    ...(Array.isArray(event?.updates) ? event.updates : [])
  ];
  if(!updates.length) return '';
  updates.sort((a,b)=>eventTimeValue(a)-eventTimeValue(b));
  const latest=updates[updates.length-1] || {};
  return stripHtml(latest.body || latest.text || latest.description || latest.summary || '');
}

function latestUpdateRawText(event){
  const updates=[
    ...(Array.isArray(event?.incident_updates) ? event.incident_updates : []),
    ...(Array.isArray(event?.updates) ? event.updates : [])
  ];
  if(!updates.length) return '';
  updates.sort((a,b)=>eventTimeValue(a)-eventTimeValue(b));
  const latest=updates[updates.length-1] || {};
  return String(latest.text || latest.body || latest.description || latest.summary || '').trim();
}

function mostRecentEvent(events){
  if(!Array.isArray(events) || !events.length) return null;
  return [...events].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a))[0] || events[0];
}

function mk(name,ind,title,body,updated,url,labelOverride,labels=[]){
  return {name,ind,label:labelOverride||LABELS[ind]||'Unknown',title,body,updated,url,labels:Array.isArray(labels)?labels:[],fetchedAt:Date.now()};
}

function errSvc(s){
  return {name:s.name,ind:'unknown',label:'Stale / Unknown',title:'Cannot reach status API',body:'We are currently unable to reach the status API. Check the status page manually.',updated:'—',url:s.hu,fetchedAt:Date.now()};
}

function fmtFetchAge(fetchedAt){
  if(!fetchedAt) return '';
  const secs=Math.floor((Date.now()-fetchedAt)/1000);
  if(secs<5) return 'just now';
  if(secs<60) return secs+'s ago';
  const mins=Math.floor(secs/60);
  if(mins<60) return mins+'m ago';
  const hrs=Math.floor(mins/60);
  return hrs+'h ago';
}

// Relative time for longer durations (last outage, footer update time)
function fmtRelTime(ts){
  const secs=Math.floor((Date.now()-ts)/1000);
  if(secs<60) return 'just now';
  if(secs<3600) return Math.floor(secs/60)+'m ago';
  if(secs<86400) return Math.floor(secs/3600)+'h ago';
  const days=Math.floor(secs/86400);
  if(days<14) return days+' day'+(days!==1?'s':'')+' ago';
  const weeks=Math.floor(days/7);
  if(weeks<8) return weeks+' week'+(weeks!==1?'s':'')+' ago';
  return Math.floor(days/30)+'mo ago';
}

const STALE_MS=5*60*1000; // 5 minutes

function adobeSeverityToIndicator(sev, impact){
  const value=String(sev || impact || '').toLowerCase().trim();
  if(!value || value==='none' || value==='na' || value==='n/a') return 'none';
  if(/maint|scheduled/.test(value)) return 'maintenance';
  if(/major|critical|sev1|sev2|outage|down/.test(value)) return 'major';
  if(/minor|degrad|partial|sev3|sev4|performance/.test(value)) return 'minor';
  return 'minor';
}

function isOpenAdobeStatus(status){
  const s=String(status||'').toLowerCase().trim();
  return !!s && !['closed','resolved','complete','completed','cancelled','canceled'].includes(s);
}

async function fetchOne(s){
  if(s.p==='adobe'){
    try {
      const [registry, events]=await Promise.all([getJson(s.su), getJson(s.iu)]);
      const ccEntry=Object.values(registry?.clouds||{}).find(c=>String(c?.name||'').toLowerCase()==='creative cloud');
      const ccId=ccEntry?.id;
      if(!ccId) return mk(s.name,'major','Adobe source format changed','Could not locate Creative Cloud in Adobe status registry.',new Date().toLocaleString(),s.hu);

      const active=[];
      const collectActive=(collection, kind)=>{
        Object.values(collection||{}).forEach(item=>{
          if(!item?.clouds || !(ccId in item.clouds)) return;
          const hist=item.history || {};
          const keys=Object.keys(hist).sort((a,b)=>Number(a)-Number(b));
          const last=keys.length ? hist[keys[keys.length-1]] : null;
          const status=last?.status || item.status;
          if(status && !isOpenAdobeStatus(status)) return;
          if(!status && !last) return;

          const ind=kind==='maintenance'
            ? 'maintenance'
            : adobeSeverityToIndicator(last?.severity || item.severity, last?.customerImpact || item.customerImpact);

          const title=item.headline || item.name || last?.shortDescription || last?.description || '';
          const body=stripHtml(last?.description || last?.message || '');
          const updatedEpoch=Number(keys[keys.length-1] || item.startedOn || 0);
          active.push({ind, title, body, updatedEpoch});
        });
      };

      collectActive(events?.incidentEvent?.incidents, 'incident');
      collectActive(events?.maintenanceEvent?.maintenance, 'maintenance');

      if(!active.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);

      active.sort((a,b)=>(PRI[a.ind]||9)-(PRI[b.ind]||9));
      const top=active[0];
      return mk(
        s.name,
        top.ind,
        top.title || (top.ind==='maintenance' ? 'Scheduled maintenance' : 'Active incident'),
        top.body,
        top.updatedEpoch ? new Date(top.updatedEpoch*1000).toLocaleString() : new Date().toLocaleString(),
        s.hu
      );
    } catch { return errSvc(s); }
  }

  if(s.p==='follett'){
    try {
      const d=await getJson(s.su);
      let ind='none';
      if(d.generalStatus==='issues') ind='minor';
      else if(d.generalStatus==='maintenance') ind='maintenance';
      else if(d.generalStatus && d.generalStatus!=='ok') ind='major';
      const msg=stripHtml(d.systemMessage||'');
      return mk(s.name,ind,msg?'Follett Announcement':'',msg,new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='statusio'){
    try {
      const h=await getText(s.su);
      let ind='none';
      const statusBarMatch=h.match(/id=["']statusbar_text["'][^>]*>([^<]+)/i);
      const statusBarText=(statusBarMatch?.[1]||'').toLowerCase();
      if(statusBarText){
        if(/all systems operational|operational/.test(statusBarText)) ind='none';
        else if(/maintenance/.test(statusBarText)) ind='maintenance';
        else if(/degraded|partial/.test(statusBarText)) ind='minor';
        else if(/outage|critical|down/.test(statusBarText)) ind='major';
      } else {
        const statusCode=h.match(/return\s+status\s*===\s*(\d+)/i);
        ind = statusCode ? (Number(statusCode[1])>=500 ? 'major' : Number(statusCode[1])>=300 ? 'minor' : Number(statusCode[1])===200 ? 'maintenance' : 'none') : 'none';
      }
      return mk(s.name,ind,'','',new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='duo'){
    try {
      const compMap={'operational':'none','degraded_performance':'minor','partial_outage':'minor','major_outage':'major','under_maintenance':'maintenance'};
      const sum=await getJson(s.su);
      const [sd,id,cd]=[sum,sum,sum];
      const updated=sd?.page?.updated_at ? new Date(sd.page.updated_at).toLocaleString() : new Date().toLocaleString();
      // Filter to only Duo Support and DUO72 components (case-insensitive)
      const watched=(cd?.components||[]).filter(c=>/duo support|duo72/i.test(c.name||''));
      let ind='none';
      if(watched.length){
        for(const c of watched){
          const ci=compMap[c.status]||'none';
          if((PRI[ci]||9)<(PRI[ind]||9)) ind=ci;
        }
      }
      // Also check active incidents that reference watched component IDs
      const watchedIds=new Set(watched.map(c=>c.id));
      const active=(id?.incidents||[]).filter(x=>{
        if(!['investigating','identified','monitoring'].includes((x.status||'').toLowerCase())) return false;
        // Include if no components listed (global) or if a watched component is affected
        if(!x.components?.length) return true;
        return x.components.some(c=>watchedIds.has(c.id));
      });
      let title='', body='';
      if(active.length){
        const sortedActive=[...active].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a));
        const a=sortedActive[0];
        if(ind==='none'){
          const impact=normalizeIndicator(a.impact||'none');
          if(impact!=='none') ind=impact;
        }
        title=a.name||'';
        let desc=latestUpdateBody(a);
        if(!desc) desc=stripHtml(a.description||'');
        body=desc;
      }
      return mk(s.name,ind,title,body,updated,s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='aws'){
    try {
      const rss=await getText(s.su);
      const items=parseAwsRssItems(rss)
        .filter(item=>isAwsNorthAmericaEvent({region_name:'', service_name:item.title, summary:item.description, description:item.description}))
        .filter(item=>isAwsRssItemFresh(item.pubDate));
      if(!items.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);

      const latest=items[0];
      const ind=awsRssItemToIndicator(latest);
      if(ind==='none') return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);

      const title=latest.title||'AWS Service Issue';
      const body=latest.description||'';
      const updated=latest.pubDate ? new Date(latest.pubDate).toLocaleString() : new Date().toLocaleString();
      return mk(s.name,ind,title,body,updated,s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='gcloud'){
    try {
      const incidents=await getJson(s.su);
      const active=(incidents||[]).filter(x=>!x.end);
      if(!active.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
      const top=mostRecentEvent(active) || active[0];
      const sev=top.severity||'low';
      const ind=/high|critical/.test(sev.toLowerCase()) ? 'major' : 'minor';
      const latestText=latestUpdateRawText(top)||top.external_desc||'';
      const formatted=formatGoogleWorkspaceMarkdown(latestText);
      const title=formatted.summary||top.service_name||'Google Cloud Incident';
      const body=formatted.body||stripHtml(top.external_desc||'');
      return mk(s.name,ind,title,body,new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='gworkspace'){
    try {
      const incidents=await getJson(s.su);
      // incidents.json is an array; active = no end date yet
      const active=(incidents||[]).filter(x=>!x.end);
      if(!active.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
      const hasHigh=active.some(x=>/high/i.test(x.severity||'')||/outage/i.test(x.status_impact||''));
      const ind=hasHigh ? 'major' : 'minor';
      const top=mostRecentEvent(active) || active[0];
      const latestText=latestUpdateRawText(top)||top.external_desc||'';
      const formatted=formatGoogleWorkspaceMarkdown(latestText);
      const title=formatted.summary||'Service Disruption';
      const affectedNames=active.map(x=>x.service_name||'').filter(Boolean).join(', ');
      const affectedLine=affectedNames ? `Affected: ${affectedNames}` : '';
      const body=[formatted.body, affectedLine].filter(Boolean).join('\n\n');
      return mk(s.name,ind,title,body,new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='azure'){
    try {
      const html=await getText(s.su);
      const americasTable=extractAzureAmericasTable(html);
      if(!americasTable){
        return mk(s.name,'unknown','Azure status format changed','Could not locate the Americas status table.',new Date().toLocaleString(),s.hu);
      }
      const {labels, impactedRows}=parseAzureAmericasStatus(americasTable);
      if(!labels.length){
        return mk(s.name,'unknown','Azure status format changed','No status labels found in the Americas table.',new Date().toLocaleString(),s.hu);
      }
      const hasCritical=labels.some(label=>/critical/i.test(label));
      const hasWarning=labels.some(label=>/warning|degraded|disrupted/i.test(label));
      if(!hasCritical && !hasWarning){
        return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
      }
      if(hasCritical||hasWarning){
        const ind=hasCritical ? 'major' : 'minor';
        const top=impactedRows[0];
        const severity=top?.labels?.find(label=>/critical|warning|degraded|disrupted/i.test(label));
        const title=top?.serviceName ? `${top.serviceName} (${severity||'Issue'})` : 'Americas Service Issue Detected';
        return mk(s.name,ind,title,'Monitoring Azure Americas status table only.',new Date().toLocaleString(),s.hu);
      }
      return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='mbta'){
    try{
      const data=await getJson(s.su);
      const now=Date.now();

      // Human-readable effect labels
      const EFFECT_LABEL={
        SUSPENSION:'Service Suspended',SHUTTLE:'Bus Shuttle in Effect',NO_SERVICE:'No Service',
        SIGNIFICANT_DELAYS:'Significant Delays',DELAY:'Delays',DETOUR:'Detour',
        STOP_CLOSURE:'Stop Closure',SERVICE_CHANGE:'Service Change',TRACK_CHANGE:'Track Change',
        EXTRA_SERVICE:'Extra Service',SCHEDULE_CHANGE:'Schedule Change',
        MODIFIED_SERVICE:'Modified Schedule',CANCELLATION:'Cancellation',
        SPECIAL_EVENT:'Special Event Schedule',
      };
      const EFFECT_IND={
        SUSPENSION:'major',SHUTTLE:'major',NO_SERVICE:'major',
        SIGNIFICANT_DELAYS:'minor',DELAY:'minor',DETOUR:'minor',
        STOP_CLOSURE:'minor',SERVICE_CHANGE:'minor',TRACK_CHANGE:'minor',
      };
      // Effects that indicate a schedule change (not a service disruption)
      const SCHED_EFFECTS=new Set(['SCHEDULE_CHANGE','MODIFIED_SERVICE','EXTRA_SERVICE','SPECIAL_EVENT','CANCELLATION']);
      const CAUSE_LABEL={
        CONSTRUCTION:'Construction',MAINTENANCE:'Maintenance',SPECIAL_EVENT:'Special Event',
        ACCIDENT:'Accident',WEATHER:'Weather',TRAFFIC:'Traffic',TECHNICAL_PROBLEM:'Technical Problem',
        STRIKE:'Strike',DEMONSTRATION:'Demonstration',MEDICAL_EMERGENCY:'Medical Emergency',
        POLICE_ACTIVITY:'Police Activity',POWER_PROBLEM:'Power Problem',
        SIGNAL_PROBLEM:'Signal Problem',SWITCH_PROBLEM:'Switch Problem',
        TRACK_PROBLEM:'Track Problem',VEHICLE_EQUIPMENT_PROBLEM:'Equipment Problem',
      };

      // Helper: check if an alert's active_period overlaps now (or upcoming within 4h)
      const isActiveOrUpcoming=(a,upcomingWindowMs=0)=>{
        const periods=a.attributes?.active_period||[];
        if(!periods.length) return true;
        return periods.some(p=>{
          const start=p.start?Date.parse(p.start):0;
          const end=p.end?Date.parse(p.end):Infinity;
          return start<=(now+upcomingWindowMs)&&now<=end;
        });
      };

      // Service disruption alerts: NEW/ONGOING, severity ≥3, known disruption effect
      const serviceAlerts=(data?.data||[]).filter(a=>{
        const lc=(a.attributes?.lifecycle||'').toUpperCase();
        if(lc!=='NEW'&&lc!=='ONGOING') return false;
        const sev=a.attributes?.severity||0;
        const eff=a.attributes?.effect||'';
        return sev>=3&&EFFECT_IND[eff]!=null&&isActiveOrUpcoming(a);
      }).sort((a,b)=>(b.attributes?.severity||0)-(a.attributes?.severity||0));

      // Schedule change alerts: NEW/ONGOING/UPCOMING, any severity, schedule-type effect
      const schedAlerts=(data?.data||[]).filter(a=>{
        const lc=(a.attributes?.lifecycle||'').toUpperCase();
        if(lc!=='NEW'&&lc!=='ONGOING'&&lc!=='UPCOMING') return false;
        const eff=a.attributes?.effect||'';
        return SCHED_EFFECTS.has(eff)&&isActiveOrUpcoming(a,4*3600*1000);
      }).sort((a,b)=>(b.attributes?.severity||0)-(a.attributes?.severity||0));

      if(!serviceAlerts.length&&!schedAlerts.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);

      // Helper: readable route names from alert relationships
      const routeNamesFor=(alert)=>{
        const ids=(alert.relationships?.routes?.data||[]).map(r=>r.id);
        return ids.map(id=>{
          if(id.includes('Providence')) return 'Providence/Stoughton';
          if(id.includes('NewBedford')) return 'New Bedford';
          if(id.includes('FallRiver')) return 'Fall River';
          return id.replace('CR-','').replace(/-/g,' ');
        });
      };

      // Schedule-only path: no service disruptions, only schedule changes
      if(!serviceAlerts.length){
        const topS=schedAlerts[0];
        const attrS=topS.attributes||{};
        const effS=attrS.effect||'';
        const lblS=EFFECT_LABEL[effS]||effS.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
        const causeS=attrS.cause?CAUSE_LABEL[attrS.cause]||null:null;
        const hdrS=attrS.short_header||attrS.header||'';
        const titleS=hdrS?trunc(hdrS,90):(lblS+(causeS?' ('+causeS+')':''));
        const partsS=[];
        if(attrS.timeframe) partsS.push('When: '+attrS.timeframe);
        const rns=routeNamesFor(topS);
        if(rns.length) partsS.push('Affected: '+rns.join(', '));
        if(schedAlerts.length>1){
          const extras=schedAlerts.slice(1).map(a=>{
            const aEff=a.attributes?.effect||'';
            const aHdr=a.attributes?.short_header||a.attributes?.header||'';
            return '• '+(EFFECT_LABEL[aEff]||aEff.replace(/_/g,' '))+(aHdr?' — '+trunc(aHdr,70):'');
          });
          partsS.push(extras.join('\n'));
        }
        const updatedS=new Date(attrS.updated_at||now).toLocaleString();
        return mk(s.name,'maintenance',titleS,partsS.join('\n'),updatedS,s.hu);
      }

      // Service disruption path
      const top=serviceAlerts[0];
      const attr=top.attributes||{};
      const eff=attr.effect||'';
      const ind=EFFECT_IND[eff]||'minor';
      const effectLabel=EFFECT_LABEL[eff]||eff.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
      const cause=attr.cause?CAUSE_LABEL[attr.cause]||null:null;
      const timeframe=attr.timeframe||null;

      // Build title: use short_header (specific) if available, otherwise effectLabel
      const shortHdr=attr.short_header||attr.header||'';
      const titleParts=[];
      if(shortHdr) titleParts.push(trunc(shortHdr,90));
      else { titleParts.push(effectLabel); if(cause&&cause!=='Unknown') titleParts.push('('+cause+')'); }
      const title=titleParts.join(' ');

      // Build body: timeframe + affected routes + additional alerts
      const parts=[];
      if(timeframe) parts.push('When: '+timeframe);
      const routeIds=routeNamesFor(top);
      if(routeIds.length) parts.push('Affected: '+routeIds.join(', '));

      // Additional service alerts — group same-effect into a count, show different effects individually
      if(serviceAlerts.length>1){
        const sameEff=serviceAlerts.slice(1).filter(a=>(a.attributes?.effect||'')===eff);
        const diffEff=serviceAlerts.slice(1).filter(a=>(a.attributes?.effect||'')!==eff);
        if(sameEff.length===1){
          const h=trunc(sameEff[0].attributes?.short_header||sameEff[0].attributes?.header||'',70);
          if(h) parts.push('• '+h);
        } else if(sameEff.length>1){
          parts.push('• '+sameEff.length+' additional '+effectLabel.toLowerCase()+'s');
        }
        diffEff.slice(0,2).forEach(a=>{
          const aEff=a.attributes?.effect||'';
          const aLbl=EFFECT_LABEL[aEff]||aEff.replace(/_/g,' ');
          const aH=trunc(a.attributes?.short_header||a.attributes?.header||'',70);
          parts.push('• '+aLbl+(aH?' — '+aH:''));
        });
      }

      // Append active schedule changes alongside service disruptions
      if(schedAlerts.length){
        const schedTop=schedAlerts[0];
        const sEff=schedTop.attributes?.effect||'';
        const sHdr=schedTop.attributes?.short_header||schedTop.attributes?.header||'';
        const sLbl=EFFECT_LABEL[sEff]||'Modified Schedule';
        parts.push('📅 '+sLbl+(sHdr?' — '+trunc(sHdr,70):''));
      }

      const body=parts.join('\n');
      const updated=new Date(attr.updated_at||now).toLocaleString();
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='cloudflare'){
    try {
      const sum=await getJson(s.su);
      const [sd,id,cd,md]=[sum,sum,sum,sum];
      let ind='none';
      const updated=sd?.page?.updated_at ? new Date(sd.page.updated_at).toLocaleString() : new Date().toLocaleString();

      const targetGroups=['north america','cloudflare sites and services'];
      const components=cd?.components||[];
      const targetGroupIds=new Set(
        components
          .filter(c=>c.group && targetGroups.includes(String(c.name||'').toLowerCase().trim()))
          .map(c=>c.id)
      );
      const northAmericaGroupId=components.find(c=>c.group && String(c.name||'').toLowerCase().trim()==='north america')?.id;
      const watched=components.filter(c=>targetGroupIds.has(c.id) || targetGroupIds.has(c.group_id));
      const watchedIds=new Set(watched.map(c=>c.id));
      const cloudflareComponentIndicator=(component)=>{
        const base=componentStatusToIndicator(component?.status);
        if(base==='none' || base==='maintenance' || base==='unknown') return base;
        const isNorthAmericaChild=!!northAmericaGroupId && component?.group_id===northAmericaGroupId;
        if(isNorthAmericaChild || hasRerouteSignal(component?.name, component?.description)) return 'rerouting';
        return base;
      };
      const affectedNorthAmerica=watched
        .filter(c=>c.group_id===northAmericaGroupId && cloudflareComponentIndicator(c)!=='none')
        .sort((a,b)=>((PRI[cloudflareComponentIndicator(a)]||9)-(PRI[cloudflareComponentIndicator(b)]||9)) || a.name.localeCompare(b.name));

      if(watched.length){
        const worst=watched.reduce((max,c)=>{
          const ci=cloudflareComponentIndicator(c);
          return (PRI[ci]||9) < (PRI[max]||9) ? ci : max;
        }, 'none');
        ind=worst;
      } else {
        ind=normalizeIndicator(sd?.status?.indicator||'none');
      }
      const hasReroutingComponents=watched.some(c=>cloudflareComponentIndicator(c)==='rerouting');

      const active=(id?.incidents||[]).filter(x=>{
        if(!['investigating','identified','monitoring'].includes((x.status||'').toLowerCase())) return false;
        if(!x.components?.length) return true;
        return x.components.some(c=>watchedIds.has(c.id));
      });
      const activeMaintenance=(md?.scheduled_maintenances||[]).filter(x=>{
        if(!['in_progress','verifying','monitoring'].includes((x.status||'').toLowerCase())) return false;
        if(!x.components?.length) return true;
        return x.components.some(c=>watchedIds.has(c.id));
      });

      let title='', body='', labelOverride='';
      let hasRerouteNotice=false;
      const extraStatuses=[];
      if(active.length){
        const sortedActive=[...active].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a));
        const a=sortedActive[0];
        if(ind==='none'){
          const impact=normalizeIndicator(a.impact||'none');
          if(impact!=='none') ind=impact;
        }
        const incidentSummaries=sortedActive.map(evt=>{
          let desc=latestUpdateBody(evt);
          if(!desc) desc=stripHtml(evt.description||'');
          return {name:evt.name||'Service Disruption', desc};
        });
        if(sortedActive.some(evt=>hasRerouteSignal(evt.name, evt.impact, evt.status, evt.description, latestUpdateBody(evt)))){
          hasRerouteNotice=true;
          if(ind==='minor') ind='none';
        }
        title=incidentSummaries[0].name;
        body=incidentSummaries[0].desc;
        if(incidentSummaries.length>1){
          const rest=incidentSummaries.slice(1).map(evt=>`• ${evt.name}${evt.desc ? ` — ${evt.desc}` : ''}`).join('\n');
          body=`${body ? `${body}\n\n` : ''}Additional active incidents:\n${rest}`;
        }
      }

      if(activeMaintenance.length){
        extraStatuses.push('Maintenance');
        const maintSummaries=[...activeMaintenance].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a)).map(evt=>{
          const desc=latestUpdateBody(evt) || stripHtml(evt.body || 'Cloudflare is performing ongoing maintenance.');
          return {name:evt.name||'Ongoing maintenance', desc};
        });
        if(ind!=='major') ind='maintenance';
        if(!title) title=maintSummaries[0].name;
        if(!body) body=maintSummaries[0].desc;
        const maintLines=maintSummaries.map(evt=>`• ${evt.name}${evt.desc ? ` — ${evt.desc}` : ''}`).join('\n');
        body=`${body ? `${body}\n\n` : ''}Active maintenance events:\n${maintLines}`;
      }

      if(affectedNorthAmerica.length){
        if(ind==='minor' && affectedNorthAmerica.every(c=>cloudflareComponentIndicator(c)==='minor') && hasRerouteSignal(title, body)){
          hasRerouteNotice=true;
          ind='none';
        }
        // Format DC names compactly: "CLT · Charlotte, NC" instead of full verbose name
        const fmtDc=n=>{
          const codeM=/\(([A-Z]{3,4})\)/.exec(n);
          const code=codeM?codeM[1]:'';
          const city=n.replace(/,?\s*[\w\s]+-\s*\([A-Z]{3,4}\)/,'').replace(/,\s*(United States|Canada|Mexico)$/i,'').trim();
          return code?`${code} · ${city}`:(city||n);
        };
        const n=affectedNorthAmerica.length;
        const numWord=['','one','two','three','four','five','six','seven','eight','nine','ten'];
        const nLabel=n<=10?numWord[n]:String(n);
        const dcList=affectedNorthAmerica.map(c=>`• ${fmtDc(c.name)}`).join('\n');
        if(!title){
          title=`Traffic re-routed at ${nLabel} Data Center${n===1?'':'s'} in North America`;
        }
        body=`${body?`${body}\n\n`:''}Affected Data Centers:\n${dcList}`;
      } else if(watched.length && ind!=='none' && !title){
        const topIssue=watched
          .filter(c=>cloudflareComponentIndicator(c)!=='none')
          .sort((a,b)=>((PRI[cloudflareComponentIndicator(a)]||9)-(PRI[cloudflareComponentIndicator(b)]||9)) || a.name.localeCompare(b.name))[0];
        if(topIssue){
          title=`${topIssue.name} is ${LABELS[cloudflareComponentIndicator(topIssue)]||'impacted'}`;
          body='Monitoring Cloudflare Sites and Services + North America categories only.';
          labelOverride=cloudflareStatusLabel(topIssue.status);
        }
      }
      if(ind==='rerouting'){
        hasRerouteNotice=true;
        ind='none';
      }
      if(!hasRerouteNotice && hasReroutingComponents && ind==='minor'){
        hasRerouteNotice=true;
      }
      if(!labelOverride && watched.length){
        const top=watched
          .filter(c=>componentStatusToIndicator(c.status)!=='none')
          .sort((a,b)=>((PRI[componentStatusToIndicator(a.status)]||9)-(PRI[componentStatusToIndicator(b.status)]||9)) || a.name.localeCompare(b.name))[0];
        if(top) labelOverride=cloudflareStatusLabel(top.status);
      }
      if(hasRerouteNotice){
        ind='rerouting';
        labelOverride='Operational';
        extraStatuses.push('Re-routed');
      }
      const statusLabels=[...new Set(extraStatuses.filter(Boolean))];
      return mk(s.name,ind,title,body,updated,s.hu,labelOverride,statusLabels);
    } catch { return errSvc(s); }
  }

  if(s.p==='oci'){
    try{
      const [st,comp]=await Promise.all([
        getJson(s.su),
        getJson(s.cu).catch(()=>null)
      ]);
      let ind=normalizeIndicator(st?.status?.indicator||'none');
      const updated=st?.page?.updated_at?new Date(st.page.updated_at).toLocaleString():new Date().toLocaleString();
      let title='',body='';
      if(comp){
        const naRegions=(comp.regionHealthReports||[]).filter(r=>r.geographicAreaName==='NAM');
        const affected=[];
        for(const region of naRegions)
          for(const svc of (region.serviceHealthReports||[]))
            if(svc.serviceStatus!=='NormalPerformance'&&(svc.incidents||[]).length)
              affected.push(svc.serviceName+' ('+region.regionCanonicalName+')');
        if(affected.length){
          if(ind==='none') ind='minor';
          title=affected.length+' North America service'+(affected.length>1?'s':'')+' affected';
          body=affected.slice(0,3).join('; ');
        }
      }
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='ibm'){
    try{
      const text=await getText(s.su);
      const doc=new DOMParser().parseFromString(text,'application/xml');
      const items=[...doc.querySelectorAll('item')];
      const cutoff=Date.now()-48*60*60*1000;
      const recent=items.filter(it=>{
        const pd=it.querySelector('pubDate')?.textContent;
        return pd?new Date(pd).getTime()>cutoff:true;
      });
      const active=recent.filter(it=>
        /incident|outage|degraded|disruption/i.test(it.querySelector('title')?.textContent||'')
      );
      const ind=active.length?'minor':'none';
      const title=active.length?(active[0].querySelector('title')?.textContent||''):'';
      const body=active.length?stripHtml(active[0].querySelector('description')?.textContent||'').slice(0,200):'';
      const updated=items[0]?.querySelector('pubDate')?.textContent
        ?new Date(items[0].querySelector('pubDate').textContent).toLocaleString()
        :new Date().toLocaleString();
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='apple'){
    try{
      const data=JSON.parse(await getText(s.su));
      const active=(data.services||[]).filter(sv=>
        (sv.events||[]).some(ev=>ev.eventStatus&&ev.eventStatus!=='resolved')
      );
      const ind=active.length?'minor':'none';
      const title=active.length?active.length+' service'+(active.length>1?'s':'')+' affected':'';
      const body=active.slice(0,3).map(sv=>sv.serviceName).join(', ');
      return mk(s.name,ind,title,body,new Date().toLocaleString(),s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='appledeveloper'){
    try{
      const raw=await getText(s.su);
      // API returns JSONP: jsonCallback({...}) — strip wrapper if present
      const jsonStr=/^\s*\w+\s*\(/.test(raw)?raw.replace(/^\s*\w+\s*\(/,'').replace(/\)\s*;?\s*$/,''):raw;
      const data=JSON.parse(jsonStr);
      // Support both old format (statusType field) and new format (events array)
      const active=(data.services||[]).filter(sv=>
        sv.statusType ? sv.statusType!=='' :
        (sv.events||[]).some(ev=>ev.eventStatus&&ev.eventStatus!=='resolved')
      );
      const isOutage=active.some(sv=>sv.statusType==='Outage'||(sv.events||[]).some(ev=>/outage/i.test(ev.eventStatus||'')));
      const ind=active.length?(isOutage?'major':'minor'):'none';
      const title=active.length?active.length+' service'+(active.length>1?'s':'')+' affected':'';
      const body=active.slice(0,3).map(sv=>sv.serviceName).join(', ');
      return mk(s.name,ind,title,body,new Date().toLocaleString(),s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='fastly'){
    try{
      const xml=await getText(s.su);
      const doc=new DOMParser().parseFromString(xml,'text/xml');
      const items=Array.from(doc.querySelectorAll('item'));
      const now=Date.now();
      // Include items from the past 7 days and up to 30 days ahead (upcoming maintenance)
      const relevant=items.filter(item=>{
        const pub=item.querySelector('pubDate')?.textContent;
        if(!pub) return false;
        const t=Date.parse(pub);
        return (now-t)<7*24*3600000 && (t-now)<30*24*3600000;
      }).filter(item=>{
        const t=(item.querySelector('title')?.textContent||'').toLowerCase();
        return !/\b(resolv|complet|restor|postmortem|ended)\b/i.test(t);
      });
      if(!relevant.length) return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
      const latest=relevant[0];
      const title=latest.querySelector('title')?.textContent||'';
      // RSS <description> contains XML entity-encoded HTML; decode via innerHTML then extract text
      const _tmp=document.createElement('div');
      _tmp.innerHTML=latest.querySelector('description')?.textContent||'';
      const body=(_tmp.textContent||_tmp.innerText||'').replace(/\s+/g,' ').trim().slice(0,400);
      const tl=title.toLowerCase();
      let ind;
      if(/unavailable|outage|down\b/i.test(tl)) ind='major';
      else if(/degrad|investigat|identif|monitoring/i.test(tl)) ind='minor';
      else if(/re.?rout/i.test(tl)) ind='rerouting';
      else ind='maintenance'; // expansion, capacity, new DC, upcoming/scheduled maintenance, informational
      return mk(s.name,ind,title,body,new Date().toLocaleString(),s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='quad9'){
    // IATA codes of Quad9 PoPs in the United States
    const US_IATA=new Set(['ABQ','ANC','ATL','AUS','BNA','BOS','BUF','BWI','CLT','CMH','CVG','DAL','DCA','DEN','DFW','DSM','DTW','EWR','FLL','HNL','HOU','IAD','IAH','IND','JAX','JFK','KCI','LAS','LAX','LGA','LGB','LIT','MCO','MDW','MEM','MIA','MKE','MSP','MSY','OAK','OGG','OKC','OMA','ONT','ORD','ORF','PAO','PDX','PBI','PHL','PHX','PIT','RDU','RIC','RSW','SAT','SAN','SEA','SFO','SJC','SLC','SMF','SNA','SRQ','STL','TPA','TUL','TUS']);
    try{
      const sum=await getJson(s.su);
      const [sd,id]=[sum,sum];
      const updated=sd?.page?.updated_at ? new Date(sd.page.updated_at).toLocaleString() : new Date().toLocaleString();
      const active=(id?.incidents||[]).filter(x=>{
        if(!['investigating','identified','monitoring'].includes((x.status||'').toLowerCase())) return false;
        // Include: incidents with no IATA code (global/network-wide) and US-specific ones
        const m=/\(([A-Z]{3,4})\)/.exec(x.name||'');
        return !m || US_IATA.has(m[1]);
      });
      // If no US-relevant active incidents, report operational regardless of global indicator
      if(!active.length) return mk(s.name,'none','','',updated,s.hu);
      const a=mostRecentEvent(active)||active[0];
      const ind=normalizeIndicator(a.impact||'minor');
      const title=a.name||'';
      let body=latestUpdateBody(a);
      if(!body) body=stripHtml(a.description||'');
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='iiq'){
    // Filter out incidents/maintenances that only affect the "User Integrations" component group
    // (third-party integrations managed by vendors, not by us)
    try{
      const sum=await getJson(s.su);
      const updated=sum?.page?.updated_at ? new Date(sum.page.updated_at).toLocaleString() : new Date().toLocaleString();
      const comps=sum?.components||[];
      // Find the "User Integrations" group component and collect all child component IDs
      const uiGroupId=comps.find(c=>c.group&&/user integrations?/i.test(c.name||''))?.id;
      const uiChildIds=new Set(
        uiGroupId ? comps.filter(c=>c.group_id===uiGroupId).map(c=>c.id) : []
      );
      const isOnlyUI=inc=>{
        const affected=(inc.components||[]).map(c=>c.id);
        return affected.length>0 && affected.every(id=>uiChildIds.has(id));
      };
      const activeStatuses=['investigating','identified','monitoring'];
      const active=(sum?.incidents||[]).filter(x=>activeStatuses.includes((x.status||'').toLowerCase())&&!isOnlyUI(x));
      const activeMaint=(sum?.scheduled_maintenances||[]).filter(x=>['in_progress','verifying'].includes((x.status||'').toLowerCase())&&!isOnlyUI(x));
      let ind=normalizeIndicator(sum?.status?.indicator||'none');
      let title='',body='';
      if(active.length){
        const a=mostRecentEvent(active)||active[0];
        if(ind==='none'){ const imp=normalizeIndicator(a.impact||'none'); if(imp!=='none') ind=imp; }
        title=a.name||'';
        let desc=latestUpdateBody(a); if(!desc) desc=stripHtml(a.description||'');
        body=desc;
      } else if(activeMaint.length){
        const a=activeMaint[0];
        ind='maintenance';
        title=a.name||'';
        let desc=latestUpdateBody(a); if(!desc) desc=stripHtml(a.description||'');
        body=desc;
      } else {
        // Only User-Integrations maintenance active — treat as operational
        ind='none';
      }
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }


  if(s.p==='mimecast'){
    // Mimecast — filter to US B Grid components only
    try{
      const sum=await getJson(s.su);
      const updated=sum?.page?.updated_at ? new Date(sum.page.updated_at).toLocaleString() : new Date().toLocaleString();
      const comps=sum?.components||[];
      // Find the "US B" grid group and its children
      const usBGroup=comps.find(c=>c.group&&/us.?b\b|united states.?b\b/i.test(c.name||''));
      const usBId=usBGroup?.id;
      const usBChildren=usBId?comps.filter(c=>c.group_id===usBId):comps.filter(c=>/us.?b/i.test(c.name||''));
      const watched=usBChildren.length?usBChildren:comps; // fallback to all if no US B found
      const watchedIds=new Set(watched.map(c=>c.id));
      const active=(sum?.incidents||[]).filter(x=>{
        if(!['investigating','identified','monitoring'].includes((x.status||'').toLowerCase())) return false;
        const affected=(x.components||[]).map(c=>c.id);
        return !affected.length||affected.some(id=>watchedIds.has(id));
      });
      const activeMaint=(sum?.scheduled_maintenances||[]).filter(x=>{
        if(!['in_progress','verifying'].includes((x.status||'').toLowerCase())) return false;
        const affected=(x.components||[]).map(c=>c.id);
        return !affected.length||affected.some(id=>watchedIds.has(id));
      });
      let ind=normalizeIndicator(sum?.status?.indicator||'none');
      // Override with component-level status
      const worstComp=watched.reduce((worst,c)=>{
        const ci=normalizeIndicator(c.status);
        return (PRI[ci]||9)<(PRI[worst]||9)?ci:worst;
      },'none');
      if(worstComp!=='none') ind=worstComp;
      let title='',body='';
      if(active.length){
        const a=mostRecentEvent(active)||active[0];
        title=a.name||'';
        let desc=latestUpdateBody(a); if(!desc) desc=stripHtml(a.description||'');
        body=desc;
        if(ind==='none'){ const imp=normalizeIndicator(a.impact||'none'); if(imp!=='none') ind=imp; }
      } else if(activeMaint.length){
        ind='maintenance'; title=activeMaint[0].name||'';
        let desc=latestUpdateBody(activeMaint[0]); if(!desc) desc=stripHtml(activeMaint[0].description||'');
        body=desc;
      }
      if(usBChildren.length&&!usBGroup) body=(body?body+'\n':'')+'(Monitoring US B Grid)';
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }

  if(s.p==='wasabi'){
    // Wasabi — filter to US region components
    try{
      const sum=await getJson(s.su);
      const updated=sum?.page?.updated_at ? new Date(sum.page.updated_at).toLocaleString() : new Date().toLocaleString();
      const comps=sum?.components||[];
      // US components: names containing "us-east", "us-west", "us-central" or parent group "US"
      const usGroupIds=new Set(comps.filter(c=>c.group&&/\bus\b|united states/i.test(c.name||'')).map(c=>c.id));
      const usComps=comps.filter(c=>usGroupIds.has(c.group_id)||/\bus-/i.test(c.name||'')||(c.group&&/\bus\b/i.test(c.name||'')));
      const watched=usComps.length?usComps:comps;
      const watchedIds=new Set(watched.map(c=>c.id));
      const active=(sum?.incidents||[]).filter(x=>{
        if(!['investigating','identified','monitoring'].includes((x.status||'').toLowerCase())) return false;
        const affected=(x.components||[]).map(c=>c.id);
        return !affected.length||affected.some(id=>watchedIds.has(id));
      });
      let ind='none';
      const worstComp=watched.reduce((worst,c)=>{const ci=normalizeIndicator(c.status);return (PRI[ci]||9)<(PRI[worst]||9)?ci:worst;},'none');
      if(worstComp!=='none') ind=worstComp;
      let title='',body='';
      if(active.length){
        const a=mostRecentEvent(active)||active[0];
        if(ind==='none'){ const imp=normalizeIndicator(a.impact||'none'); if(imp!=='none') ind=imp; }
        title=a.name||''; let desc=latestUpdateBody(a); if(!desc) desc=stripHtml(a.description||''); body=desc;
      } else if((sum?.scheduled_maintenances||[]).some(x=>['in_progress','verifying'].includes((x.status||'').toLowerCase()))){
        const m=(sum.scheduled_maintenances||[]).find(x=>['in_progress','verifying'].includes((x.status||'').toLowerCase()));
        ind='maintenance'; title=m.name||''; body=latestUpdateBody(m)||stripHtml(m.description||'');
      }
      return mk(s.name,ind,title,body,updated,s.hu);
    }catch{return errSvc(s);}
  }

  try {
    const sum=await getJson(s.su);
    const [sd,id]=[sum,sum];
    let ind=normalizeIndicator(sd?.status?.indicator||'none');
    const updated=sd?.page?.updated_at ? new Date(sd.page.updated_at).toLocaleString() : new Date().toLocaleString();
    const active=(id?.incidents||[]).filter(x=>['investigating','identified','monitoring'].includes((x.status||'').toLowerCase()));
    let title='', body='';
    if(active.length){
      const a=mostRecentEvent(active) || active[0];
      if(ind==='none'){
        const impact=normalizeIndicator(a.impact||'none');
        if(impact!=='none') ind=impact;
      }
      title=a.name||'';
      let desc=latestUpdateBody(a);
      if(!desc) desc=stripHtml(a.description||'');
      body=desc;
    }
    return mk(s.name,ind,title,body,updated,s.hu);
  } catch { return errSvc(s); }
}

const _logoCache=new Map();
function logoSources(svc){
  const key=svc.name+'|'+(svc.url||'');
  if(_logoCache.has(key)) return _logoCache.get(key);
  const sources=[];
  const companyDomain=LOGO_DOMAINS[svc.name] || '';
  let statusHost='';
  try { statusHost=new URL(svc.url||'').hostname; } catch(e) {}

  if(companyDomain){
    sources.push(`https://icons.duckduckgo.com/ip3/${companyDomain}.ico`);
    sources.push(`https://www.google.com/s2/favicons?domain=${encodeURIComponent(companyDomain)}&sz=64`);
  }
  if(statusHost){
    sources.push(`https://icons.duckduckgo.com/ip3/${statusHost}.ico`);
    sources.push(`https://www.google.com/s2/favicons?domain=${encodeURIComponent(statusHost)}&sz=64`);
  }
  const result=[...new Set(sources.filter(Boolean))];
  _logoCache.set(key,result);
  return result;
}

function _safeOpen(url){
  if(!url) return;
  try{ const u=new URL(url); if(u.protocol!=='https:'&&u.protocol!=='http:') return; }catch{ return; }
  window.open(url,'_blank','noopener,noreferrer');
}

function nextLogo(img){
  const sources=(img.dataset.sources||'').split('|').filter(Boolean);
  const idx=Number(img.dataset.idx||'0')+1;
  if(idx>=sources.length){
    img.style.display='none';
    if(img.nextElementSibling) img.nextElementSibling.style.display='inline';
    return;
  }
  img.dataset.idx=String(idx);
  img.src=sources[idx];
}

async function _fetchWeather(){
  if(_wxFetching) return;
  _wxFetching=true;
  try{
    let lat,lon,locName='';
    const cached=sessionStorage.getItem('_wx_coords');
    if(cached){try{const c=JSON.parse(cached);lat=c.lat;lon=c.lon;locName=c.name||'';}catch{}}
    if(!lat){
      // Prefer Cloudflare meta first (usually CORS-friendly from browsers).
      const meta=await fetchWithTimeout('https://speed.cloudflare.com/meta',8000).then(r=>r.ok?r.json():null).catch(()=>null);
      if(meta?.latitude&&meta?.longitude){
        lat=Number(meta.latitude);lon=Number(meta.longitude);
        locName=(meta.city||'')+(meta.region?', '+meta.region:'');
      } else {
        // Fallback via configured route/proxy strategy.
        const ipd=await getJson('https://ip-api.com/json').catch(()=>null);
        if(ipd?.lat){
          lat=ipd.lat;lon=ipd.lon;
          locName=(ipd.city||'')+(ipd.regionName?', '+ipd.regionName:'');
        }
      }
      if(lat&&lon) sessionStorage.setItem('_wx_coords',JSON.stringify({lat,lon,name:locName}));
    }
    if(!lat){_wxInfo={err:'Location unavailable'};_wxFetching=false;_renderWeather();return;}
    const pt=await fetchWithTimeout(`https://api.weather.gov/points/${lat.toFixed(4)},${lon.toFixed(4)}`,12000).then(r=>r.ok?r.json():null).catch(()=>null);
    if(!pt?.properties){_wxInfo={err:'NWS unavailable'};_wxFetching=false;_renderWeather();return;}
    const city=pt.properties.relativeLocation?.properties?.city||locName;
    const state=pt.properties.relativeLocation?.properties?.state||'';
    const loc=city+(state?' '+state:'');
    const forecastUrl=pt.properties.forecast;
    const [fR,aR]=await Promise.allSettled([
      fetchWithTimeout(forecastUrl,12000).then(r=>r.ok?r.json():null).catch(()=>null),
      fetchWithTimeout(`https://api.weather.gov/alerts/active?point=${lat.toFixed(4)},${lon.toFixed(4)}`,12000).then(r=>r.ok?r.json():null).catch(()=>null),
    ]);
    const period=fR.value?.properties?.periods?.[0];
    const alerts=(aR.value?.features||[]).filter(a=>/warning|watch|advisory/i.test(a.properties?.event||''));
    _wxInfo={loc,period,alerts,ts:Date.now()};
  }catch{_wxInfo={err:'Weather unavailable'};}
  _wxFetching=false;
  _renderWeather();
}

function _renderWeather(){
  const bar=document.getElementById('weather-bar');
  if(!bar) return;
  if(!_wxInfo||_wxInfo.err){bar.className='weather-bar';return;}
  const{loc,period,alerts}=_wxInfo;
  const temp=period?`${period.temperature}°${period.temperatureUnit||'F'}`:'';
  const cond=period?.shortForecast||'';
  const cStr=cond.substring(0,40);
  const icon=period?.isDaytime===false?'🌙':cond.match(/sunny|clear/i)?'☀️':cond.match(/cloud/i)?'⛅':cond.match(/rain|shower/i)?'🌧':cond.match(/snow/i)?'❄️':cond.match(/thunder|storm/i)?'⛈':'🌡';
  const sep='<span class="wx-sep">·</span>';
  let html=`<span class="wx-icon">${icon}</span>`;
  if(temp) html+=`<span class="wx-temp">${esc(temp)}</span>${sep}`;
  if(cStr) html+=`<span class="wx-cond">${esc(cStr)}</span>`;
  if(loc) html+=`${sep}<span class="wx-loc">${esc(loc)}</span>`;
  alerts.slice(0,2).forEach(a=>{
    const ev=a.properties?.event||'';
    const isMajor=/warning/i.test(ev);
    html+=`${sep}<span class="wx-alert${isMajor?' warn-major':''}">⚠ ${esc(ev)}</span>`;
  });
  if(_wxInfo.ts) html+=`<span class="wx-updated">${fmtFetchAge(_wxInfo.ts)} ago</span>`;
  bar.innerHTML=html;
  bar.className='weather-bar show';
  // Also update board weather bar if active
  _renderBoardWeatherBar();
}

function _renderBoardWeatherBar(){
  const bwb=document.getElementById('tv-wx-bar');
  if(!bwb) return;
  if(!_wxInfo||_wxInfo.err){bwb.style.display='none';return;}
  const{loc,period,alerts}=_wxInfo;
  const temp=period?`${period.temperature}°${period.temperatureUnit||'F'}`:'';
  const cond=period?.shortForecast||'';
  const cStr=cond.substring(0,50);
  const icon=period?.isDaytime===false?'🌙':cond.match(/sunny|clear/i)?'☀️':cond.match(/cloud/i)?'⛅':cond.match(/rain|shower/i)?'🌧':cond.match(/snow/i)?'❄️':cond.match(/thunder|storm/i)?'⛈':'🌡';
  const alertsHTML=alerts.slice(0,2).map(a=>{
    const ev=a.properties?.event||'';
    const isMajor=/warning/i.test(ev);
    return `<span class="tv-wx-alert-tag${isMajor?' wx-major':''}">&#9888; ${esc(ev)}</span>`;
  }).join('');
  bwb.innerHTML=`
    <div class="tv-wx-icon-big">${icon}</div>
    <div class="tv-wx-details-col">
      ${temp?`<div class="tv-wx-temp-big">${esc(temp)}</div>`:''}
      ${cStr?`<div class="tv-wx-cond">${esc(cStr)}</div>`:''}
      ${loc?`<div class="tv-wx-loc">${esc(loc)}</div>`:''}

}

function applyFilter(grid,filter){
  _curFilter=filter;
  grid.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active',c.dataset.filter===filter));
  const test=el=>filter==='all'||(filter==='issues'?el.dataset.ind!=='none'&&el.dataset.ind!=='unknown':el.dataset.ind===filter);
  grid.querySelectorAll('.card[data-ind]').forEach(el=>{ el.style.display=test(el)?'':'none'; });
  grid.querySelectorAll('.svc-row[data-ind]').forEach(el=>{ el.style.display=test(el)?'':'none'; });

  const issueN=chipBase.filter(s=>s.ind!=='none'&&s.ind!=='unknown').length;
  const outageN=chipBase.filter(s=>s.ind==='major').length;

let _boardResizeObs=null;
function _optimizeBoardLayout(){
  const board=document.getElementById('tv-board');
  if(!board) return;
  const tilesEl=document.getElementById('tv-tiles');
  if(!tilesEl) return;
  const issueEl=document.getElementById('tv-issue-tiles');
  const n=tilesEl.querySelectorAll('.tv-tile').length;
  const issueN=issueEl?issueEl.querySelectorAll('.tv-issue-tile').length:0;
  if(!n&&!issueN) return;
  const cs=getComputedStyle(board);
  const padH=parseFloat(cs.paddingLeft)+parseFloat(cs.paddingRight);
  const padV=parseFloat(cs.paddingTop)+parseFloat(cs.paddingBottom);
  const availW=board.clientWidth-padH;
  const hdrEl=board.querySelector('.tv-board-hdr');
  const infoEl=board.querySelector('.tv-info-row');
  const issueSecEl=board.querySelector('.tv-issues-section');
  const footEl=board.querySelector('.tv-board-footer');
  const gap=Math.max(8,Math.round(availW*0.007));
  // Layout issue tiles with a column count based on how many there are
  if(issueEl&&issueN>0){
    const issueCols=Math.min(issueN,Math.max(1,Math.min(4,issueN)));
    issueEl.style.gridTemplateColumns=`repeat(${issueCols},1fr)`;
    issueEl.style.gap=gap+'px';
  }
  // Calculate remaining height for normal tiles
  const used=(hdrEl?hdrEl.offsetHeight+gap:0)+
             (infoEl?infoEl.offsetHeight+gap:0)+
             (issueSecEl?issueSecEl.offsetHeight+gap:0)+
             (footEl?footEl.offsetHeight+gap:0);
  const availH=board.clientHeight-padV-used;
  if(!n) return;
  // Find optimal column count for normal service tiles
  const maxCols=Math.min(n,Math.max(4,Math.ceil(Math.sqrt(n*(availW/Math.max(availH,1))))));
  let bestCols=1,bestScore=-1;
  for(let c=1;c<=maxCols;c++){
    const r=Math.ceil(n/c);
    const tW=(availW-gap*(c-1))/c;
    const tH=(availH-gap*(r-1))/r;
    if(tH<50||tW<80) continue; // compact but still visible
    const score=tW*tH;
    if(score>bestScore){bestScore=score;bestCols=c;}
  }
  if(bestScore<0) bestCols=Math.max(1,Math.ceil(Math.sqrt(n)));
  const rows=Math.ceil(n/bestCols);
  tilesEl.style.gridTemplateColumns=`repeat(${bestCols},1fr)`;
  tilesEl.style.gridTemplateRows=`repeat(${rows},minmax(0,1fr))`;
  tilesEl.style.gridAutoRows=``;
  tilesEl.style.gap=gap+'px';
  const tileW=Math.floor((availW-gap*(bestCols-1))/bestCols);
  // Compact font sizes for subdued healthy tiles
  const nameFs=Math.max(9,Math.min(16,Math.floor(tileW/10)));
  const bodyFs=Math.max(8,Math.min(12,Math.floor(tileW/16)));
  const logoSz=Math.max(12,Math.min(22,Math.floor(nameFs*1.2)));
  tilesEl.querySelectorAll('.tv-tile-name').forEach(el=>el.style.fontSize=nameFs+'px');
  tilesEl.querySelectorAll('.tv-tile-badge,.tv-tile-title,.tv-tile-body,.tv-tile-inc').forEach(el=>el.style.fontSize=bodyFs+'px');
  tilesEl.querySelectorAll('.tv-tile-logo,.tv-tile-logo-fb').forEach(el=>{el.style.width=logoSz+'px';el.style.height=logoSz+'px';});
}

async function _fetchBoardNet(){
  if(_boardNetFetching) return;
  _boardNetFetching=true;
  const bar=document.getElementById('tv-net-bar');
  if(bar) bar.dataset.loading='1';
  try{
    const [cfR,metaR,latR,gLatR,resolverR]=await Promise.allSettled([
      _netDirectText('https://cloudflare.com/cdn-cgi/trace').then(parseCFTrace),
      _netDirectJson('https://speed.cloudflare.com/meta'),
      measureLatency('https://cloudflare.com/cdn-cgi/trace',3),
      measureLatency('https://dns.google/generate_204',3,true),
      detectDohResolver(),
    ]);
    _boardNetInfo={cf:cfR.value||{},meta:metaR.value||{},lat:latR.value||null,gLat:gLatR.value||null,resolver:resolverR.value||null,ts:Date.now()};
  }catch{
    _boardNetInfo={cf:{},meta:{},lat:null,gLat:null,resolver:null,ts:Date.now()};
  }
  _boardNetFetching=false;
  _renderBoardNetBar();
}

function _renderBoardNetBar(){
  const bar=document.getElementById('tv-net-bar');
  if(!bar) return;
  if(!_boardNetInfo){ bar.innerHTML='<span class="tv-net-lbl">Network</span> Loading…'; return; }
  const {cf,meta,lat,gLat,resolver,ts}=_boardNetInfo;
  const ip=cf.ip||'—';
  const isp=meta.asOrganization||'—';
  const metaColo=(meta.colo&&typeof meta.colo==='object')?meta.colo:null;
  const colo=metaColo?.iata||(typeof meta.colo==='string'?meta.colo:null)||cf.colo||'—';
  const city=metaColo?.city||'';
  const edgeStr=city?colo+' · '+city:colo;
  const latStr=lat?lat.min+' ms':null;
  const gLatStr=gLat?gLat.min+' ms':null;
  const http=cf.http||meta.httpProtocol||null;
  const tls=cf.tls||null;
  const isIPv6=(cf.ip||'').includes(':');
  const warp=cf.warp==='on';
  // DNS provider
  const resolverAddr=resolver?.ip||null;
  const resolverClass=resolverAddr?classifyResolver(resolverAddr):{isDoh:false,provider:''};
  const geoOrg=resolver?.geo?(resolver.geo.includes(' - ')?resolver.geo.split(' - ').slice(1).join(' - ').trim():resolver.geo):null;
  const dnsProvider=resolverClass.isDoh?resolverClass.provider:(geoOrg?geoOrg.replace(/,?\s*(Inc|LLC|Ltd|Corp|GmbH)\.?\s*$/i,'').trim():null);
  const sep=`<span class="tv-net-sep">·</span>`;
  const parts=[
    `<span class="tv-net-item"><span class="tv-net-lbl">IP</span>${esc(ip)}</span>`,
    `<span class="tv-net-item"><span class="tv-net-lbl">ISP</span>${esc(isp)}</span>`,
    `<span class="tv-net-item"><span class="tv-net-lbl">CF Edge</span>${esc(edgeStr)}</span>`,
    latStr?`<span class="tv-net-item"><span class="tv-net-lbl">RTT CF</span>${esc(latStr)}</span>`:'',
    gLatStr?`<span class="tv-net-item"><span class="tv-net-lbl">RTT Google</span>${esc(gLatStr)}</span>`:'',
    http?`<span class="tv-net-item"><span class="tv-net-lbl">Proto</span><span class="${/3/.test(http)?'tv-net-ok':'tv-net-warn'}">${esc(http)}</span></span>`:'',
    tls?`<span class="tv-net-item"><span class="tv-net-lbl">TLS</span><span class="${tls==='TLSv1.3'?'tv-net-ok':''}">${esc(tls)}</span></span>`:'',
    `<span class="tv-net-item"><span class="${isIPv6?'tv-net-ok':''}">${isIPv6?'IPv6':'IPv4'}</span></span>`,
    dnsProvider?`<span class="tv-net-item"><span class="tv-net-lbl">DNS</span>${esc(dnsProvider)}</span>`:'',
    warp?`<span class="tv-net-item tv-net-ok">WARP</span>`:'',
    ts?`<span class="tv-net-ts">net updated ${fmtFetchAge(ts)}</span>`:'',
  ].filter(Boolean);
  bar.innerHTML=parts.join(sep);
  _optimizeBoardLayout();
}

function _startBoardNet(){
  _fetchBoardNet();
  clearInterval(_boardNetTimer);
  _boardNetTimer=setInterval(_fetchBoardNet,120000);
}

function renderBoardView(results){
  _boardLastUpdate=Date.now();
  if(!_boardNetTimer) _startBoardNet();
  if(!_wxInfo) _fetchWeather();
  let board=document.getElementById('tv-board');
  if(!board){
    board=document.createElement('div');
    board.id='tv-board';
    board.className='tv-board';
    document.body.appendChild(board);
  }
  const srt=(arr)=>[...arr].sort((a,b)=>(PRI[a.ind]||9)-(PRI[b.ind]||9)||a.name.localeCompare(b.name));
  const sorted=srt(results);
  const techSvcs=results.filter(s=>{const sv=SVCS.find(x=>x.name===s.name);return !sv||sv.cat!=='transit';});
  const issueCount=techSvcs.filter(s=>s.ind!=='none'&&s.ind!=='unknown').length;
  const outageCount=techSvcs.filter(s=>s.ind==='major').length;
  const statusCls=outageCount>0?'bad':issueCount>0?'warn':'ok';
  const statusMsg=outageCount>0?`${outageCount} Down`:issueCount>0?`${issueCount} Issue${issueCount!==1?'s':''}`:'\u2713 All Systems Operational';
  const statusColor=outageCount>0?'var(--bad)':issueCount>0?'var(--warn)':'var(--ok)';
  // Split into services with active issues vs healthy services
  const issueSvcs=sorted.filter(s=>s.ind!=='none'&&s.ind!=='unknown');
  const normalSvcs=sorted.filter(s=>s.ind==='none'||s.ind==='unknown');

let currentView='services';

let refreshFailCount=0;
let lastSuccessfulRefresh=null;
let isRefreshing=false;

function setRefreshing(on){
  isRefreshing=on;
  const sp=document.getElementById('refresh-spinner');
  if(sp) sp.classList.toggle('active', on);

function updateIncidentPin(data){
  const pin=document.getElementById('incident-pin');
  if(!pin) return;

  const active=data
    .filter(s=>svcCatMap[s.name]!=='transit' && s.ind!=='none' && s.ind!=='unknown')
    .sort((a,b)=>{
      const pd=(PRI[a.ind]||9)-(PRI[b.ind]||9);
      return pd!==0 ? pd : a.name.localeCompare(b.name);
    });

  pin.className='incident-pin show';

  if(!active.length){
    pin.innerHTML='<span class="pin-chip chip-none"><span class="pin-dot"></span>All Systems Operational</span>';
    return;
  }

  pin.innerHTML=active.map(s=>`<span class="pin-chip chip-${s.ind||'unknown'}"><span class="pin-dot"></span>${s.name}</span>`).join('');
}

const svcCatMap=Object.fromEntries(SVCS.map(s=>[s.name, s.cat||'app']));
window._lastResults=window._lastResults||{};

async function init(){
  if(isRefreshing) return;
  setRefreshing(true);
  let results;
  try{
    results=await Promise.all(SVCS.map((s,i)=>new Promise(res=>setTimeout(()=>fetchOne(s).then(res).catch(()=>res(errSvc(s))),i*80))));
  }catch(e){
    refreshFailCount++;
    if(refreshFailCount>=2) setStale(true);
    if(_boardModeActive&&_boardAutoReload&&refreshFailCount>=_boardAutoReload){
      setTimeout(()=>window.location.reload(),2000);
    }
    setRefreshing(false);
    return;
  }
  refreshFailCount=0;
  lastSuccessfulRefresh=Date.now();
  setStale(false);
  setRefreshing(false);
  results.forEach(s=>{
    s.cat=svcCatMap[s.name]||'app';
    const prev=window._pi[s.name];
    if(prev && prev==='none' && (s.ind==='minor'||s.ind==='major')){
      queueAlert(s, s.ind==='major'?'outage':'degraded');
    }else if(prev && (prev==='minor'||prev==='major') && s.ind==='none'){
      queueAlert(s,'restored');
    }
    window._pi[s.name]=s.ind;
    window._lastResults[s.name]=s;
    _recordUptimeCheck(s.name, s.ind!=='none'&&s.ind!=='unknown');
  });
  updateStats(results);
  updateIncidentPin(results);
  renderServices(results);
}

// Per-service background polling — only re-renders what changed
async function pollService(svc){
  try{
    const result=await fetchOne(svc);
    result.cat=svcCatMap[result.name]||'app';
    const prev=window._pi[result.name];
    const prevResult=window._lastResults[result.name];
    const changed=!prevResult||prev!==result.ind||prevResult.title!==result.title||prevResult.body!==result.body;
    if(changed){
      if(prev && prev==='none' && (result.ind==='minor'||result.ind==='major')) queueAlert(result, result.ind==='major'?'outage':'degraded');
      else if(prev && (prev==='minor'||prev==='major') && result.ind==='none') queueAlert(result,'restored');
      window._pi[result.name]=result.ind;
      window._lastResults[result.name]=result;
      _recordUptimeCheck(result.name, result.ind!=='none'&&result.ind!=='unknown');
      // Full re-render: status change may move service between issues panel and directory
      const allResults=Object.values(window._lastResults);
      updateStats(allResults);
      updateIncidentPin(allResults);
      renderServices(allResults);
      lastSuccessfulRefresh=Date.now();
      setStale(false);
    }
  }catch(e){}
}

const _pollIntervals=[];
function startPerServicePolling(){
  // Clear any previously-registered intervals to prevent duplicates
  _pollIntervals.forEach(id=>clearInterval(id));
  _pollIntervals.length=0;
  SVCS.forEach((s,i)=>{
    // Stagger so they don't all hit simultaneously, spread over the 2-min window
    const offset=Math.round((i/SVCS.length)*110000)+5000;
    setTimeout(()=>{
      pollService(s);
      _pollIntervals.push(setInterval(()=>pollService(s), 120000));
    }, offset);
  });
}

// Retry every 30s when stale; no-ops immediately when data is fresh
let refreshInterval = null;
function scheduleRefresh(){
  clearInterval(refreshInterval);
  refreshInterval = setInterval(()=>{ if(refreshFailCount>=2) _startRefresh(); }, 30000);
}

function _startRefresh(){
  init();
}
