// Expand MBTA/Cloudflare services into one tile per alert/event for better board use of space
function _explodeIssueTiles(issueSvcs){
  const result=[];
  for(const svc of issueSvcs){
    if(svc.details?.type==='mbta'){
      const alerts=svc.details.alerts||[];
      const schedChanges=svc.details.schedChanges||[];
      if(!alerts.length&&!schedChanges.length){ result.push(svc); continue; }
      for(const a of alerts){
        const routeNames=(a.routes||[]).join(' / ');
        const tileTitle=routeNames||(a.effectLabel+(a.cause?' — '+a.cause:''))||'Service Alert';
        result.push({...svc, title:tileTitle, body:a.title||'',
          details:null, _tileRoutes:a.routes||[], _tileEffectLabel:a.effectLabel||''});
      }
      for(const sc of schedChanges){
        const t=sc.effectLabel+(sc.cause?' — '+sc.cause:'');
        result.push({...svc, title:t||'Schedule Change', body:sc.title||'',
          ind:'maintenance', label:'Schedule Change',
          details:null, _tileRoutes:sc.routes||[], _tileEffectLabel:sc.effectLabel||''});
      }
    } else {
      result.push(svc);
    }
  }
  return result;
}

function _cardWeight(svc){
  const textLen=(svc.title||'').length+(svc.body||'').length;
  let w=1;
  if(textLen>300) w=3;
  else if(textLen>100) w=2;
  if(svc.details?.type==='cloudflare'){
    const items=(svc.details.dataCenters?.length||0)+(svc.details.maintenance?.length||0);
    if(items>6) w=Math.max(w,3);
    else if(items>2) w=Math.max(w,2);
  }
  if((svc._tileRoutes?.length||0)>4) w=Math.max(w,2);
  return w;
}

function _buildIssueTilesHTML(svcs){
  return svcs.map(svc=>{
    const logos=logoSources(svc);
    const fallback=(svc.name||'?').trim().charAt(0).toUpperCase();
    const logoEl=logos.length
      ?`<img class="tv-issue-logo" src="${esc(logos[0])}" alt="${esc(svc.name)}" loading="lazy" decoding="async">`
      :`<div class="tv-issue-logo-fb">${esc(fallback)}</div>`;
    // Build body inner HTML — structured tiles get route pills / DC badges
    let bodyInnerHtml='';
    if('_tileRoutes' in svc){
      const routeHtml=(svc._tileRoutes||[]).map(r=>`<span class="tv-issue-route">${esc(r)}</span>`).join('');
      const effectHtml=svc._tileEffectLabel?`<span class="tv-issue-effect">${esc(svc._tileEffectLabel)}</span>`:'';
      const detailHtml=svc.body?`<div class="tv-issue-timeframe">${esc(svc.body)}</div>`:'';
      const routeRow=(routeHtml||effectHtml)?`<div class="tv-issue-routes">${routeHtml}${effectHtml}</div>`:'';
      bodyInnerHtml=routeRow+detailHtml;
    } else if(svc.details?.type==='cloudflare'){
      // Combined Cloudflare tile — incident body + maintenance items + DC pills
      const cfParts=[];
      if(svc.body) cfParts.push(`<div class="tv-issue-cf-body">${esc(svc.body)}</div>`);
      const cfMaint=svc.details.maintenance||[];
      if(cfMaint.length){
        cfParts.push(`<div class="tv-issue-section-hdr">Maintenance</div>`);
        const maintHtml=cfMaint.map(m=>`<span class="tv-issue-dc-item maint">${esc(m.name)}</span>`).join('');
        cfParts.push(`<div class="tv-issue-dc-list">${maintHtml}</div>`);
      }
      const cfDcs=svc.details.dataCenters||[];
      const cfRerouteDcs=cfDcs.filter(d=>d.ind==='rerouting');
      const cfMaintDcs=cfDcs.filter(d=>d.ind!=='rerouting'&&d.ind!=='none');
      if(cfRerouteDcs.length){
        cfParts.push(`<div class="tv-issue-section-hdr">Re-Routed Data Centers</div>`);
        const dcHtml=cfRerouteDcs.map(dc=>`<span class="tv-issue-dc-item reroute">${esc(dc.name)}</span>`).join('');
        cfParts.push(`<div class="tv-issue-dc-list">${dcHtml}</div>`);
      }
      if(cfMaintDcs.length){
        cfParts.push(`<div class="tv-issue-section-hdr">Data Center Maintenance</div>`);
        const dcHtml=cfMaintDcs.map(dc=>`<span class="tv-issue-dc-item maint">${esc(dc.name)}</span>`).join('');
        cfParts.push(`<div class="tv-issue-dc-list">${dcHtml}</div>`);
      }
      bodyInnerHtml=cfParts.join('');
    } else {
      // Plain text fallback (non-exploded structured details or regular services)
      let tileBody=svc.body||'';
      if(!tileBody&&svc.details?.type==='mbta'){
        const lines=[];
        (svc.details.alerts||[]).forEach(a=>{
          const r=(a.routes||[]).join(', ');
          lines.push((r?r+': ':'')+a.title+(a.timeframe?' ('+a.timeframe+')':''));
        });
        (svc.details.schedChanges||[]).forEach(a=>{
          const r=(a.routes||[]).join(', ');
          lines.push('📅 '+(r?r+': ':'')+a.title);
        });
        tileBody=lines.join('\n');
      } else if(!tileBody&&svc.details?.type==='cloudflare'){
        const lines=[];
        (svc.details.maintenance||[]).forEach(m=>lines.push('🔧 '+m.name));
        (svc.details.dataCenters||[]).forEach(dc=>lines.push('• '+dc.name+' — '+(dc.ind==='rerouting'?'Re-routing':'Maintenance')));
        tileBody=lines.join('\n');
      }
      if(tileBody) bodyInnerHtml=esc(tileBody);
    }
    const bodyEl=bodyInnerHtml
      ?`<div class="tv-issue-body"><span class="tv-issue-body-inner">${bodyInnerHtml}</span></div>`:'';
    return `<div class="tv-issue-tile ${CC[svc.ind]||''}" data-url="${esc(svc.url||'')}" data-weight="${_cardWeight(svc)}">
      <div class="tv-issue-tile-top">${logoEl}<span class="tv-issue-name">${esc(svc.name)}</span></div>
      <div class="tv-issue-badge ${IC[svc.ind]||'ok'}">${esc(svc.label)}</div>
      ${svc.title?`<div class="tv-issue-title">${esc(svc.title)}</div>`:''}
      ${bodyEl}
    </div>`;
  }).join('');
}

function _showIssuePage(pages, pageIdx){
  const tilesEl=document.getElementById('tv-issue-tiles');
  if(!tilesEl) return;
  const page=pages[pageIdx]||[];
  tilesEl.style.transition='opacity 0.35s';
  tilesEl.style.opacity='0';
  setTimeout(()=>{
    tilesEl.innerHTML=_buildIssueTilesHTML(page);
    _optimizeBoardLayout();
    tilesEl.style.opacity='1';
  },350);
  const dotsEl=document.getElementById('tv-page-dots');
  if(dotsEl) dotsEl.querySelectorAll('.tv-page-dot').forEach((d,i)=>d.classList.toggle('active',i===pageIdx));
  const pgNumEl=document.getElementById('tv-page-num');
  if(pgNumEl) pgNumEl.textContent=pageIdx+1;
}

function _scheduleNextIssuePage(pages){
  clearTimeout(_issuePageTimer);
  _issuePageTimer=null;
  // Wait a short time for requestAnimationFrame in _optimizeBoardLayout to finish
  // computing scroll distances, then determine dwell based on actual scroll duration
  setTimeout(()=>{
    const issueEl=document.getElementById('tv-issue-tiles');
    let maxScrollDur=0;
    if(issueEl){
      issueEl.querySelectorAll('.tv-issue-body-inner').forEach(inner=>{
        const d=parseFloat(inner.style.getPropertyValue('--tv-scroll-dur'))||0;
        if(d>maxScrollDur) maxScrollDur=d;
      });
    }
    // Dwell = full scroll animation + 8s buffer to read bottom, minimum ISSUE_PAGE_SECS
    const dwell=Math.max(ISSUE_PAGE_SECS, maxScrollDur+8);
    _issuePageTimer=setTimeout(()=>{
      _issuePage=(_issuePage+1)%pages.length;
      _showIssuePage(pages,_issuePage);
      _scheduleNextIssuePage(pages);
    },dwell*1000);
  },600);
}

// Build pages avoiding orphaned single-card last pages.
// e.g. 4 tiles → [2,2]; 7 tiles → [3,2,2] instead of [3,3,1]
function _buildIssuePages(svcs){
  if(!svcs.length) return [];
  const pages=[];
  let remaining=svcs.slice();
  while(remaining.length>0){
    const pagesLeft=Math.ceil(remaining.length/ISSUE_PAGE_SIZE);
    const pageSize=Math.ceil(remaining.length/pagesLeft);
    pages.push(remaining.splice(0,pageSize));
  }
  return pages;
}

function _initIssuePagination(pages){
  clearTimeout(_issuePageTimer);
  _issuePageTimer=null;
  _issuePage=0;
  if(pages.length<=1) return;
  _scheduleNextIssuePage(pages);
}

function renderBoardView(results){
  _boardLastUpdate=Date.now();
  if(!_boardNetTimer) _startBoardNet();
  if(!_wxInfo) _fetchWeather();
  if(!_nowPlayingInfo) _fetchNowPlaying();
  let board=document.getElementById('tv-board');
  if(!board){
    board=document.createElement('div');
    board.id='tv-board';
    board.className='tv-board';
    document.body.appendChild(board);
    _startBoardCursorHide();
  }
  const srt=(arr)=>[...arr].sort((a,b)=>(PRI[a.ind]||9)-(PRI[b.ind]||9)||a.name.localeCompare(b.name));
  const sorted=srt(results);
  const techSvcs=results.filter(s=>{const sv=SVCS.find(x=>x.name===s.name);return !sv||sv.cat!=='transit';});
  const issueCount=techSvcs.filter(s=>s.ind!=='none'&&s.ind!=='unknown').length;
  const outageCount=techSvcs.filter(s=>s.ind==='major').length;
  const warnCount=techSvcs.filter(s=>s.ind==='minor'||s.ind==='reroute').length;
  const maintCount=techSvcs.filter(s=>s.ind==='maint').length;
  const okCount=techSvcs.filter(s=>s.ind==='none').length;
  const statusCls=outageCount>0?'bad':issueCount>0?'warn':'ok';
  const statusMsg=outageCount>0?`${outageCount} Down`:issueCount>0?`${issueCount} Issue${issueCount!==1?'s':''}`:'\u2713 All Systems Operational';
  const statusColor=outageCount>0?'var(--bad)':issueCount>0?'var(--warn)':'var(--ok)';
  // Split into services with active issues vs healthy services
  const issueSvcs=sorted.filter(s=>s.ind!=='none'&&s.ind!=='unknown');
  const normalSvcs=sorted.filter(s=>s.ind==='none'||s.ind==='unknown');
  // Explode MBTA/CF into one tile per alert/event for better use of board space
  const explodedIssues=_explodeIssueTiles(issueSvcs);
  // Build pages — smart packing avoids orphaned single-card last pages
  const issuePages=_buildIssuePages(explodedIssues);
  const firstPageSvcs=issuePages[0]||[];
  const issueTilesHTML=_buildIssueTilesHTML(firstPageSvcs);
  const totalIssuePages=issuePages.length;
  const issueDotsHTML=totalIssuePages>1
    ?`<div class="tv-page-dots" id="tv-page-dots">${Array.from({length:totalIssuePages},(_,i)=>`<button class="tv-page-dot${i===0?' active':''}" data-page="${i}" aria-label="Page ${i+1}" type="button"></button>`).join('')}</div>`
    :'';
  // Build compact subdued normal-service tiles
  const normalTilesHTML=normalSvcs.map(svc=>{
    const logos=logoSources(svc);
    const fallback=(svc.name||'?').trim().charAt(0).toUpperCase();
    const logoEl=logos.length
      ?`<img class="tv-tile-logo" src="${esc(logos[0])}" alt="${esc(svc.name)}" loading="lazy" decoding="async">`
      :`<div class="tv-tile-logo-fb">${esc(fallback)}</div>`;
    return `<div class="tv-tile" data-url="${esc(svc.url||'')}">
      <div class="tv-tile-top">${logoEl}<span class="tv-tile-name">${esc(svc.name)}</span></div>
      <div class="tv-tile-badge ${IC[svc.ind]||'ok'}">${esc(svc.label)}</div>
    </div>`;
  }).join('');
  // Save any active alert cards so they survive the innerHTML replacement
  const _savedAlertCards=[...board.querySelectorAll('.tv-board-alert-card')];
  board.className='tv-board'+(_boardMinimal?' tv-board-minimal':'');
  board.innerHTML=`
    <div class="tv-hdr">
      <div class="tv-hdr-weather" id="tv-wx-bar" style="display:none"></div>
      <div class="tv-hdr-media">
        <div class="tv-now-playing" id="tv-now-playing"></div>
        <div class="tv-ctx-audio">
          <select class="tv-station-select" id="tv-station-select" title="Choose radio station">${BOARD_STATIONS.map(st=>`<option value="${esc(st.id)}">${esc(st.name)}</option>`).join('')}</select>
          <label class="tv-radio-toggle" for="tv-radio-toggle" title="Play board radio">
            <input id="tv-radio-toggle" type="checkbox" ${_boardRadioEnabled?'checked':''}>
            <span>Radio</span>
          </label>
          <input type="range" id="tv-radio-vol" class="tv-radio-vol-slider" min="0" max="1" step="0.05" title="Volume">
        </div>
      </div>
      <div class="tv-clock-block">
        <div class="tv-clock" id="tv-clock"></div>
        <div class="tv-date" id="tv-date"></div>
      </div>
    </div>
    <div class="tv-minimal-status">
      <div class="tv-minimal-msg" style="color:${statusColor}">${statusMsg}</div>
      <div class="tv-minimal-clock" id="tv-minimal-clock"></div>
    </div>
    ${issueSvcs.length?`
    <div class="tv-issues-section">
      <div class="tv-section-hdr issue-hdr"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19h-17L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/></svg> Active Issues &middot; ${issueSvcs.length} service${issueSvcs.length!==1?'s':''} affected${totalIssuePages>1?` &middot; page <span id="tv-page-num">1</span>/${totalIssuePages}`:''}</div>
      <div class="tv-issue-tiles" id="tv-issue-tiles">${issueTilesHTML}</div>
      ${issueDotsHTML}
    </div>`:''}
    <div class="tv-ticker-wrap">
      ${normalSvcs.length?`<div class="tv-ticker-hdr"><span class="tv-ticker-ok-dot"></span>${normalSvcs.length} Operational</div>`:''}
      <div class="tv-tiles" id="tv-tiles"><div class="tv-tiles-track" id="tv-tiles-track">${normalTilesHTML}${normalTilesHTML}</div></div>
    </div>
    <div class="tv-board-footer">
      <div class="tv-net-bar" id="tv-net-bar"><span class="tv-net-lbl">Network</span> Loading…</div>
      <div class="tv-footer-right">
        <button class="tv-test-btn" id="tv-board-test-btn" type="button" title="Test alert popup">Test Alert</button>
        <span class="tv-updated" id="tv-updated"></span>
        <button class="tv-exit-btn" id="tv-exit-btn">&#x2715; Exit Board</button>
      </div>
    </div>`;
  // Re-attach any alert cards that were showing before the re-render
  _savedAlertCards.forEach(card=>board.appendChild(card));
  _renderBoardNetBar();
  _renderBoardWeatherBar();
  _optimizeBoardLayout();
  _initIssuePagination(issuePages);
  // Re-optimize on window resize
  if(_boardResizeObs) _boardResizeObs.disconnect();
  let _roDebounce=null;
  _boardResizeObs=new ResizeObserver(()=>{ clearTimeout(_roDebounce); _roDebounce=setTimeout(_optimizeBoardLayout,60); });
  _boardResizeObs.observe(board);
  document.getElementById('tv-exit-btn').addEventListener('click',exitBoardMode);
  document.getElementById('tv-board-test-btn')?.addEventListener('click',runAlertTest);
  // Page dot click: jump to that page and reset auto-rotation
  document.getElementById('tv-page-dots')?.addEventListener('click',e=>{
    const dot=e.target.closest('.tv-page-dot');
    if(!dot) return;
    const pageIdx=parseInt(dot.dataset.page,10);
    if(isNaN(pageIdx)) return;
    _issuePage=pageIdx;
    _showIssuePage(issuePages,pageIdx);
    clearTimeout(_issuePageTimer);
    _issuePageTimer=null;
    _scheduleNextIssuePage(issuePages);
  });
  document.getElementById('tv-radio-toggle')?.addEventListener('change',(e)=>{
    _setBoardRadioEnabled(!!e.target.checked);
  });
  document.getElementById('tv-station-select')?.addEventListener('change',async (e)=>{
    _boardStationId=e.target.value;
    localStorage.setItem('board-station',_boardStationId);
    _nowPlayingInfo={track:'Loading…',artist:_getBoardStation().name,station:_getBoardStation().name};
    _renderBoardNowPlaying();
    _stopBoardRadio();
    await _startBoardRadio();
    _fetchNowPlaying();
  });
  _applyBoardRadioToggle();
  _applyBoardStationSelect();
  _applyBoardRadioVolSlider();
  document.getElementById('tv-radio-vol')?.addEventListener('input',(e)=>{
    const v=parseFloat(e.target.value);
    if(_boardRadioAudio&&!(_radioDuckUntil>Date.now())) _setBoardRadioVolume(v);
    localStorage.setItem('board-radio-vol',String(v));
  });
  _renderBoardNowPlaying();
  _startBoardRadio();
  const tilesEl=document.getElementById('tv-tiles');
  tilesEl.addEventListener('click',e=>{
    const tile=e.target.closest('.tv-tile');
    if(tile&&tile.dataset.url) _safeOpen(tile.dataset.url);
  });
  tilesEl.addEventListener('error',e=>{
    if(e.target.matches('.tv-tile-logo')) e.target.style.display='none';
  },true);
  const issueTilesEl=document.getElementById('tv-issue-tiles');
  if(issueTilesEl){
    issueTilesEl.addEventListener('click',e=>{
      const tile=e.target.closest('.tv-issue-tile');
      if(tile&&tile.dataset.url) _safeOpen(tile.dataset.url);
    });
    issueTilesEl.addEventListener('error',e=>{
      if(e.target.matches('.tv-issue-logo')) e.target.style.display='none';
    },true);
  }
  clearInterval(_boardClockTimer);
  const tick=()=>{
    const now=new Date();
    const cl=document.getElementById('tv-clock');
    if(cl) cl.textContent=now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
    const dt=document.getElementById('tv-date');
    if(dt) dt.textContent=now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
    const mc=document.getElementById('tv-minimal-clock');
    if(mc) mc.textContent=now.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',second:'2-digit',hour12:true});
    const up=document.getElementById('tv-updated');
    if(up&&_boardLastUpdate) up.textContent='Updated '+fmtFetchAge(_boardLastUpdate)+' ago';
  };
  tick();
  _boardClockTimer=setInterval(tick,1000);
}

let _boardCursorTimer=null;
function _boardShowCursor(){
  document.body.style.cursor='';
  clearTimeout(_boardCursorTimer);
  _boardCursorTimer=setTimeout(()=>{ if(_boardModeActive) document.body.style.cursor='none'; },3000);
}
function _startBoardCursorHide(){
  document.addEventListener('mousemove',_boardShowCursor);
  _boardShowCursor();
}
function _stopBoardCursorHide(){
  document.removeEventListener('mousemove',_boardShowCursor);
  clearTimeout(_boardCursorTimer);
  _boardCursorTimer=null;
  document.body.style.cursor='';
}

function _applyBoardPageState(){
  document.body.classList.toggle('board-page',_boardModeActive);
  if(_boardModeActive) _startBoardCursorHide();
  else _stopBoardCursorHide();
}

function exitBoardMode(){
  clearInterval(_boardClockTimer);
  clearInterval(_boardNetTimer);
  _boardNetTimer=null;
  clearTimeout(_radioDuckTimer);
  _radioDuckTimer=null;
  _radioDuckUntil=0;
  _stopBoardRadio();
  clearTimeout(_issuePageTimer);
  _issuePageTimer=null;
  if(_boardResizeObs){ _boardResizeObs.disconnect(); _boardResizeObs=null; }
  _boardModeActive=false;

function updateIncidentPin(data){

const svcCatMap=Object.fromEntries(SVCS.map(s=>[s.name, s.cat||'app']));
window._lastResults=window._lastResults||{};

async function init(){
  if(isRefreshing) return;
  setRefreshing(true);
  let results;
  try{
    results=await Promise.all(SVCS.map((s,i)=>new Promise(res=>setTimeout(()=>fetchOne(s).then(res).catch(()=>res(errSvc(s))),i*80))));
  }catch(e){
    refreshFailCount++;
    if(refreshFailCount>=2) setStale(true);
    if(_boardModeActive&&_boardAutoReload&&refreshFailCount>=_boardAutoReload){
      setTimeout(()=>window.location.reload(),2000);
    }
    setRefreshing(false);
    return;
  }
  refreshFailCount=0;
  lastSuccessfulRefresh=Date.now();
  setStale(false);
  setRefreshing(false);
  results.forEach(s=>{
    s.cat=svcCatMap[s.name]||'app';
    const prev=window._pi[s.name];
    if(prev && prev==='none' && (s.ind==='minor'||s.ind==='major')){
      queueAlert(s, s.ind==='major'?'outage':'degraded');
    }else if(prev && (prev==='minor'||prev==='major') && s.ind==='none'){
      queueAlert(s,'restored');
    }
    window._pi[s.name]=s.ind;
    window._lastResults[s.name]=s;
    _recordUptimeCheck(s.name, s.ind!=='none'&&s.ind!=='unknown');
  });
  updateStats(results);
  updateIncidentPin(results);
  renderServices(results);
}

// Per-service background polling — only re-renders what changed
async function pollService(svc){
  try{
    const result=await fetchOne(svc);
    result.cat=svcCatMap[result.name]||'app';
    const prev=window._pi[result.name];
    const prevResult=window._lastResults[result.name];
    const changed=!prevResult||prev!==result.ind||prevResult.title!==result.title||prevResult.body!==result.body;
    if(changed){
      if(prev && prev==='none' && (result.ind==='minor'||result.ind==='major')) queueAlert(result, result.ind==='major'?'outage':'degraded');
      else if(prev && (prev==='minor'||prev==='major') && result.ind==='none') queueAlert(result,'restored');
      window._pi[result.name]=result.ind;
      window._lastResults[result.name]=result;
      _recordUptimeCheck(result.name, result.ind!=='none'&&result.ind!=='unknown');
      // Full re-render: status change may move service between issues panel and directory
      const allResults=Object.values(window._lastResults);
      updateStats(allResults);
      updateIncidentPin(allResults);
      renderServices(allResults);
      lastSuccessfulRefresh=Date.now();
      setStale(false);
    }
  }catch(e){}
}

const _pollIntervals=[];
function startPerServicePolling(){
  // Clear any previously-registered intervals to prevent duplicates
  _pollIntervals.forEach(id=>clearInterval(id));
  _pollIntervals.length=0;
  SVCS.forEach((s,i)=>{
    // Stagger so they don't all hit simultaneously, spread over the 2-min window
    const offset=Math.round((i/SVCS.length)*110000)+5000;
    setTimeout(()=>{
      pollService(s);
      _pollIntervals.push(setInterval(()=>pollService(s), 120000));
    }, offset);
  });
}

// Retry every 30s when stale; no-ops immediately when data is fresh
let refreshInterval = null;
function scheduleRefresh(){
  clearInterval(refreshInterval);
  refreshInterval = setInterval(()=>{ if(refreshFailCount>=2) _startRefresh(); }, 30000);
}

function _startRefresh(){
  init();
}

function parseCFTrace(text) {
  const obj = {};
  for (const line of text.trim().split('\n')) {
    const eq = line.indexOf('=');
    if (eq > 0) obj[line.slice(0, eq).trim()] = line.slice(eq + 1).trim();
  }
  return obj;
}

// Direct browser fetch (no proxy) — required for IP/ISP/colo data so results
// reflect the *user's* connection, not the proxy server's.
// Falls back to proxy only if direct fetch fails (e.g. in unusual environments).
async function _netDirectText(url) {
  try {
    const r = await fetchWithTimeout(url, 12000);
    if (!r.ok && r.status !== 204) throw new Error(r.status);
    return await r.text();
  } catch(e) {
    // Fallback: try via proxy (data will reflect proxy location, not user)
    return getText(url);
  }
}
async function _netDirectJson(url) {
  const t = await _netDirectText(url);
  return JSON.parse(t.replace(/^\uFEFF/, ''));
}
// Proxy-only fetch for special server-side routes (IODA, Radar)
async function _netProxyJson(key) {
  if (!_IS_DEPLOYED) return null;
  const r = await fetchWithTimeout('/proxy?svc=' + key, 15000);
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function measureLatency(url, count, noCors) {
  count = count || 5;
  const times = [];
  let lost = 0;
  const baseOpts = noCors ? { mode: 'no-cors' } : {};
  for (let i = 0; i < count; i++) {
    const sep = url.includes('?') ? '&' : '?';
    const t = performance.now();
    try {
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 6000);
      await fetch(url + sep + '_t=' + Date.now(), { ...baseOpts, signal: ctrl.signal });
      clearTimeout(timer);
      times.push(performance.now() - t);
    } catch(e) { lost++; }
    if (i < count - 1) await new Promise(r => setTimeout(r, 80));
  }
  if (!times.length) return null;
  times.sort((a, b) => a - b);
  return {
    min: Math.round(times[0]),
    avg: Math.round(times.reduce((a, b) => a + b, 0) / times.length),
    loss: Math.round((lost / count) * 100),
  };
}

  { name: 'Quad9 (9.9.9.9)',          cidrs: ['9.9.9.', '149.112.112.'] },
  { name: 'NextDNS',                  cidrs: ['45.90.28.', '45.90.30.'] },
  { name: 'AdGuard DNS',              cidrs: ['94.140.14.', '94.140.15.'] },
  { name: 'OpenDNS',                  cidrs: ['208.67.222.', '208.67.220.'] },
];

function classifyResolver(ip) {
  if (!ip) return { isDoh: false, provider: 'Unknown' };
  for (const p of _DOH_PROVIDERS) {
    if (p.cidrs.some(c => ip.startsWith(c))) return { isDoh: true, provider: p.name };
  }
  return { isDoh: false, provider: 'ISP / Private DNS' };
}

async function detectDohResolver() {
  try {
    // edns.ip-api.com uses a unique random subdomain per request, forcing a fresh DNS lookup.
    // Their authoritative server records which resolver queried it and returns {"dns":{"ip":"...","geo":"..."}}.
    // Has Access-Control-Allow-Origin: * — works directly from browsers.
    // whoami.cloudflare returns NXDOMAIN; cloudflare-dns.com DoH always shows CF's own resolver IP.
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 8000);
    const r = await fetch('https://edns.ip-api.com/json', { signal: ctrl.signal });
    clearTimeout(timer);
    if (!r.ok) return null;
    const data = await r.json();
    const ip = data?.dns?.ip;
    if (!ip) return null;
    return { ip, geo: data.dns.geo || null };
  } catch(e) { return null; }
}

async function measureDownloadSpeed() {
  // 4 parallel streams to saturate high-bandwidth connections (TCP slow-start limits single connections)
  const STREAMS = 4;
  const SIZE = 10000000; // 10 MB per stream = 40 MB total
  const start = performance.now();
  try {
    const downloads = Array.from({length: STREAMS}, (_, i) =>
      fetchWithTimeout('https://speed.cloudflare.com/__down?bytes=' + SIZE + '&r=' + i, 45000)
        .then(r => r.arrayBuffer())
    );
    const buffers = await Promise.all(downloads);
    const elapsed = (performance.now() - start) / 1000;
    const totalBytes = buffers.reduce((s, b) => s + b.byteLength, 0);
    const mbps = (totalBytes * 8) / (elapsed * 1000000);
    return { mbps: Math.round(mbps * 10) / 10, elapsed: Math.round(elapsed * 10) / 10, bytes: totalBytes };
  } catch(e) { return null; }
}

function mkNetCard(id, iconSvg, title, body) {
  return `<div class="card net-card" id="${id}"><div class="net-card-hdr"><div class="net-card-icon">${iconSvg}</div><span class="net-card-title">${title}</span></div>${body}</div>`;
}
function mkNetMetric(label, val) {
  return `<div class="net-metric"><span class="net-metric-label">${label}</span><span class="net-metric-val">${val}</span></div>`;
}
function mkNetMetricStack(label, val) {
  return `<div class="net-metric net-metric-stack"><span class="net-metric-label">${label}</span><span class="net-metric-val">${val}</span></div>`;
}
function mkNetBadge(label, type) {
  const sym = type === 'ok' ? '✓' : type === 'bad' ? '✗' : type === 'warn' ? '⚠' : '–';
  return `<span class="net-badge net-badge-${type}">${sym} ${label}</span>`;
}
function mkShimmer() {
  return '<div class="net-shimmer net-shimmer-wide"></div><div class="net-shimmer net-shimmer-mid"></div><div class="net-shimmer net-shimmer-short"></div>';
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
// Truncate at a word boundary with ellipsis
function trunc(s,n){ s=String(s||''); if(s.length<=n) return s; const cut=s.lastIndexOf(' ',n); return (cut>n/2?s.slice(0,cut):s.slice(0,n))+'…'; }

let netDiagRan = false;
let netDiagRunning = false;

function _renderNetCards(cf, meta, ip, resolverIp, cfLat, gLat, traceHops, iodaData, radarData) {
  const navConn = navigator.connection || navigator.mozConnection || navigator.webkitConnection || null;
  const warp = cf.warp === 'on';
  const publicIp = esc(cf.ip || ip.query || '—');
  // Prefer speed.cloudflare.com/meta for ISP/ASN — always available; ip-api is optional enrichment
  const isp = esc(meta.asOrganization || ip.isp || '—');
  const loc = ip.city && ip.country ? esc(ip.city + ', ' + ip.country) : esc(ip.country || meta.city || '—');
  const asn = esc(meta.asn ? 'AS' + meta.asn : ip.as || '—');
  // navigator.connection.downlink is privacy-capped at 10 Mbps by browsers; omit to avoid misleading values.
  // Only show Data Saver which is reliable regardless of speed cap.
  const connSaveRow = (navConn && navConn.saveData) ? mkNetMetric('Data Saver', mkNetBadge('Enabled', 'warn')) : '';
  const connCard = mkNetMetricStack('Public IP', publicIp)
    + mkNetMetric('ISP', isp)
    + mkNetMetric('Location', loc)
    + mkNetMetric('ASN', asn)
    + (warp ? mkNetMetric('VPN / Tunnel', mkNetBadge('Cloudflare WARP', 'ok')) : '')
    + connSaveRow;

  // meta.colo is now a nested object {iata, lat, lon, cca2, region, city} from speed.cloudflare.com/meta
  const metaColo = (meta.colo && typeof meta.colo === 'object') ? meta.colo : null;
  const cfColo = esc(metaColo?.iata || (typeof meta.colo === 'string' ? meta.colo : null) || cf.colo || '—');
  const cfCity = esc(metaColo?.city || '—');
  const cfCountry = esc(metaColo?.cca2 || meta.country || cf.loc || '—');
  const cfHttpProto = esc(cf.http || meta.httpProtocol || '—');
  const httpBadge = /3/.test(cfHttpProto) ? mkNetBadge(cfHttpProto, 'ok') : mkNetBadge(cfHttpProto || '—', 'warn');
  // Packet loss in latency rows
  const _lossStr = lat => (lat && lat.loss > 0) ? ` · <span class="net-badge net-badge-${lat.loss > 20 ? 'bad' : 'warn'}" style="font-size:11px;padding:1px 6px">${lat.loss}% loss</span>` : '';
  const cfLatRow = cfLat ? mkNetMetric('Latency to CF Edge', cfLat.min + ' ms min · ' + cfLat.avg + ' ms avg' + _lossStr(cfLat)) : mkNetMetric('Latency', '<span class="net-err">Unavailable</span>');
  const cfCard = mkNetMetric('Data Center', cfColo + ' · ' + cfCity)
    + mkNetMetric('Country', cfCountry)
    + mkNetMetric('HTTP Protocol', httpBadge)
    + cfLatRow;

  const tlsStr = esc(cf.tls || '—');
  const tlsBadge = cf.tls === 'TLSv1.3' ? mkNetBadge('TLS 1.3', 'ok')
    : cf.tls === 'TLSv1.2' ? mkNetBadge('TLS 1.2', 'warn')
    : cf.tls ? mkNetBadge(tlsStr, 'bad') : '<span class="net-err">—</span>';
  const h3Badge = /3/.test(cf.http || '') ? mkNetBadge('HTTP/3 (QUIC)', 'ok') : mkNetBadge('HTTP/2 only', 'warn');
  const ipv6Badge = (cf.ip || '').includes(':') ? mkNetBadge('IPv6', 'ok') : mkNetBadge('IPv4 only', 'muted');
  const warpBadge = warp ? mkNetBadge('Active', 'ok') : mkNetBadge('Off', 'muted');
  const protoCard = mkNetMetric('TLS Version', tlsBadge)
    + mkNetMetric('HTTP Version', h3Badge)
    + mkNetMetric('IP Protocol', ipv6Badge)
    + mkNetMetric('Cloudflare WARP', warpBadge)
    + `<div class="net-note">HTTP/3 (QUIC) is negotiated opportunistically — it may show HTTP/2 if UDP is restricted on your network or if the initial connection hasn't upgraded yet. Values can vary between page loads.</div>`;

  // resolverIp is {ip, geo} from edns.ip-api.com, or null on failure
  const resolverAddr = resolverIp?.ip || null;
  const resolverGeo  = resolverIp?.geo || null;  // e.g. "United States - Google LLC"
  const resolverClassification = classifyResolver(resolverAddr);
  // Use geo org from edns.ip-api.com when CIDR match doesn't identify the provider
  // (e.g. Google's recursive resolver may use 192.178.x.x, not 8.8.x.x)
  // edns.ip-api.com returns geo as "Country Name - Org Name" (full country, not 2-letter code)
  const geoOrg = resolverGeo
    ? (resolverGeo.includes(' - ') ? resolverGeo.split(' - ').slice(1).join(' - ').trim() : resolverGeo)
    : null;
  // Map verbose org names to short display names for badge
  const shortOrg = !geoOrg ? null
    : /cloudflare/i.test(geoOrg)               ? 'Cloudflare'
    : /\bgoogle\b/i.test(geoOrg)               ? 'Google'
    : /quad9/i.test(geoOrg)                    ? 'Quad9'
    : /nextdns/i.test(geoOrg)                  ? 'NextDNS'
    : /adguard/i.test(geoOrg)                  ? 'AdGuard'
    : /opendns|cisco umbrella/i.test(geoOrg)   ? 'OpenDNS'
    // WoodyNet and PCH (Packet Clearing House) are known Quad9 anycast routing partners
    : /woody.?net|packet clearing house|pch\.net/i.test(geoOrg) ? 'Quad9'
    : geoOrg.replace(/,?\s*(Inc|LLC|Ltd|Corp|GmbH)\.?\s*$/i, '').trim();
  const knownPublicDns = /cloudflare|google|quad9|nextdns|adguard|opendns|cisco umbrella|woody.?net|packet clearing house|pch\.net/i.test(geoOrg || '');
  const resolverProvider = resolverClassification.isDoh
    ? resolverClassification.provider
    : (shortOrg || resolverClassification.provider);
  const resolverDisplay = resolverAddr ? mkNetMetricStack('DNS Resolver IP', esc(resolverAddr)) : mkNetMetric('DNS Resolver IP', '<span class="net-err">Unavailable</span>');
  const pubDnsBadge = resolverAddr
    ? (knownPublicDns || resolverClassification.isDoh
        ? mkNetBadge(esc(resolverProvider), 'ok')
        : mkNetBadge(esc(resolverProvider || 'ISP / Private DNS'), 'muted'))
    : '<span class="net-err">Could not determine</span>';
  // DNS leak check: compare HTTP traffic org vs DNS resolver org
  const httpOrg = meta.asOrganization || null;
  let leakRow = '';
  if (httpOrg && (shortOrg || resolverClassification.provider)) {
    const httpOrgLow = httpOrg.toLowerCase();
    const dnsOrgLow = (shortOrg || resolverClassification.provider).toLowerCase();
    const sameNetwork = httpOrgLow.split(/\s+/).some(w => w.length > 4 && dnsOrgLow.includes(w))
      || dnsOrgLow.split(/\s+/).some(w => w.length > 4 && httpOrgLow.includes(w))
      || knownPublicDns; // public DNS providers intentionally differ from HTTP traffic ASN
    const leakBadge = sameNetwork
      ? mkNetBadge('Traffic &amp; DNS match', 'ok')
      : mkNetBadge('Different ASNs — possible DNS leak if on VPN', 'warn');
    leakRow = mkNetMetric('DNS Leak Check', leakBadge);
  }
  const dnsCard = resolverDisplay
    + mkNetMetric('Public DNS Provider', pubDnsBadge)
    + leakRow
    + `<div class="net-note">Shows the recursive DNS resolver your browser used to look up this page. Public DNS providers (Cloudflare, Google, Quad9, etc.) offer privacy and filtering features.</div>`;

  const gLatCard = gLat
    ? mkNetMetric('Latency to Google', gLat.min + ' ms min · ' + gLat.avg + ' ms avg' + _lossStr(gLat))
      + `<div class="net-note">Google uses Anycast BGP routing. Latency reflects your nearest Google PoP via dns.google.</div>`
    : `<div class="net-err" style="padding:10px 0">Unable to reach dns.google — may be blocked by network policy or CORS.</div>`;

  // Traceroute-lite card
  const maxLat = Math.max(1, ...(traceHops||[]).filter(h=>h.lat).map(h=>h.lat.avg));
  const traceCard = (traceHops && traceHops.length)
    ? traceHops.map(h => {
        if (!h.lat) return mkNetMetric(esc(h.label), '<span class="net-err">Unreachable</span>');
        const pct = Math.min(100, Math.round((h.lat.avg / maxLat) * 100));
        const qual = h.lat.avg < 40 ? '' : h.lat.avg < 120 ? 'warn' : 'bad';
        const lossNote = h.lat.loss > 0 ? ` · ${h.lat.loss}% loss` : '';
        return `<div class="net-metric" style="flex-direction:column;align-items:stretch;gap:3px">
          <div style="display:flex;justify-content:space-between;font-size:13px"><span class="net-metric-label">${esc(h.label)}</span><span class="net-metric-val">${h.lat.min} ms min · ${h.lat.avg} ms avg${lossNote}</span></div>
          <div class="trace-bar"><div class="trace-bar-fill ${qual}" style="width:${pct}%"></div></div>
        </div>`;
      }).join('') + `<div class="net-note">Latency to major CDN and cloud endpoints. Lower is better; values reflect your network path to each provider.</div>`
    : `<div class="net-err">Path quality unavailable.</div>`;

  const navConnSaveData = navConn && navConn.saveData;
  const saveDataWarn = navConnSaveData ? `<div class="net-err" style="color:var(--warn);margin-bottom:8px">⚠ Data Saver is enabled — this test uses ~40 MB.</div>` : '';
  const speedCard = `<div class="net-note" style="margin:0 0 10px">Tests download speed via 4 parallel streams to Cloudflare's nearest edge. Uses ~40 MB of data.</div>${saveDataWarn}<button class="net-run-btn" id="net-speed-run-btn" type="button">▶ Run Speed Test</button>`;

  // ── Internet Health cards ──────────────────────────────────────────────────
  const DS_LABELS = {'ping-slash24':'Ping probes','bgp':'BGP routing','ucsd-nt':'Darknet'};

  let iodaCard;
  if (!iodaData) {
    iodaCard = `<div class="net-note" style="margin:0">Internet health data is only available when deployed (not in local mode).</div>`;
  } else if (iodaData._error) {
    iodaCard = `<div class="net-err">Unable to fetch IODA data — ${esc(iodaData._error)}</div>`;
  } else {
    // Response: { data: [{ location: "country/US", location_name: "United States", datasource, score }] }
    const events = Array.isArray(iodaData?.data) ? iodaData.data : [];
    if (!events.length) {
      iodaCard = mkNetMetric('Status', mkNetBadge('No anomalies detected', 'ok'))
        + `<div class="net-note">IODA monitors BGP routing and active probing across North America over the last 24 hours.</div>`;
    } else {
      // Group by country, keep highest-score event per country
      const byCountry = {};
      for (const e of events) {
        const code = (e.location || '').split('/')[1] || '??';
        if (!byCountry[code] || (e.score || 0) > (byCountry[code].score || 0)) {
          byCountry[code] = { ...e, _code: code };
        }
      }
      const entries = Object.values(byCountry).sort((a,b)=>(b.score||0)-(a.score||0)).slice(0,5);
      iodaCard = entries.map(e => {
        const dsLabel = DS_LABELS[e.datasource] || e.datasource || 'anomaly';
        const name = e.location_name || e._code;
        return mkNetMetric(esc(name), mkNetBadge(esc(dsLabel), 'warn'));
      }).join('') + `<div class="net-note">Source: IODA (Georgia Tech) · Last 24 h · North America</div>`;
    }
  }

  let radarCard;
  if (radarData?.noToken) {
    radarCard = `<div class="net-note" style="margin:0">Add a <code>CF_RADAR_TOKEN</code> Worker secret to enable Cloudflare Radar traffic anomaly data.</div>`;
  } else if (!radarData || radarData._error) {
    radarCard = radarData?._error
      ? `<div class="net-err">Radar fetch failed — ${esc(radarData._error)}</div>`
      : `<div class="net-note" style="margin:0">Radar data is only available when deployed.</div>`;
  } else {
    const anomalies = radarData?.result?.trafficAnomalies || [];
    if (!anomalies.length) {
      radarCard = mkNetMetric('Status', mkNetBadge('No traffic anomalies', 'ok'))
        + `<div class="net-note">Cloudflare Radar monitors verified traffic anomalies for the US, Canada, and Mexico.</div>`;
    } else {
      radarCard = anomalies.slice(0,4).map(a => {
        const loc = esc(a.location || '—');
        const desc = a.description ? esc(a.description.slice(0,45) + (a.description.length>45?'…':'')) : 'anomaly';
        const date = a.startDate ? new Date(a.startDate).toLocaleDateString() : '';
        return mkNetMetric(loc + (date ? `<span class="net-metric-date"> · ${esc(date)}</span>` : ''), mkNetBadge(desc, 'warn'));
      }).join('') + `<div class="net-note">Source: Cloudflare Radar · Verified anomalies · US, CA, MX</div>`;
    }
  }

  const container = document.getElementById('net-diag-container');
  if (!container) return;
  container.innerHTML = [
    mkNetCard('nc-connection', _netIcons.wifi,   'Your Connection',   connCard),
    mkNetCard('nc-cf-edge',   _netIcons.cloud,   'Cloudflare Edge',   cfCard),
    mkNetCard('nc-protocol',  _netIcons.lock,    'Protocol Support',  protoCard),
    mkNetCard('nc-dns',       _netIcons.server,  'DNS Information',   dnsCard),
    mkNetCard('nc-google',    _netIcons.globe,   'Google Edge',       gLatCard),
    mkNetCard('nc-trace',     _netIcons.signal,  'Path Quality',      traceCard),
    mkNetCard('nc-speed',     _netIcons.gauge,   'Speed Test',        speedCard),
    `<div class="net-section-hdr">Internet Health · North America</div>`,
    mkNetCard('nc-ioda',      _netIcons.signal,  'BGP &amp; Probe Anomalies', iodaCard),
    mkNetCard('nc-radar',     _netIcons.radar,   'Cloudflare Radar',  radarCard),
  ].join('');

  document.getElementById('net-speed-run-btn')?.addEventListener('click', runSpeedTest);
}

// Traceroute-lite: parallel latency to several major network endpoints
const _TRACE_HOPS=[
  {label:'Cloudflare CDN', url:'https://cloudflare.com/cdn-cgi/trace', noCors:false},
  {label:'Google Anycast',  url:'https://dns.google/generate_204',      noCors:true},
  {label:'Amazon AWS',      url:'https://checkip.amazonaws.com/',        noCors:true},
  // azure.microsoft.com redirects to CDN; management.azure.com is the actual Azure ARM endpoint
  {label:'Microsoft Azure', url:'https://management.azure.com/', noCors:true},
];
async function measureTraceroute(){
  const results=await Promise.allSettled(
    _TRACE_HOPS.map(h=>measureLatency(h.url,3,h.noCors).then(r=>({...h,lat:r})))
  );
  return results.map((r,i)=>r.status==='fulfilled'?r.value:{..._TRACE_HOPS[i],lat:null});
}

async function runNetworkDiag() {
  if (netDiagRunning) return;
  netDiagRunning = true;
  netDiagRan = true;

  const refreshBtn = document.getElementById('net-refresh-btn');
  if (refreshBtn) refreshBtn.disabled = true;

  const container = document.getElementById('net-diag-container');
  if (!container) { netDiagRunning = false; return; }

  // Show skeleton loading placeholders
  container.innerHTML = [
    mkNetCard('nc-connection', _netIcons.wifi,   'Your Connection',  mkShimmer()),
    mkNetCard('nc-cf-edge',   _netIcons.cloud,   'Cloudflare Edge',  mkShimmer()),
    mkNetCard('nc-protocol',  _netIcons.lock,    'Protocol Support', mkShimmer()),
    mkNetCard('nc-dns',       _netIcons.server,  'DNS Information',  mkShimmer()),
    mkNetCard('nc-google',    _netIcons.globe,   'Google Edge',      mkShimmer()),
    mkNetCard('nc-trace',     _netIcons.signal,  'Path Quality',     mkShimmer()),
    mkNetCard('nc-speed',     _netIcons.gauge,   'Speed Test',       mkShimmer()),
    `<div class="net-section-hdr">Internet Health · North America</div>`,
    mkNetCard('nc-ioda',      _netIcons.signal,  'BGP &amp; Probe Anomalies', mkShimmer()),
    mkNetCard('nc-radar',     _netIcons.radar,   'Cloudflare Radar', mkShimmer()),
  ].join('');

  const [cfTraceR, speedMetaR, ipInfoR, resolverIpR, cfLatR, gLatR, traceR, iodaR, radarR] = await Promise.allSettled([
    // Direct fetches — these endpoints support CORS and must bypass the proxy
    // so the returned IP/ISP/colo data reflects the *user's* connection, not the proxy server's.
    _netDirectText('https://cloudflare.com/cdn-cgi/trace').then(parseCFTrace),
    _netDirectJson('https://speed.cloudflare.com/meta'),
    // ip-api: direct-fetch only — proxy server IPs are blocked by ip-api as datacenter IPs.
    // Optional enrichment (city/country); failure is graceful since meta provides ISP/ASN.
    fetchWithTimeout('https://ip-api.com/json', 8000).then(r => r.ok ? r.json() : Promise.reject(r.status)).catch(() => ({})),
    // DoH resolver check — asks what DNS resolver Cloudflare sees
    detectDohResolver(),
    // Latency pings are already direct (fetchWithTimeout, no proxy)
    measureLatency('https://cloudflare.com/cdn-cgi/trace', 5),
    measureLatency('https://dns.google/generate_204', 5, true),
    // Traceroute-lite — parallel latency to major CDN/cloud endpoints
    measureTraceroute(),
    // Internet health — server-side proxy routes (dynamic timestamps / auth)
    _netProxyJson('ioda-na-outages').catch(e => ({ _error: String(e) })),
    _netProxyJson('radar-us-anomalies').catch(e => ({ _error: String(e) })),
  ]);

  _renderNetCards(
    cfTraceR.value   || {},
    speedMetaR.value || {},
    ipInfoR.value    || {},
    resolverIpR.value || null,
    cfLatR.value     || null,
    gLatR.value      || null,
    traceR.value     || [],
    iodaR.value      || null,
    radarR.value     || null
  );

  if (refreshBtn) refreshBtn.disabled = false;
  netDiagRunning = false;
}

async function runSpeedTest() {
  const btn = document.getElementById('net-speed-run-btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Testing… (~40 MB, 4 streams)'; }

  const [speedResult, latResult] = await Promise.all([
    measureDownloadSpeed(),
    measureLatency('https://cloudflare.com/cdn-cgi/trace', 8),
  ]);

  const card = document.getElementById('nc-speed');
  if (!card) {
    if (btn) { btn.disabled = false; btn.textContent = '▶ Run Speed Test'; }
    return;
  }
  const body = card.querySelector('.net-card-hdr');
  // Remove everything after the header
  let next = body && body.nextSibling;
  while (next) { const tmp = next.nextSibling; next.parentNode.removeChild(next); next = tmp; }

  if (speedResult) {
    const pct = Math.min(speedResult.mbps / 1000, 1) * 100;
    const qual = speedResult.mbps > 50 ? 'ok' : speedResult.mbps > 10 ? 'warn' : 'bad';
    const latStr = latResult ? latResult.min + ' ms min · ' + latResult.avg + ' ms avg' : '—';
    const html = `<div class="net-speed-row"><span class="net-speed-val">${speedResult.mbps}</span><span class="net-speed-unit">Mbps ↓</span></div>`
      + `<div class="speed-bar"><div class="speed-bar-fill" style="width:${pct}%;background:${qual==='ok'?'var(--ok)':qual==='warn'?'var(--warn)':'var(--bad)'}"></div></div>`
      + mkNetMetric('RTT (CF Edge)', latStr)
      + mkNetMetric('Test Duration', speedResult.elapsed + 's')
      + `<button class="net-run-btn" id="net-speed-run-btn" type="button">▶ Re-run Speed Test</button>`;
    card.insertAdjacentHTML('beforeend', html);
  } else {
    card.insertAdjacentHTML('beforeend',
      `<div class="net-err">Speed test failed — check connection or try again.</div>`
      + `<button class="net-run-btn" id="net-speed-run-btn" type="button">▶ Re-run Speed Test</button>`);
  }
  document.getElementById('net-speed-run-btn')?.addEventListener('click', runSpeedTest);
}

  document.getElementById('net-refresh-btn')?.addEventListener('click',()=>{
    netDiagRan=false;
    runNetworkDiag();
  });

  // Footer refresh button
  document.getElementById('f-refresh-btn')?.addEventListener('click',()=>{
    if(!isRefreshing) _startRefresh();
  });

  // Board mode — footer button and Escape to exit
  document.getElementById('f-board-btn')?.addEventListener('click',()=>{
    const url=new URL(window.location.href);
    url.searchParams.set('board','');
    window.location.assign(url.toString());
  });

  // Theme toggle (system → light → dark → system)
  const THEMES=['system','light','dark'];
  const THEME_ICONS={system:'☀',light:'☀',dark:'☾'};
  const THEME_TITLES={system:'Theme: system (click for light)',light:'Theme: light (click for dark)',dark:'Theme: dark (click for system)'};
  function applyTheme(t){
    if(t==='system') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.setAttribute('data-theme',t);
    const isDark=t==='dark'||(t==='system'&&window.matchMedia('(prefers-color-scheme: dark)').matches);
    document.documentElement.classList.toggle('light-mode',!isDark);
    document.querySelector('meta[name="theme-color"]')?.setAttribute('content',isDark?'#09090b':'#f4f4f5');
    const btn=document.getElementById('f-theme-btn');
    if(btn){ btn.textContent=THEME_ICONS[t]; btn.title=THEME_TITLES[t]; }
  }
  const _savedTheme=localStorage.getItem('theme')||'dark';
  applyTheme(_savedTheme);
  document.getElementById('f-theme-btn')?.addEventListener('click',()=>{
    const cur=localStorage.getItem('theme')||'system';
    const next=THEMES[(THEMES.indexOf(cur)+1)%THEMES.length];
    localStorage.setItem('theme',next);
    applyTheme(next);
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='Escape'&&_boardModeActive&&!e.defaultPrevented) exitBoardMode();
  });

  _applyBoardPageState();

  // Keyboard shortcuts (/, R, Escape-to-clear-search)
  document.addEventListener('keydown',e=>{
    if(e.target.matches('input,textarea,select,[contenteditable]')) return;
    if(e.metaKey||e.ctrlKey) return;
    if(e.key==='/'){ e.preventDefault(); document.querySelector('.svc-search')?.focus(); }
    else if(e.key==='r'||e.key==='R'){ e.preventDefault(); if(!isRefreshing) _startRefresh(); }
    else if(e.key==='Escape'&&!_boardModeActive){
      const srch=document.querySelector('.svc-search');
      if(srch&&srch.value){ srch.value=''; srch.dispatchEvent(new Event('input')); }
    }
  });

  // Pause/resume board network polling with page visibility
  document.addEventListener('visibilitychange', ()=>{
    if(_boardModeActive&&_boardNetTimer){
      if(document.hidden){
        clearInterval(_boardNetTimer);
        _boardNetTimer=null;
      } else {
        _startBoardNet();
      }
    }
    if(document.hidden) return;
    // Refresh data when the tab/window becomes visible again
    const staleThreshold = 3 * 60 * 1000;
    if(!lastSuccessfulRefresh || Date.now() - lastSuccessfulRefresh > staleThreshold){
      _startRefresh();
    }
  });

  init().then(()=>startPerServicePolling());
  scheduleRefresh();

  // Weather: fetch on load, then refresh every 15 minutes
  _fetchWeather();
  _wxTimer=setInterval(_fetchWeather, 15*60*1000);
  _fetchNowPlaying();
  _setNowPlayingPollRate(NP_POLL_NORMAL);
  // Running "time ago" timer — updates all card age timestamps every 30s
  setInterval(()=>{
    document.querySelectorAll('.card-age-ts[data-fetched-at]').forEach(el=>{
      const ts=parseInt(el.dataset.fetchedAt,10);
      if(!ts) return;
      el.textContent=fmtFetchAge(ts);
      el.classList.toggle('stale',(Date.now()-ts)>STALE_MS);
    });
  },30000);

  window.addEventListener('beforeunload',()=>{
    _pollIntervals.forEach(id=>clearInterval(id));
    clearInterval(refreshInterval);
    clearInterval(_wxTimer);
    clearInterval(_nowPlayingTimer);
    clearTimeout(_uptimeFlushTimer);
    _flushUptimeLog();
  });
});
</script>
</body>
</html>
