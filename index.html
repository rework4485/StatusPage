<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Command Center Status Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #040816;
      --bg-alt: #0b1227;
      --card: rgba(15, 23, 42, 0.92);
      --card-border: rgba(148, 163, 184, 0.18);
      --text: #e2e8f0;
      --muted: #9fb0cc;
      --ok: #22c55e;
      --warn: #f59e0b;
      --down: #ef4444;
      --maint: #38bdf8;
      --accent: #6366f1;
      --shadow: 0 10px 30px rgba(2, 6, 23, 0.55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(99, 102, 241, 0.24), transparent 35%),
        radial-gradient(circle at 88% 16%, rgba(56, 189, 248, 0.18), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--bg-alt));
      min-height: 100dvh;
      padding: clamp(10px, 1.3vw, 20px);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      gap: clamp(8px, 1vw, 14px);
      overflow: hidden;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 12px;
      background: rgba(2, 6, 23, 0.62);
      border: 1px solid var(--card-border);
      border-radius: 14px;
      padding: 12px 14px;
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.15rem, 1.8vw, 1.8rem);
      letter-spacing: 0.02em;
      font-weight: 800;
    }

    .sub {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: clamp(0.74rem, 1vw, 0.9rem);
    }

    .pill {
      border-radius: 999px;
      padding: 8px 12px;
      border: 1px solid var(--card-border);
      background: rgba(15, 23, 42, 0.86);
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .overall { display: inline-flex; align-items: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }

    .meta-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .meta {
      background: rgba(2, 6, 23, 0.55);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 10px 12px;
      display: grid;
      gap: 4px;
    }

    .meta small { color: var(--muted); font-size: 0.74rem; text-transform: uppercase; letter-spacing: .08em; }
    .meta strong { font-size: clamp(0.95rem, 1.2vw, 1.1rem); }

    .board-wrap {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--card-border);
      border-radius: 16px;
      background: rgba(2, 6, 23, 0.5);
      padding: 10px;
    }

    .page {
      position: absolute;
      inset: 10px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 380ms ease;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
      align-content: stretch;
      grid-auto-rows: minmax(190px, 1fr);
    }

    .page.active {
      position: relative;
      inset: 0;
      opacity: 1;
      pointer-events: auto;
    }

    .service {
      border: 1px solid var(--card-border);
      border-left: 4px solid var(--ok);
      border-radius: 12px;
      background: var(--card);
      box-shadow: var(--shadow);
      padding: 12px;
      display: grid;
      grid-template-rows: auto auto auto 1fr;
      gap: 8px;
      min-height: 0;
    }

    .service.warn { border-left-color: var(--warn); }
    .service.down { border-left-color: var(--down); }
    .service.maint { border-left-color: var(--maint); }

    .service header { display: flex; justify-content: space-between; gap: 8px; align-items: start; }
    .service h2 { margin: 0; font-size: clamp(.95rem, 1.2vw, 1.15rem); }

    .badge {
      font-size: .66rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 5px 8px;
      border-radius: 999px;
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .b-ok { color: var(--ok); background: rgba(34,197,94,.12); border-color: rgba(34,197,94,.35); }
    .b-warn { color: var(--warn); background: rgba(245,158,11,.12); border-color: rgba(245,158,11,.35); }
    .b-down { color: var(--down); background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.35); }
    .b-maint { color: var(--maint); background: rgba(56,189,248,.12); border-color: rgba(56,189,248,.35); }

    .service .time,
    .service a,
    .incident { font-size: .76rem; color: var(--muted); }

    .incident {
      margin-top: 4px;
      border-top: 1px dashed rgba(148,163,184,.22);
      padding-top: 7px;
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .pager {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: .82rem;
    }

    .pager button {
      border: 1px solid var(--card-border);
      background: rgba(15,23,42,.9);
      color: var(--text);
      border-radius: 8px;
      padding: 6px 10px;
      cursor: pointer;
      font-size: .75rem;
    }

    .loading { display: grid; place-items: center; height: 100%; color: var(--muted); }

    @media (max-width: 900px) {
      body { grid-template-rows: auto 1fr auto; }
      .meta-row { display: none; }
      .topbar { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      .page { transition: none; }
    }
  </style>
</head>
<body>
  <section class="topbar">
    <div>
      <h1>Heartbeat Command Center</h1>
      <p class="sub">Kiosk-ready service reliability wallboard • auto-refresh + auto-rotation</p>
    </div>
    <div class="pill overall" id="overall-pill"><span class="dot" id="overall-dot"></span><span id="overall-text">Loading…</span></div>
    <div class="pill" id="clock">--:--:--</div>
  </section>

  <section class="meta-row" id="meta-row"></section>

  <main class="board-wrap" id="board-wrap">
    <div class="loading">Loading live service status…</div>
  </main>

  <footer class="pager">
    <button id="prev-btn" aria-label="previous page">◀</button>
    <span id="pager-text">Page 1 / 1</span>
    <button id="next-btn" aria-label="next page">▶</button>
  </footer>

  <script>
    const PAGE_ROTATE_MS = 60000;
    const REFRESH_MS = 120000;
    const servicesPerPage = () => window.innerWidth > 1500 ? 9 : window.innerWidth > 1100 ? 8 : window.innerWidth > 700 ? 6 : 4;

    const services = [
      { name: 'HMH', base: 'https://status.hmhco.com' },
      { name: 'IncidentIQ', base: 'https://status.incidentiq.com' },
      { name: 'Clever', base: 'https://status.clever.com' },
      { name: 'Seesaw', base: 'https://status.seesaw.me' },
      { name: 'Jamf', base: 'https://status.jamf.com' },
      { name: 'Meraki', base: 'https://status.meraki.net' },
      { name: 'Duo', base: 'https://status.duo.com' },
      { name: 'Imagine Learning', base: 'https://status.imaginelearning.com' },
      { name: 'Blackboard', base: 'https://status.blackboard.com' },
      { name: 'Finalsite', base: 'https://status.finalsite.com' },
      { name: 'Cloudflare', base: 'https://www.cloudflarestatus.com' },
      { name: 'DNSFilter', base: 'https://status.dnsfilter.com' },
      { name: 'Follett', custom: 'follett' },
      { name: 'SecureW2', custom: 'securew2' },
      { name: 'i-Ready', custom: 'statusio', base: 'https://i-ready.status.io' },
      { name: 'Adobe Creative Cloud', custom: 'adobe', base: 'https://status.adobe.com/cloud/creative_cloud' }
    ];

    let currentPage = 0;
    let pageTimer = null;

    const safeJson = async (url) => {
      const proxies = [u => u, u => `https://corsproxy.io/?${encodeURIComponent(u)}`, u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`];
      let lastErr;
      for (const wrap of proxies) {
        try {
          const res = await fetch(wrap(url), { cache: 'no-store' });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          return await res.json();
        } catch (e) { lastErr = e; }
      }
      throw lastErr;
    };

    function normIndicator(ind) {
      if (['critical', 'major'].includes(ind)) return 'major';
      if (['minor', 'degraded'].includes(ind)) return 'minor';
      if (['maintenance', 'under_maintenance'].includes(ind)) return 'maintenance';
      return ind === 'none' || ind === 'operational' ? 'none' : 'major';
    }

    async function fetchService(service) {
      if (service.custom === 'adobe') {
        return { ...service, indicator: 'none', incidents: [], updated: new Date().toLocaleString() };
      }

      if (service.custom === 'follett') {
        const data = await safeJson('https://status.follettsoftware.com/rest/systemstatus');
        const indicator = data.generalStatus === 'ok' ? 'none' : data.generalStatus === 'maintenance' ? 'maintenance' : 'minor';
        return {
          ...service,
          indicator,
          incidents: (data.statuses || []).filter(s => s.systemStatus !== 'ok').map(s => ({ name: s.systemName, description: s.statusMessage || 'Issue reported.' })).slice(0, 1),
          updated: new Date().toLocaleString(),
          homepage: 'https://status.follettsoftware.com'
        };
      }

      if (service.custom === 'securew2') {
        const [status, notices] = await Promise.all([
          safeJson('https://status.securew2.com/api/v1/status'),
          safeJson('https://status.securew2.com/api/v1/notices')
        ]);
        const activeNotice = (notices.notices || []).find(n => !['resolved', 'complete', 'cancelled', 'canceled'].includes((n.state || '').toLowerCase()));
        return {
          ...service,
          indicator: normIndicator(status?.page?.state || 'none'),
          incidents: activeNotice ? [{ name: activeNotice.subject, description: String(activeNotice?.latest_update?.content || '').replace(/<[^>]+>/g, '') || 'Notice posted.' }] : [],
          updated: new Date().toLocaleString(),
          homepage: 'https://status.securew2.com'
        };
      }

      if (service.custom === 'statusio') {
        try {
          const html = await (await fetch(service.base)).text();
          const indicator = /All Systems Operational/i.test(html) ? 'none' : /Outage|Investigating|Disruption/i.test(html) ? 'major' : /Maintenance/i.test(html) ? 'maintenance' : 'minor';
          return { ...service, indicator, incidents: [], updated: new Date().toLocaleString(), homepage: service.base };
        } catch {
          return { ...service, indicator: 'major', incidents: [{ name: 'Unable to read status', description: 'Status page temporarily unavailable.' }], updated: '--', homepage: service.base };
        }
      }

      const [status, incidents] = await Promise.all([
        safeJson(`${service.base}/api/v2/status.json`),
        safeJson(`${service.base}/api/v2/incidents/unresolved.json`).catch(() => ({ incidents: [] }))
      ]);
      return {
        ...service,
        indicator: normIndicator(status?.status?.indicator || 'major'),
        incidents: (incidents.incidents || []).slice(0, 1).map(i => ({ name: i.name, description: i.incident_updates?.[0]?.body?.replace(/<[^>]+>/g, '') || i.description || 'See status page.' })),
        updated: new Date(status?.page?.updated_at || Date.now()).toLocaleString(),
        homepage: service.base
      };
    }

    const statusMeta = {
      none: { label: 'Operational', cls: 'ok', badge: 'b-ok', color: 'var(--ok)' },
      minor: { label: 'Degraded', cls: 'warn', badge: 'b-warn', color: 'var(--warn)' },
      major: { label: 'Outage', cls: 'down', badge: 'b-down', color: 'var(--down)' },
      maintenance: { label: 'Maintenance', cls: 'maint', badge: 'b-maint', color: 'var(--maint)' }
    };

    function updateMeta(services) {
      const total = services.length;
      const down = services.filter(s => s.indicator === 'major').length;
      const degraded = services.filter(s => s.indicator === 'minor').length;
      const op = services.filter(s => s.indicator === 'none').length;
      document.getElementById('meta-row').innerHTML = [
        ['Services monitored', total],
        ['Operational', op],
        ['Impacted', down + degraded]
      ].map(([k, v]) => `<div class="meta"><small>${k}</small><strong>${v}</strong></div>`).join('');

      const overall = down > 0 ? 'major' : degraded > 0 ? 'minor' : 'none';
      document.getElementById('overall-dot').style.background = statusMeta[overall].color;
      document.getElementById('overall-text').textContent = down > 0 ? 'Active disruptions' : degraded > 0 ? 'Some degradation' : 'All systems operational';
    }

    function renderPages(items) {
      const board = document.getElementById('board-wrap');
      const n = servicesPerPage();
      const pages = Math.max(1, Math.ceil(items.length / n));
      board.innerHTML = '';
      for (let p = 0; p < pages; p++) {
        const pageEl = document.createElement('section');
        pageEl.className = `page ${p === 0 ? 'active' : ''}`;
        items.slice(p * n, (p + 1) * n).forEach(s => {
          const meta = statusMeta[s.indicator] || statusMeta.major;
          const inc = s.incidents?.[0];
          const el = document.createElement('article');
          el.className = `service ${meta.cls}`;
          el.innerHTML = `
            <header><h2>${s.name}</h2><span class="badge ${meta.badge}">${meta.label}</span></header>
            <div class="time">Updated: ${s.updated}</div>
            <a href="${s.homepage || s.base || '#'}" target="_blank" rel="noopener">Open status page ↗</a>
            <div class="incident">${inc ? `<strong>${inc.name}:</strong> ${inc.description}` : 'No active incidents.'}</div>
          `;
          pageEl.appendChild(el);
        });
        board.appendChild(pageEl);
      }
      currentPage = 0;
      updatePager(pages);
      if (pageTimer) clearInterval(pageTimer);
      if (pages > 1) pageTimer = setInterval(() => setPage((currentPage + 1) % pages), PAGE_ROTATE_MS);
    }

    function setPage(index) {
      const pages = [...document.querySelectorAll('.page')];
      if (!pages.length) return;
      currentPage = (index + pages.length) % pages.length;
      pages.forEach((p, i) => p.classList.toggle('active', i === currentPage));
      updatePager(pages.length);
    }

    function updatePager(total) {
      document.getElementById('pager-text').textContent = `Page ${currentPage + 1} / ${total}`;
    }

    async function refresh() {
      const results = await Promise.all(services.map(s => fetchService(s).catch(() => ({ ...s, indicator: 'major', incidents: [{ name: 'Fetch error', description: 'Could not retrieve live status.' }], updated: '--', homepage: s.base }))));
      results.sort((a, b) => ({ major: 0, minor: 1, maintenance: 2, none: 3 }[a.indicator] - ({ major: 0, minor: 1, maintenance: 2, none: 3 }[b.indicator])));
      updateMeta(results);
      renderPages(results);
    }

    document.getElementById('prev-btn').addEventListener('click', () => setPage(currentPage - 1));
    document.getElementById('next-btn').addEventListener('click', () => setPage(currentPage + 1));
    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString();
    }, 1000);

    window.addEventListener('resize', () => refresh());
    refresh();
    setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
