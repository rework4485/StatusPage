<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Service Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#09090b">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Content-Security-Policy" content="object-src 'none'; base-uri 'self'">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%2322c55e'/><circle cx='16' cy='16' r='7' fill='%23fff'/></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" fetchpriority="high">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin fetchpriority="high">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ok: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --maint: #3b82f6;
      --reroute: #14b8a6;
      --unknown: #6b7280;
      --bg: #09090b;
      --card: #111113;
      --border: rgba(255,255,255,0.07);
      --text: #f4f4f5;
      --sub: #a1a1aa;
      --muted: #52525b;
      --font: 'Inter', system-ui, sans-serif;
    }
    /* ── Light mode ─────────────────────────────────────────────────────────── */
    :root[data-theme="light"] {
      --bg: #f4f4f5; --card: #ffffff; --border: rgba(0,0,0,0.09);
      --text: #18181b; --sub: #52525b; --muted: #a1a1aa;
    }
    @media (prefers-color-scheme: light) {
      :root:not([data-theme="dark"]) {
        --bg: #f4f4f5; --card: #ffffff; --border: rgba(0,0,0,0.09);
        --text: #18181b; --sub: #52525b; --muted: #a1a1aa;
      }
    }
    /* Light mode: flip transparent-white UI surfaces to transparent-black for readability */
    .light-mode .nav-tab,
    .light-mode .filter-chip,
    .light-mode .f-board-btn,
    .light-mode .f-refresh-btn,
    .light-mode .f-theme-btn,
    .light-mode .tv-exit-btn,
    .light-mode .test-btn,
    .light-mode .net-refresh-btn { background:rgba(0,0,0,0.04); border-color:rgba(0,0,0,0.12); }
    .light-mode .nav-tab.active,
    .light-mode .filter-chip.active { background:rgba(0,0,0,0.08); border-color:rgba(0,0,0,0.18); color:var(--text); }
    .light-mode .nav-tab:hover:not(.active),
    .light-mode .filter-chip:hover:not(.active),
    .light-mode .f-board-btn:hover,
    .light-mode .f-refresh-btn:hover,
    .light-mode .f-theme-btn:hover,
    .light-mode .tv-exit-btn:hover,
    .light-mode .net-refresh-btn:hover { background:rgba(0,0,0,0.08); border-color:rgba(0,0,0,0.16); }
    .light-mode .net-run-btn { background:rgba(0,0,0,0.04); border-color:rgba(0,0,0,0.12); }
    .light-mode .net-run-btn:hover { background:rgba(0,0,0,0.08); border-color:rgba(0,0,0,0.18); }
    .light-mode .svc-icon-wrap { background:rgba(0,0,0,0.05); }
    .light-mode .svc-row:hover { background:rgba(0,0,0,0.03); }
    .light-mode .svc-row:active { background:rgba(0,0,0,0.06); }
    .light-mode .spinner { border-color:rgba(0,0,0,0.1); border-top-color:#3b82f6; }
    .light-mode .card:hover { border-color:rgba(0,0,0,0.15); }
    .light-mode .status-label,
    .light-mode .meta-tag,
    .light-mode .issues-hdr-count { background:rgba(0,0,0,0.04); }
    .light-mode .net-card-icon { background:rgba(0,0,0,0.06); }
    .light-mode .net-badge-muted { background:rgba(0,0,0,0.04); }
    .light-mode .speed-bar { background:rgba(0,0,0,0.08); }
    .light-mode .tv-tile { background:rgba(0,0,0,0.02); border-color:rgba(0,0,0,0.08); }
    .light-mode .tv-tile:hover { background:rgba(0,0,0,0.05); opacity:1; }
    .light-mode .tv-tile-logo-fb { background:rgba(0,0,0,0.08); }
    .light-mode .tv-issue-tile { background:rgba(0,0,0,0.03); }
    .light-mode .tv-issue-tile.cb { background:rgba(239,68,68,0.07); }
    .light-mode .tv-issue-tile.cw { background:rgba(245,158,11,0.06); }
    .light-mode .tv-issue-tile.cm { background:rgba(59,130,246,0.06); }
    .light-mode .tv-issue-logo-fb { background:rgba(0,0,0,0.08); }
    .light-mode .tv-wx-card { background:rgba(0,0,0,0.03); }
    .light-mode .inc-body { scrollbar-color:rgba(0,0,0,0.15) transparent; }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      min-height:100%;
      background:var(--bg); color:var(--text);
      font-family:var(--font); -webkit-font-smoothing:antialiased;
    }
    body { overflow-y:auto; -webkit-overflow-scrolling:touch; }
    body::before,
    body::after {
      content:'';
      position:fixed;
      pointer-events:none;
      z-index:0;
      filter:blur(60px);
      opacity:0.22;
      animation:ambientFloat 18s ease-in-out infinite;
      will-change:transform;
    }
    body::before {
      width:44vw;
      height:44vw;
      top:-18vw;
      left:-10vw;
      background:radial-gradient(circle, rgba(59,130,246,0.42), transparent 65%);
    }
    body::after {
      width:40vw;
      height:40vw;
      right:-14vw;
      bottom:-16vw;
      background:radial-gradient(circle, rgba(124,58,237,0.3), transparent 70%);
      animation-delay:-7s;
    }
    @keyframes ambientFloat {
      0%, 100% { transform:translate3d(0, 0, 0) scale(1); }
      50% { transform:translate3d(0, -12px, 0) scale(1.08); }
    }
    .shell { min-height:100vh; display:flex; flex-direction:column; padding:20px 24px 16px; gap:16px; position:relative; z-index:1; animation:shellIn 0.75s cubic-bezier(.22,1,.36,1) both; }
    @keyframes shellIn { from { opacity:0; transform:translateY(10px) scale(.995); } to { opacity:1; transform:translateY(0) scale(1); } }
    .hdr {
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-shrink:0;
      flex-wrap:wrap;
      gap:24px;
      padding:6px 0 18px;
      border-bottom:1px solid rgba(255,255,255,0.07);
    }
    .brand { display:flex; align-items:flex-start; gap:11px; }
    .brand-icon {
      width:34px; height:34px; border-radius:9px; flex-shrink:0;
      background:linear-gradient(135deg,#1d4ed8,#7c3aed);
      display:flex; align-items:center; justify-content:center;
    }
    .brand-icon svg { width:17px; height:17px; }
    .brand-name { font-size:clamp(18px, 1.3vw, 28px); font-weight:700; letter-spacing:-0.025em; }
    .brand-sub { font-size:clamp(11px, 0.75vw, 15px); color:var(--sub); margin-top:2px; letter-spacing:0.01em; }
    .brand-meta { display:flex; flex-direction:column; gap:8px; }
    .incident-pin {
      display:none;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      max-width:min(52vw, 800px);
    }
    .incident-pin.show { display:flex; }
    .pin-chip {
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:5px 12px;
      border-radius:20px;
      font-size:clamp(13px, 0.85vw, 16px);
      font-weight:600;
      white-space:nowrap;
      letter-spacing:0.01em;
      border:1px solid transparent;
    }
    .pin-dot {
      width:8px;
      height:8px;
      border-radius:50%;
      flex-shrink:0;
      background:currentColor;
    }
    .chip-none { color:#86efac; background:rgba(34,197,94,0.09); border-color:rgba(34,197,94,0.22); }
    .chip-major { color:#fda4af; background:rgba(239,68,68,0.09); border-color:rgba(239,68,68,0.25); }
    .chip-minor { color:#fcd34d; background:rgba(245,158,11,0.09); border-color:rgba(245,158,11,0.25); }
    .chip-maintenance { color:#93c5fd; background:rgba(59,130,246,0.09); border-color:rgba(59,130,246,0.25); }
    .chip-rerouting { color:#5eead4; background:rgba(20,184,166,0.09); border-color:rgba(20,184,166,0.25); }
    .chip-unknown { color:#d4d4d8; background:rgba(107,114,128,0.1); border-color:rgba(107,114,128,0.25); }
    .hdr-left { display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-right:auto; }
    .hdr-right { display:flex; align-items:center; gap:20px; flex-wrap:wrap; justify-content:flex-end; }
    .stats { display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:flex-start; }
    .stat { display:flex; align-items:center; gap:5px; font-size:clamp(13px, 0.85vw, 17px); color:var(--sub); }
    .sdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .stat strong { color:var(--text); font-weight:700; font-size:clamp(15px, 1vw, 21px); }
    .stat.reroute-stat { display: none; }
    .stat.reroute-stat.show { display: flex; }
    .stat.unknown-stat { display: none; }
    .stat.unknown-stat.show { display: flex; }
    .test-btn {
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.05);
      color:var(--sub);
      border-radius:7px;
      padding:6px 12px;
      font-size:11px;
      font-weight:600;
      letter-spacing:0.05em;
      text-transform:uppercase;
      cursor:pointer;
      transition:all 0.2s ease;
      white-space:nowrap;
    }
    .test-btn:hover { background:rgba(255,255,255,0.09); color:var(--text); border-color:rgba(255,255,255,0.18); }
    .test-btn:active { transform:translateY(1px); }
    .divider { height:1px; background:var(--border); flex-shrink:0; }
    .view { display:none; }
    .view.active { display:block; }
    #services-grid {
      display:flex;
      flex-direction:column;
      gap:12px;
      padding-bottom:28px;
    }
    .loading { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; padding:60px 0; }
    .card.tile-in { animation:tileIn 0.5s cubic-bezier(.22,1,.36,1) both; animation-delay:var(--tile-delay, 0ms); }
    .card.tile-out { animation:tileOut 0.34s cubic-bezier(.4,0,.2,1) both; animation-delay:calc(var(--tile-delay, 0ms) * 0.4); }
    @keyframes tileIn { from { opacity:0; transform:translateY(18px) scale(0.98); filter:blur(3px); } to { opacity:1; transform:translateY(0) scale(1); filter:blur(0);} }
    @keyframes tileOut { from { opacity:1; transform:translateY(0) scale(1); filter:blur(0);} to { opacity:0; transform:translateY(-12px) scale(0.985); filter:blur(2px);} }
    .card {
      background:linear-gradient(170deg, rgba(255,255,255,0.02), transparent 44%), var(--card);
      border:1px solid var(--border); border-radius:16px;
      padding:12px 14px 10px; display:flex; flex-direction:column; position:relative; overflow:hidden;
      transition:border-color 0.3s, box-shadow 0.35s ease, transform 0.35s cubic-bezier(.22,1,.36,1); cursor:pointer; animation:cardIn 0.5s cubic-bezier(.22,1,.36,1) both;
      will-change:transform;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(14px) scale(.985)} to{opacity:1;transform:translateY(0) scale(1)} }
    .card:hover { border-color:rgba(255,255,255,0.17); transform:translateY(-4px); box-shadow:0 16px 26px rgba(0,0,0,0.34); }
    .card::before {
      content:''; position:absolute; left:0; top:16px; bottom:16px; width:3px;
      border-radius:0 3px 3px 0; background:var(--ok); opacity:0.7;
    }
    .card::after {
      content:'';
      position:absolute;
      inset:-1px;
      background:linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.08) 40%, transparent 60%);
      transform:translateX(-120%);
      transition:transform 0.8s ease;
      pointer-events:none;
    }
    .card:hover::after { transform:translateX(120%); }
    .card.cw::before { background:var(--warn); opacity:0.8; }
    .card.cb::before { background:var(--bad); opacity:0.9; }
    .card.cm::before { background:var(--maint); opacity:0.8; }
    .card.cr::before { background:var(--reroute); opacity:0.8; }
    .card.cu::before { background:var(--unknown); opacity:0.8; }
    .card.cb { border-color:rgba(239,68,68,0.16); background:linear-gradient(160deg, #111113, rgba(239,68,68,0.04)); box-shadow:0 0 32px rgba(239,68,68,0.08); }
    .card.cw { border-color:rgba(245,158,11,0.13); }
    .card.cu { border-color:rgba(107,114,128,0.16); background:linear-gradient(160deg, #111113, rgba(107,114,128,0.04)); }
    .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:10px; }
    .card-title-row { display:flex; align-items:center; gap:10px; min-width:0; flex:1; overflow:hidden; }
    .c-icon {
      width:42px; height:42px; border-radius:10px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:20px;
    }
    .c-icon.ok { background:rgba(34,197,94,0.1); color:var(--ok); }
    .c-icon.warn { background:rgba(245,158,11,0.1); color:var(--warn); }
    .c-icon.bad { background:rgba(239,68,68,0.1); color:var(--bad); }
    .c-icon.maint { background:rgba(59,130,246,0.1); color:var(--maint); }
    .c-icon.reroute { background:rgba(20,184,166,0.1); color:var(--reroute); }
    .c-icon.unknown { background:rgba(107,114,128,0.1); color:var(--unknown); }
    .c-logo { width:26px; height:26px; border-radius:5px; object-fit:contain; background:rgba(255,255,255,0.92); padding:2px; }
    .c-fallback { font-size:18px; font-weight:700; line-height:1; }
    .c-name { font-size:clamp(14px, 1.1vw, 20px); font-weight:700; letter-spacing:-0.02em; line-height:1.2; word-break:break-word; }
    .c-name-block { min-width:0; overflow:hidden; }
    .c-url { font-size:13px; color:var(--muted); margin-top:3px; text-decoration:none; display:inline-flex; align-items:center; gap:4px; transition:color 0.2s; }
    .c-url:hover { color:var(--sub); }
    .c-badge {
      flex-shrink:0; font-size:11px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase;
      padding:4px 10px; border-radius:7px; margin-top:2px;
    }
    .c-badge.ok { background:rgba(34,197,94,0.1); color:var(--ok); border:1px solid rgba(34,197,94,0.2); }
    .c-badge.warn { background:rgba(245,158,11,0.1); color:var(--warn); border:1px solid rgba(245,158,11,0.22); }
    .c-badge.bad { background:rgba(239,68,68,0.1); color:var(--bad); border:1px solid rgba(239,68,68,0.22); }
    .c-badge.maint { background:rgba(59,130,246,0.1); color:var(--maint); border:1px solid rgba(59,130,246,0.22); }
    .c-badge.reroute { background:rgba(20,184,166,0.1); color:var(--reroute); border:1px solid rgba(20,184,166,0.22); }
    .c-badge.unknown { background:rgba(107,114,128,0.1); color:var(--unknown); border:1px solid rgba(107,114,128,0.22); }
    .card-div { height:1px; background:var(--border); margin-bottom:10px; }
    .inc-block { border-radius:10px; padding:8px 10px; margin-bottom:6px; display:flex; flex-direction:column; min-height:0; overflow:hidden; }
    .inc-block.ok-block { background:rgba(34,197,94,0.05); border:1px solid rgba(34,197,94,0.1); }
    .inc-block.bad-block { background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.15); }
    .inc-block.warn-block { background:rgba(245,158,11,0.06); border:1px solid rgba(245,158,11,0.15); }
    .inc-block.maint-block { background:rgba(59,130,246,0.06); border:1px solid rgba(59,130,246,0.15); }
    .inc-block.reroute-block { background:rgba(20,184,166,0.06); border:1px solid rgba(20,184,166,0.15); }
    .inc-block.unknown-block { background:rgba(107,114,128,0.06); border:1px solid rgba(107,114,128,0.15); }
    .inc-label { font-size:10px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); margin-bottom:3px; display:flex; align-items:center; gap:5px; }
    .inc-label-dot { width:6px; height:6px; border-radius:50%; background:currentColor; }
    .inc-title { font-size:clamp(13px, 1vw, 18px); font-weight:600; color:var(--text); line-height:1.35; margin-bottom:4px; overflow-wrap:anywhere; }
    .inc-body { font-size:clamp(12px, 0.9vw, 15px); color:var(--sub); line-height:1.5; display:block; overflow-wrap:anywhere; white-space:pre-wrap; max-height:160px; overflow-y:auto; }
    .inc-body::-webkit-scrollbar { width:4px; }
    .inc-body::-webkit-scrollbar-track { background:transparent; }
    .inc-body::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.12); border-radius:2px; }
    .status-labels { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
    .status-label { font-size:12px; letter-spacing:0.04em; text-transform:uppercase; color:var(--sub); border:1px solid var(--border); background:rgba(255,255,255,0.04); padding:3px 7px; border-radius:999px; }
    .card-meta { display:flex; align-items:center; justify-content:space-between; padding-top:5px; border-top:1px solid var(--border); margin-top:6px; gap:8px; }
    .meta-updated { font-size:11.5px; color:var(--muted); display:flex; align-items:center; gap:5px; flex-wrap:wrap; min-width:0; }
    .meta-updated svg { width:11px; height:11px; opacity:0.5; flex-shrink:0; }
    .meta-tag { font-size:11px; font-weight:600; color:var(--muted); padding:3px 9px; border-radius:5px; background:rgba(255,255,255,0.05); border:1px solid var(--border); white-space:nowrap; flex-shrink:0; }

    /* ── Issues section (top panel) ─────────────────────────────────────────── */
    .issues-section { display:flex; flex-direction:column; gap:10px; }
    .issues-hdr { display:flex; align-items:center; gap:10px; font-size:11px; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--sub); }
    .issues-hdr::before { content:''; width:7px; height:7px; border-radius:50%; background:var(--warn); animation:stalePulse 1.8s ease-in-out infinite; flex-shrink:0; }
    .issues-hdr.has-outage::before { background:var(--bad); }
    .issues-hdr-count { font-size:10px; font-weight:500; color:var(--muted); background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:1px 7px; border-radius:999px; }
    .issues-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:10px; align-items:start; }

    /* ── Service directory (bottom panel) ───────────────────────────────────── */
    .svc-directory { display:flex; flex-direction:column; gap:10px; }
    .svc-cat-sec { display:flex; flex-direction:column; gap:6px; }
    .svc-cat-hdr { display:flex; align-items:center; gap:10px; font-size:11px; font-weight:700; letter-spacing:0.09em; text-transform:uppercase; color:var(--sub); padding:2px 0; }
    .svc-cat-hdr::after { content:''; flex:1; height:1px; background:var(--border); }
    .svc-cat-badge { font-size:10px; font-weight:600; letter-spacing:0.03em; padding:2px 8px; border-radius:5px; white-space:nowrap; flex-shrink:0; }
    .svc-cat-badge.ok { color:var(--ok); background:rgba(34,197,94,0.08); border:1px solid rgba(34,197,94,0.18); }
    .svc-cat-badge.warn { color:var(--warn); background:rgba(245,158,11,0.08); border:1px solid rgba(245,158,11,0.2); }
    .svc-cat-badge.bad { color:var(--bad); background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.2); }
    .svc-table { background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    .svc-row { display:grid; grid-template-columns:auto auto 1fr auto; align-items:center; gap:10px; padding:8px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.15s; min-height:40px; }
    .svc-row:last-child { border-bottom:none; }
    .svc-row:hover { background:rgba(255,255,255,0.035); }
    .svc-row:active { background:rgba(255,255,255,0.065); }
    .svc-row:focus-visible { outline:2px solid rgba(59,130,246,0.6); outline-offset:-2px; background:rgba(255,255,255,0.035); }
    .card:focus-visible { outline:2px solid rgba(59,130,246,0.6); outline-offset:2px; }
    .nav-tab:focus-visible,.filter-chip:focus-visible,
    .f-board-btn:focus-visible,.f-theme-btn:focus-visible,.f-refresh-btn:focus-visible,
    .test-btn:focus-visible,.net-refresh-btn:focus-visible,.net-run-btn:focus-visible,
    .tv-exit-btn:focus-visible { outline:2px solid rgba(59,130,246,0.6); outline-offset:2px; }
    .svc-search:focus-visible { outline:2px solid rgba(59,130,246,0.6); outline-offset:-2px; }
    .svc-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; transition:box-shadow 0.3s; }
    .svc-row:hover .svc-dot { box-shadow:0 0 0 3px rgba(255,255,255,0.05); }
    .svc-icon-wrap { width:30px; height:30px; border-radius:7px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:700; background:rgba(255,255,255,0.04); overflow:hidden; }
    .svc-icon-wrap img { width:22px; height:22px; border-radius:3px; object-fit:contain; background:rgba(255,255,255,0.9); padding:1px; }
    .svc-name { font-size:13.5px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; }
    .svc-inc-preview { font-size:12px; color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; min-width:0; display:none; }
    @media (min-width:768px) { .svc-row { grid-template-columns:auto auto 1fr minmax(0,2fr) auto; } .svc-inc-preview { display:block; } }
    .svc-badge { font-size:10px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; padding:3px 8px; border-radius:5px; flex-shrink:0; white-space:nowrap; }
    .svc-badge.ok { color:var(--ok); background:rgba(34,197,94,0.1); border:1px solid rgba(34,197,94,0.18); }
    .svc-badge.warn { color:var(--warn); background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.2); }
    .svc-badge.bad { color:var(--bad); background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.2); }
    .svc-badge.maint { color:var(--maint); background:rgba(59,130,246,0.1); border:1px solid rgba(59,130,246,0.2); }
    .svc-badge.reroute { color:var(--reroute); background:rgba(20,184,166,0.1); border:1px solid rgba(20,184,166,0.18); }
    .svc-badge.unknown { color:var(--unknown); background:rgba(107,114,128,0.1); border:1px solid rgba(107,114,128,0.18); }

    /* Net Connection widget */
    .footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:16px; }
    .f-left { display:flex; align-items:center; gap:20px; }
    .f-meta { font-size:12px; color:var(--muted); }
    .spinner { width:32px; height:32px; border:2.5px solid rgba(255,255,255,0.07); border-top-color:#3b82f6; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .load-t { font-size:13px; color:var(--muted); }
    .status-banner-wrap {
      position:fixed;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      width:min(1080px, calc(100vw - 28px));
      z-index:45;
      pointer-events:none;
    }
    .status-banner {
      border-radius:16px;
      border:1px solid transparent;
      background:linear-gradient(165deg, rgba(24,24,27,0.97), rgba(9,9,11,0.93));
      backdrop-filter:blur(10px);
      box-shadow:0 18px 48px rgba(0,0,0,0.55);
      overflow:hidden;
      opacity:0;
      visibility:hidden;
      transform:translateY(-14px) scale(0.99);
      transition:opacity 0.36s cubic-bezier(.22,1,.36,1), transform 0.36s cubic-bezier(.22,1,.36,1), visibility 0.36s;
    }
    .status-banner.show { opacity:1; visibility:visible; transform:translateY(0) scale(1); animation:bannerPop 0.42s cubic-bezier(.22,1,.36,1); }
    .status-banner::before {
      content:'';
      position:absolute;
      inset:0;
      background:linear-gradient(105deg, transparent 22%, rgba(255,255,255,0.09) 50%, transparent 78%);
      transform:translateX(-130%);
      opacity:0;
      pointer-events:none;
    }
    .status-banner.show::before {
      opacity:1;
      animation:bannerShine 0.75s ease;
    }
    .status-banner.degraded { border-color:rgba(245,158,11,0.78); }
    .status-banner.outage { border-color:rgba(239,68,68,0.86); animation:outagePulse 0.95s ease-in-out infinite; }
    .status-banner.restored { border-color:rgba(34,197,94,0.72); }
    .status-banner-main { display:flex; align-items:center; gap:18px; padding:22px 26px; animation:bannerContentIn 0.45s cubic-bezier(.22,1,.36,1); }
    .status-banner-icon { font-size:42px; line-height:1; animation:iconBounce 1.4s ease-in-out infinite; }
    .status-banner-text { min-width:0; }
    .status-banner-heading {
      font-size:16px;
      letter-spacing:0.09em;
      text-transform:uppercase;
      font-weight:800;
      margin-bottom:4px;
    }
    .status-banner-title { font-size:32px; font-weight:800; letter-spacing:-0.02em; line-height:1.1; }
    .status-banner-sub { font-size:18px; color:var(--sub); margin-top:6px; }
    .status-banner.degraded .status-banner-heading { color:#fcd34d; }
    .status-banner.outage .status-banner-heading { color:#fecaca; }
    .status-banner.restored .status-banner-heading { color:#86efac; }
    .status-banner-time {
      height:5px;
      transform-origin:left;
      animation:bannerLife var(--banner-duration,30s) linear forwards;
    }
    .status-banner.degraded .status-banner-time { background:linear-gradient(90deg,#f59e0b,#f97316); }
    .status-banner.outage .status-banner-time { background:linear-gradient(90deg,#ef4444,#dc2626); }
    .status-banner.restored .status-banner-time { background:linear-gradient(90deg,#22c55e,#14b8a6); }
    @keyframes bannerLife { from { transform:scaleX(1); } to { transform:scaleX(0); } }
    @keyframes bannerPop { from { opacity:0; transform:translateY(-14px) scale(0.985); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes bannerShine { from { transform:translateX(-130%); } to { transform:translateX(130%); } }
    @keyframes bannerContentIn {
      from { opacity:0; transform:translateY(-6px); }
      to { opacity:1; transform:translateY(0); }
    }
    @keyframes iconBounce {
      0%, 100% { transform:translateY(0) scale(1); }
      50% { transform:translateY(-2px) scale(1.04); }
    }
    @keyframes outagePulse {
      0%, 100% { box-shadow:0 18px 48px rgba(0,0,0,0.55), 0 0 0 0 rgba(239,68,68,0.42); }
      50% { box-shadow:0 18px 48px rgba(0,0,0,0.55), 0 0 0 14px rgba(239,68,68,0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation:none !important;
        transition:none !important;
      }
    }

    @media (min-width: 1600px) {
      .incident-pin { max-width:min(54vw, 900px); }
      .c-badge { font-size:clamp(14px, 0.9vw, 18px); }
      .meta-updated { font-size:clamp(13px, 0.82vw, 16px); }
      .meta-tag { font-size:clamp(12px, 0.78vw, 15px); }
    }

    @media (max-width: 1200px) {
      .incident-pin { max-width:100%; }
    }

    /* Stale data warning badge */
    .stale-badge {
      display:none; align-items:center; gap:6px;
      padding:4px 11px; border-radius:6px; font-size:11px; font-weight:600;
      background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.22);
      color:var(--bad); letter-spacing:0.05em; text-transform:uppercase;
      white-space:nowrap;
    }
    .stale-badge.show { display:flex; animation:stalePulse 3s ease-in-out infinite; }
    @keyframes stalePulse {
      0%,100% { opacity:1; } 50% { opacity:0.55; }
    }

    /* Refresh spinner shown while data is fetching */
    .refresh-spinner {
      width:15px; height:15px; border:2px solid rgba(255,255,255,0.1);
      border-top-color:rgba(161,161,170,0.7); border-radius:50%;
      flex-shrink:0; opacity:0; transition:opacity 0.35s;
      animation:spin 0.9s linear infinite;
    }
    .refresh-spinner.active { opacity:1; }

    /* Hide test button unless header is hovered — not distracting during normal kiosk display */
    .hdr:not(:hover) .test-btn { opacity:0; pointer-events:none; }
    .test-btn { transition:opacity 0.3s ease, background 0.2s ease, color 0.2s ease, border-color 0.2s ease, transform 0.15s ease; }


    /* ── Nav tabs ────────────────────────────────────────────────────────────── */
    .nav-tabs { display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .nav-tab { border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--sub); border-radius:8px; padding:7px 16px; font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; letter-spacing:0.01em; font-family:var(--font); display:inline-flex; align-items:center; gap:0; }
    .nav-tab.active { background:rgba(255,255,255,0.1); color:var(--text); border-color:rgba(255,255,255,0.2); }
    .nav-tab:hover:not(.active) { background:rgba(255,255,255,0.07); color:var(--text); }
    .tab-badge { display:inline-flex; align-items:center; justify-content:center; background:rgba(239,68,68,0.18); color:#fca5a5; border-radius:10px; font-size:10px; font-weight:700; padding:1px 5px; min-width:17px; margin-left:6px; line-height:1.4; letter-spacing:0; }
    .nav-tab.active .tab-badge { background:rgba(239,68,68,0.22); }
    .light-mode .tab-badge { background:rgba(239,68,68,0.12); color:#dc2626; }

    /* ── Network diagnostics view ─────────────────────────────────────────── */
    .net-header { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; padding:4px 0 20px; }
    .net-title { font-size:18px; font-weight:700; letter-spacing:-0.02em; }
    .net-sub { font-size:13px; color:var(--sub); margin-top:3px; }
    .net-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:16px; padding-bottom:28px; }
    .net-section-hdr { grid-column:1/-1; padding:12px 0 4px; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:var(--sub); border-bottom:1px solid var(--border); margin-bottom:2px; }
    .net-metric-date { font-weight:400; color:var(--sub); }
    .net-card-hdr { display:flex; align-items:center; gap:10px; margin-bottom:14px; }
    .net-card-icon { width:34px; height:34px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; background:rgba(255,255,255,0.06); }
    .net-card-icon svg { width:17px; height:17px; }
    .net-card-title { font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--sub); }
    .net-metric { display:flex; align-items:baseline; justify-content:space-between; gap:8px; padding:7px 0; border-bottom:1px solid var(--border); font-size:13px; }
    .net-metric:last-child { border-bottom:none; }
    .net-metric-label { color:var(--sub); flex-shrink:0; }
    .net-metric-val { color:var(--text); font-weight:600; text-align:right; word-break:break-all; min-width:0; }
    /* Stacked layout for long values like IPv6 addresses */
    .net-metric-stack { flex-direction:column; align-items:flex-start; gap:3px; }
    .net-metric-stack .net-metric-val { text-align:left; font-size:12px; font-family:monospace; letter-spacing:-0.01em; width:100%; }
    .net-badge { display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:2px 8px; border-radius:5px; }
    .net-badge-ok   { background:rgba(34,197,94,0.1);  color:#86efac; border:1px solid rgba(34,197,94,0.2); }
    .net-badge-warn { background:rgba(245,158,11,0.1); color:#fcd34d; border:1px solid rgba(245,158,11,0.2); }
    .net-badge-bad  { background:rgba(239,68,68,0.1);  color:#fda4af; border:1px solid rgba(239,68,68,0.2); }
    .net-badge-muted{ background:rgba(255,255,255,0.05); color:var(--sub); border:1px solid var(--border); }
    .speed-bar { height:6px; border-radius:3px; background:rgba(255,255,255,0.07); margin:10px 0 4px; overflow:hidden; }
    .speed-bar-fill { height:100%; border-radius:3px; background:linear-gradient(90deg, var(--ok), #16a34a); transition:width 0.5s ease; width:0%; }
    .net-run-btn { width:100%; margin-top:12px; padding:9px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.12); border-radius:8px; color:var(--text); font-size:13px; font-weight:600; font-family:var(--font); cursor:pointer; transition:all 0.2s; }
    .net-run-btn:hover { background:rgba(255,255,255,0.1); border-color:rgba(255,255,255,0.2); }
    .net-run-btn:disabled { opacity:0.5; cursor:not-allowed; }
    .net-shimmer { background:linear-gradient(90deg,rgba(255,255,255,0.04) 25%,rgba(255,255,255,0.08) 50%,rgba(255,255,255,0.04) 75%); background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:4px; height:14px; margin:8px 0; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
    .net-shimmer-wide  { width:100%; }
    .net-shimmer-mid   { width:70%; }
    .net-shimmer-short { width:45%; }
    .net-refresh-btn { border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.05); color:var(--sub); border-radius:7px; padding:6px 12px; font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer; font-family:var(--font); transition:all 0.2s; white-space:nowrap; flex-shrink:0; }
    .net-refresh-btn:hover { background:rgba(255,255,255,0.09); color:var(--text); }
    .net-refresh-btn:disabled { opacity:0.4; cursor:not-allowed; }
    .net-note { font-size:11px; color:var(--muted); margin-top:10px; line-height:1.5; }
    .net-speed-val { font-size:28px; font-weight:800; letter-spacing:-0.03em; color:var(--text); line-height:1; }
    .net-speed-unit { font-size:13px; color:var(--sub); margin-left:4px; font-weight:500; }
    .net-speed-row { display:flex; align-items:baseline; gap:0; margin:4px 0 2px; }
    .net-err { color:var(--warn); font-size:12px; padding:6px 0; }


    /* Issues grid responsive */
    .issues-grid { container-type:inline-size; }

    /* ── Weather bar ─────────────────────────────────────────────────────────── */
    .weather-bar { display:none; align-items:center; gap:8px 14px; flex-wrap:wrap; padding:7px 14px; background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:10px; margin-bottom:8px; font-size:13px; color:var(--sub); }
    .weather-bar.show { display:flex; }
    .light-mode .weather-bar { background:rgba(0,0,0,0.03); }
    .wx-icon { font-size:1.3em; line-height:1; flex-shrink:0; }
    .wx-temp { font-weight:700; color:var(--text); }
    .wx-cond { color:var(--sub); }
    .wx-loc { color:var(--muted); font-size:0.88em; }
    .wx-sep { color:var(--border); }
    .wx-alert { display:inline-flex; align-items:center; gap:5px; background:rgba(245,158,11,0.1); border:1px solid rgba(245,158,11,0.25); border-radius:20px; padding:2px 10px; font-size:12px; font-weight:600; color:#fbbf24; white-space:nowrap; }
    .wx-alert.warn-major { background:rgba(239,68,68,0.1); border-color:rgba(239,68,68,0.3); color:#f87171; }
    .wx-updated { margin-left:auto; font-size:11px; color:var(--muted); white-space:nowrap; }
    /* Board weather card */
    .tv-wx-card { display:flex; align-items:center; gap:clamp(12px,1.5vw,22px); padding:clamp(10px,1.3vh,18px) clamp(16px,1.8vw,28px); background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:14px; flex-shrink:0; overflow:hidden; min-width:0; }
    .tv-wx-now { display:flex; align-items:center; gap:clamp(10px,1.2vw,18px); flex-shrink:0; }
    .tv-wx-divider { width:1px; align-self:stretch; background:rgba(255,255,255,0.1); flex-shrink:0; margin:0 clamp(4px,0.5vw,8px); }
    .tv-wx-forecast { display:flex; align-items:center; gap:clamp(10px,1.2vw,20px); flex-shrink:0; }
    .tv-wx-hour { display:flex; flex-direction:column; align-items:center; gap:3px; min-width:clamp(38px,4vw,60px); }
    .tv-wx-hr-time { font-size:clamp(11px,0.95vw,15px); font-weight:700; color:var(--muted); letter-spacing:0.04em; text-transform:uppercase; white-space:nowrap; }
    .tv-wx-hr-icon { font-size:clamp(22px,2.5vw,36px); line-height:1; }
    .tv-wx-hr-temp { font-size:clamp(15px,1.4vw,22px); font-weight:700; color:var(--text); font-variant-numeric:tabular-nums; }
    .tv-wx-icon-big { font-size:clamp(52px,6vw,88px); line-height:1; flex-shrink:0; }
    .tv-wx-details-col { display:flex; flex-direction:column; gap:2px; min-width:0; }
    .tv-wx-temp-big { font-size:clamp(44px,5.2vw,78px); font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-0.02em; line-height:1.1; }
    .tv-wx-cond { font-size:clamp(22px,2.5vw,36px); color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tv-wx-loc { font-size:clamp(17px,1.6vw,25px); color:var(--muted); white-space:nowrap; }
    .tv-wx-alerts { display:flex; flex-direction:column; gap:4px; margin-left:auto; flex-shrink:0; padding-left:10px; }
    .tv-wx-alert-tag { font-size:clamp(13px,1.2vw,20px); font-weight:700; color:#fbbf24; background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.35); border-radius:6px; padding:6px 12px; white-space:nowrap; }
    .tv-wx-alert-tag.wx-major { color:#f87171; background:rgba(239,68,68,0.15); border-color:rgba(239,68,68,0.35); }

    /* ── Status summary banner ───────────────────────────────────────────────── */
    .status-summary { display:none !important; align-items:center; justify-content:space-between; gap:12px; padding:9px 16px; border-radius:11px; margin-bottom:4px; font-size:13.5px; font-weight:600; letter-spacing:0.01em; }
    .status-summary.show { display:none !important; }
    .status-summary.ok { background:rgba(34,197,94,0.06); border:1px solid rgba(34,197,94,0.15); color:#4ade80; }
    .status-summary.warn { background:rgba(245,158,11,0.07); border:1px solid rgba(245,158,11,0.2); color:#fbbf24; }
    .status-summary.bad { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.22); color:#f87171; }
    .status-summary-count { font-size:12px; font-weight:400; opacity:0.6; }

    /* ── Status filter chips ─────────────────────────────────────────────────── */
    .filter-bar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:4px 0 8px; }
    .filter-chip { border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--sub); border-radius:20px; padding:5px 14px; font-size:12px; font-weight:600; cursor:pointer; transition:all 0.2s; font-family:var(--font); white-space:nowrap; }
    .filter-chip:hover:not(.active) { background:rgba(255,255,255,0.07); color:var(--text); }
    .filter-chip.active { background:rgba(255,255,255,0.1); color:var(--text); border-color:rgba(255,255,255,0.2); }
    .filter-chip.active.fc-bad  { background:rgba(239,68,68,0.12);  color:#f87171; border-color:rgba(239,68,68,0.3); }
    .filter-chip.active.fc-warn { background:rgba(245,158,11,0.1);  color:#fbbf24; border-color:rgba(245,158,11,0.25); }
    .filter-chip.active.fc-maint{ background:rgba(59,130,246,0.1);  color:#93c5fd; border-color:rgba(59,130,246,0.25); }

    /* ── TV / Status board mode ──────────────────────────────────────────────── */
    .tv-board { position:fixed; inset:0; background:var(--bg); z-index:200; display:flex; flex-direction:column; padding:clamp(16px,1.8vh,28px) clamp(22px,2.2vw,40px) clamp(12px,1.4vh,22px); overflow:hidden; animation:board-in 0.4s cubic-bezier(.22,1,.36,1) both; }
    @keyframes board-in { from{opacity:0;transform:scale(0.997)} to{opacity:1;transform:scale(1)} }
    .board-page .shell,
    .board-page .status-banner-wrap { display:none !important; }
    .board-page .tv-board { position:relative; inset:auto; min-height:100vh; }
    /* Header */
    .tv-hdr { display:grid; grid-template-columns:minmax(0,1.5fr) minmax(0,1fr) auto; align-items:center; gap:clamp(16px,1.8vw,30px); padding-bottom:clamp(10px,1.2vh,18px); border-bottom:1px solid rgba(255,255,255,0.08); flex-shrink:0; margin-bottom:clamp(10px,1.1vh,18px); }
    /* Weather in header */
    .tv-hdr-weather { display:flex; align-items:center; gap:clamp(12px,1.4vw,22px); min-width:0; overflow:hidden; }
    .tv-hdr-weather .tv-wx-now { gap:clamp(10px,1.1vw,18px); }
    .tv-hdr-weather .tv-wx-icon-big { font-size:clamp(44px,4.8vw,74px); }
    .tv-hdr-weather .tv-wx-temp-big { font-size:clamp(32px,3.6vw,56px); letter-spacing:-0.02em; }
    .tv-hdr-weather .tv-wx-cond { font-size:clamp(16px,1.6vw,26px); }
    .tv-hdr-weather .tv-wx-loc { font-size:clamp(13px,1.1vw,19px); }
    .tv-hdr-weather .tv-wx-alert-tag { font-size:clamp(12px,1.1vw,18px); padding:5px 12px; }
    .tv-hdr-weather .tv-wx-hr-icon { font-size:clamp(22px,2.6vw,38px); }
    .tv-hdr-weather .tv-wx-hr-temp { font-size:clamp(14px,1.4vw,21px); }
    .tv-hdr-weather .tv-wx-hr-time { font-size:clamp(10px,0.9vw,15px); }
    .tv-hdr-weather .tv-wx-divider { margin:0 clamp(4px,0.4vw,8px); }
    .tv-hdr-weather .tv-wx-forecast { gap:clamp(10px,1vw,16px); }
    .tv-hdr-weather .tv-wx-hour { min-width:clamp(34px,3.5vw,54px); }
    /* Now playing + audio in header */
    .tv-hdr-media { display:flex; flex-direction:column; align-items:flex-start; gap:clamp(5px,0.6vh,9px); min-width:0; justify-content:center; }
    .tv-now-playing { display:flex; flex-direction:row; align-items:center; gap:clamp(8px,0.9vw,14px); min-width:0; width:100%; }
    .tv-np-text { display:flex; flex-direction:column; gap:2px; min-width:0; flex:1; }
    .tv-np-cover { width:clamp(36px,3.8vw,60px); height:clamp(36px,3.8vw,60px); border-radius:6px; object-fit:cover; flex-shrink:0; }
    .tv-now-playing-label { font-size:clamp(10px,0.85vw,14px); font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); }
    .tv-now-playing-track { font-size:clamp(18px,1.9vw,32px); font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
    .tv-now-playing-meta { font-size:clamp(14px,1.4vw,22px); color:var(--sub); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
    .tv-np-duck-label { display:none; font-size:clamp(10px,0.82vw,13px); font-weight:600; color:var(--muted); letter-spacing:0.06em; text-transform:uppercase; }
    .tv-np-ducked .tv-now-playing-track,
    .tv-np-ducked .tv-now-playing-meta { opacity:0.35; transition:opacity 0.4s; }
    .tv-np-ducked .tv-np-duck-label { display:block; }
    .tv-ctx-audio { display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .tv-station-select { border:none; border-bottom:1px solid rgba(255,255,255,0.22); background:transparent; color:var(--text); border-radius:0; padding:3px 18px 3px 0; font-size:clamp(11px,0.88vw,14px); font-weight:600; font-family:var(--font); }
    .tv-station-select:focus { outline:none; border-bottom-color:rgba(59,130,246,0.8); }
    .tv-radio-toggle { display:inline-flex; align-items:center; gap:6px; border:none; border-bottom:1px solid rgba(255,255,255,0.22); border-radius:0; padding:3px 0; background:transparent; color:var(--sub); font-size:clamp(11px,0.88vw,14px); font-weight:600; cursor:pointer; }
    .tv-radio-toggle input { accent-color:#22c55e; width:13px; height:13px; cursor:pointer; }
    .tv-radio-toggle span { color:var(--text); }
    .tv-radio-vol-slider { -webkit-appearance:none; appearance:none; width:clamp(44px,4.5vw,72px); height:3px; border-radius:2px; background:rgba(255,255,255,0.2); outline:none; cursor:pointer; flex-shrink:0; align-self:center; }
    .tv-radio-vol-slider::-webkit-slider-thumb { -webkit-appearance:none; width:11px; height:11px; border-radius:50%; background:var(--text); cursor:pointer; }
    .tv-radio-vol-slider::-moz-range-thumb { width:11px; height:11px; border-radius:50%; background:var(--text); border:none; cursor:pointer; }
    /* Clock */
    .tv-clock-block { display:flex; flex-direction:column; align-items:flex-end; gap:0; flex-shrink:0; }
    .tv-clock { font-size:clamp(28px,3.2vw,54px); font-weight:800; font-variant-numeric:tabular-nums; color:var(--text); letter-spacing:-0.02em; line-height:1.1; }
    .tv-date { font-size:clamp(11px,0.95vw,16px); color:var(--muted); font-weight:500; letter-spacing:0.03em; white-space:nowrap; font-variant-numeric:tabular-nums; }
    /* Section label */
    .tv-section-hdr { font-size:clamp(10px,0.85vw,14px); font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:clamp(6px,0.7vh,10px); display:flex; align-items:center; gap:6px; flex-shrink:0; }
    .tv-section-hdr.issue-hdr { color:rgba(248,113,113,0.85); }
    /* Issue tiles */
    .tv-issues-section { flex:1 1 auto; margin-bottom:clamp(8px,1vh,16px); min-height:0; display:flex; flex-direction:column; }
    .tv-issue-tiles { display:grid; gap:clamp(10px,1.1vw,18px); flex:1 1 auto; min-height:0; }
    .tv-issue-tile { background:rgba(255,255,255,0.03); border:2px solid rgba(255,255,255,0.1); border-radius:18px; padding:clamp(16px,2vw,30px); display:flex; flex-direction:column; gap:clamp(8px,0.9vh,13px); cursor:pointer; transition:border-color 0.2s,background 0.2s; overflow:hidden; min-height:clamp(130px,17vh,240px); box-shadow:0 2px 12px rgba(0,0,0,0.25); }
    .tv-issue-tile:hover { filter:brightness(1.07); }
    .tv-issue-tile.cb { background:rgba(239,68,68,0.1);  border-color:rgba(239,68,68,0.5);  box-shadow:0 4px 24px rgba(239,68,68,0.1); }
    .tv-issue-tile.cw { background:rgba(245,158,11,0.08); border-color:rgba(245,158,11,0.45); box-shadow:0 4px 24px rgba(245,158,11,0.08); }
    .tv-issue-tile.cm { background:rgba(59,130,246,0.08); border-color:rgba(59,130,246,0.4);  box-shadow:0 4px 24px rgba(59,130,246,0.08); }
    .tv-issue-tile-top { display:flex; align-items:center; gap:clamp(10px,1.2vw,18px); }
    .tv-issue-logo { width:clamp(28px,2.8vw,46px); height:clamp(28px,2.8vw,46px); border-radius:9px; background:#fff; object-fit:contain; flex-shrink:0; }
    .tv-issue-logo-fb { width:clamp(28px,2.8vw,46px); height:clamp(28px,2.8vw,46px); border-radius:9px; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:clamp(14px,1.4vw,22px); font-weight:700; flex-shrink:0; }
    .tv-issue-name { font-size:clamp(15px,1.8vw,30px); font-weight:700; letter-spacing:-0.02em; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; line-height:1.2; }
    .tv-issue-badge { font-size:clamp(13px,1.3vw,20px); font-weight:700; letter-spacing:0.08em; text-transform:uppercase; }
    .tv-issue-badge.warn   { color:var(--warn); }
    .tv-issue-badge.bad    { color:var(--bad); }
    .tv-issue-badge.maint  { color:var(--maint); }
    .tv-issue-badge.reroute{ color:var(--reroute); }
    .tv-issue-title { font-size:clamp(17px,1.8vw,28px); font-weight:600; color:var(--text); overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; white-space:pre-wrap; line-height:1.35; }
    .tv-issue-body { font-size:clamp(14px,1.4vw,22px); color:rgba(255,255,255,0.78); line-height:1.55; overflow-y:auto; overflow-x:hidden; flex:1 1 auto; min-height:0; white-space:pre-wrap; overflow-wrap:anywhere; position:relative; scrollbar-width:thin; scrollbar-color:rgba(255,255,255,0.2) transparent; }
    .tv-issue-body-inner { display:block; }
    .tv-issue-body-inner.tv-scrolling { animation:tv-body-scroll var(--tv-scroll-dur,35s) ease-in-out 2.5s infinite; }
    @keyframes tv-body-scroll { 0%,35%{transform:translateY(0)} 75%,100%{transform:translateY(var(--tv-scroll-dist,0px))} }
    /* Issue tile structured content — route pills, DC badges */
    .tv-issue-routes { display:flex; flex-wrap:wrap; gap:clamp(4px,0.5vw,8px); margin-bottom:clamp(4px,0.5vh,8px); }
    .tv-issue-route { background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.2); border-radius:100px; padding:2px clamp(7px,0.8vw,13px); font-size:clamp(11px,1.1vw,17px); font-weight:600; white-space:nowrap; color:var(--text); }
    .tv-issue-effect { background:rgba(245,158,11,0.18); border:1px solid rgba(245,158,11,0.4); border-radius:100px; padding:2px clamp(7px,0.8vw,13px); font-size:clamp(11px,1.1vw,17px); font-weight:600; white-space:nowrap; color:var(--warn); }
    .tv-issue-timeframe { font-size:clamp(12px,1.2vw,19px); color:rgba(255,255,255,0.6); line-height:1.4; }
    .tv-issue-dc-list { display:flex; flex-wrap:wrap; gap:clamp(4px,0.5vw,8px); }
    .tv-issue-dc-item { border-radius:8px; padding:clamp(3px,0.3vh,5px) clamp(8px,0.9vw,14px); font-size:clamp(11px,1.1vw,17px); font-weight:700; letter-spacing:0.04em; }
    .tv-issue-dc-item.reroute { background:rgba(20,184,166,0.18); border:1px solid rgba(20,184,166,0.45); color:var(--reroute); }
    .tv-issue-dc-item.maint   { background:rgba(59,130,246,0.18); border:1px solid rgba(59,130,246,0.45); color:#60a5fa; }
    .tv-issue-cf-body { font-size:clamp(13px,1.2vw,18px); color:rgba(255,255,255,0.7); line-height:1.45; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .tv-issue-section-hdr { font-size:clamp(9px,0.75vw,12px); font-weight:700; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.32); margin-top:clamp(6px,0.7vh,10px); padding-bottom:clamp(3px,0.3vh,4px); border-bottom:1px solid rgba(255,255,255,0.08); }
    /* Issue page dots */
    .tv-page-dots { display:flex; align-items:center; justify-content:center; gap:8px; padding-top:clamp(6px,0.7vh,12px); flex-shrink:0; }
    .tv-page-dot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.18); transition:background 0.3s, width 0.3s, border-radius 0.3s; flex-shrink:0; cursor:pointer; border:none; padding:0; appearance:none; -webkit-appearance:none; }
    .tv-page-dot:hover { background:rgba(255,255,255,0.45); }
    .tv-page-dot:focus-visible { outline:2px solid rgba(255,255,255,0.5); outline-offset:3px; }
    .tv-page-dot.active { width:24px; border-radius:4px; background:rgba(255,255,255,0.7); }
    /* Operational ticker */
    .tv-ticker-wrap { flex-shrink:0; margin-bottom:clamp(8px,0.9vh,14px); }
    .tv-ticker-hdr { font-size:clamp(9px,0.78vw,13px); font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); margin-bottom:4px; display:flex; align-items:center; gap:6px; }
    .tv-ticker-ok-dot { width:6px; height:6px; border-radius:50%; background:var(--ok); flex-shrink:0; }
    .tv-tiles { overflow:hidden; height:clamp(88px,11vh,130px); position:relative; }
    .tv-tiles-track { display:flex; align-items:center; gap:clamp(8px,0.9vw,14px); height:100%; width:max-content; animation:tv-ticker 70s linear infinite; }
    .tv-tiles-track:hover { animation-play-state:paused; }
    @keyframes tv-ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    .tv-tile { background:rgba(255,255,255,0.025); border:1px solid rgba(255,255,255,0.07); border-radius:11px; padding:clamp(10px,1.1vw,17px); display:flex; flex-direction:column; gap:5px; cursor:pointer; transition:all 0.2s; overflow:hidden; height:100%; box-sizing:border-box; justify-content:center; opacity:0.55; flex-shrink:0; min-width:clamp(130px,13vw,200px); }
    .tv-tile:hover { background:rgba(255,255,255,0.07); opacity:1; }
    .tv-tile-top { display:flex; align-items:center; gap:7px; min-width:0; }
    .tv-tile-logo { width:clamp(16px,1.5vw,24px); height:clamp(16px,1.5vw,24px); border-radius:4px; background:#fff; object-fit:contain; flex-shrink:0; }
    .tv-tile-logo-fb { width:clamp(16px,1.5vw,24px); height:clamp(16px,1.5vw,24px); border-radius:4px; background:rgba(255,255,255,0.1); display:flex; align-items:center; justify-content:center; font-size:clamp(8px,0.78vw,12px); font-weight:700; flex-shrink:0; }
    .tv-tile-name { font-size:clamp(11px,1vw,16px); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tv-tile-badge { font-size:clamp(9px,0.78vw,13px); font-weight:700; letter-spacing:0.07em; text-transform:uppercase; }
    .tv-tile-badge.ok    { color:var(--ok); }
    .tv-tile-badge.warn  { color:var(--warn); }
    .tv-tile-badge.bad   { color:var(--bad); }
    .tv-tile-badge.maint { color:var(--maint); }
    .tv-tile-badge.reroute{ color:var(--reroute); }
    .tv-tile-badge.unknown{ color:var(--unknown); }
    /* Board alert card */
    .tv-board-alert-card { position:absolute; top:clamp(16px,2.2vh,32px); left:50%; transform:translateX(-50%); width:min(640px,70vw); background:rgba(10,10,13,0.97); border-bottom:4px solid transparent; border-radius:20px; padding:clamp(20px,2.2vw,32px); z-index:350; backdrop-filter:blur(28px) saturate(1.4); box-shadow:0 28px 70px rgba(0,0,0,0.75); animation:board-alert-in 0.45s cubic-bezier(.22,1,.36,1) both; transition:opacity 0.55s ease,transform 0.55s ease; pointer-events:none; text-align:center; }
    .tv-board-alert-card::before { content:''; position:absolute; inset:0; border-radius:20px; border:1px solid rgba(255,255,255,0.09); pointer-events:none; }
    .tv-board-alert-card.ind-major { border-left-color:#ef4444; box-shadow:0 28px 70px rgba(239,68,68,0.28); }
    .tv-board-alert-card.ind-minor { border-left-color:#f59e0b; box-shadow:0 28px 70px rgba(245,158,11,0.22); }
    .tv-board-alert-card.ind-none  { border-left-color:#22c55e; box-shadow:0 28px 70px rgba(34,197,94,0.22); }
    .tv-board-alert-card.tv-alert-hide { opacity:0; transform:translateX(-50%) translateY(-12px); }
    .tv-board-alert-inner { display:flex; align-items:center; gap:clamp(16px,2vw,28px); }
    .tv-board-alert-icon { font-size:clamp(36px,4vw,58px); line-height:1; flex-shrink:0; }
    .tv-board-alert-text { text-align:left; min-width:0; }
    .tv-board-alert-heading { font-size:clamp(10px,0.85vw,14px); font-weight:800; letter-spacing:0.14em; text-transform:uppercase; margin-bottom:4px; }
    .tv-board-alert-heading.ind-major { color:#fca5a5; }
    .tv-board-alert-heading.ind-minor { color:#fcd34d; }
    .tv-board-alert-heading.ind-none  { color:#86efac; }
    .tv-board-alert-svc { font-size:clamp(24px,2.8vw,44px); font-weight:800; letter-spacing:-0.02em; line-height:1.1; color:var(--text); margin-bottom:4px; }
    .tv-board-alert-msg { font-size:clamp(14px,1.3vw,20px); color:var(--sub); line-height:1.4; }
    @keyframes board-alert-in { from{opacity:0;transform:translateX(-50%) translateY(-18px) scale(0.97)} to{opacity:1;transform:translateX(-50%) translateY(0) scale(1)} }
    /* Footer */
    .tv-board-footer { display:flex; align-items:center; gap:12px; flex-shrink:0; padding-top:clamp(8px,0.9vh,14px); border-top:1px solid rgba(255,255,255,0.07); }
    .tv-net-bar { display:flex; align-items:center; flex-wrap:wrap; gap:3px 10px; font-size:clamp(12px,1.05vw,17px); color:var(--sub); flex:1; min-width:0; }
    .tv-net-item { display:inline-flex; align-items:center; gap:4px; white-space:nowrap; }
    .tv-net-lbl { font-weight:700; font-size:0.8em; letter-spacing:0.07em; text-transform:uppercase; color:var(--muted); margin-right:2px; }
    .tv-net-sep { color:var(--border); user-select:none; }
    .tv-net-ok { color:var(--ok); font-weight:600; }
    .tv-net-warn { color:var(--warn); font-weight:600; }
    .tv-net-ts { font-size:0.78em; color:var(--muted); white-space:nowrap; }
    .tv-footer-right { display:flex; align-items:center; gap:12px; flex-shrink:0; }
    .tv-updated { font-size:clamp(10px,0.82vw,13px); color:var(--muted); white-space:nowrap; }
    .tv-exit-btn { border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:var(--sub); border-radius:8px; padding:6px 16px; font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer; font-family:var(--font); transition:all 0.2s; }
    .tv-exit-btn:hover { background:rgba(255,255,255,0.1); color:var(--text); }
    .tv-test-btn { border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--sub); border-radius:7px; padding:6px 12px; font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer; font-family:var(--font); white-space:nowrap; transition:opacity 0.3s ease,background 0.2s,color 0.2s,border-color 0.2s; }
    .tv-test-btn:hover { background:rgba(255,255,255,0.09); color:var(--text); border-color:rgba(255,255,255,0.18); }
    .tv-board-footer:not(:hover) .tv-test-btn { opacity:0; pointer-events:none; }
    .f-board-btn { border:1px solid rgba(255,255,255,0.1); background:rgba(255,255,255,0.04); color:var(--sub); border-radius:7px; padding:5px 11px; font-size:11px; font-weight:600; letter-spacing:0.05em; text-transform:uppercase; cursor:pointer; font-family:var(--font); transition:all 0.2s; }
    .f-board-btn:hover { background:rgba(255,255,255,0.09); color:var(--text); }
    .f-theme-btn { border:1px solid var(--border); background:rgba(128,128,128,0.06); color:var(--sub); border-radius:7px; padding:5px 9px; font-size:13px; cursor:pointer; font-family:var(--font); transition:all 0.2s; line-height:1; }
    .f-theme-btn:hover { background:rgba(128,128,128,0.12); color:var(--text); }

    /* ── Header stat operational count color ─────────────────────────────────── */
    #n-ok { color:var(--ok) !important; }

    /* ── Per-service refresh time & stale indicator ───────────────────────────── */
    .card-fetched,.card-age-ts { font-size:11px; color:var(--muted); }
    .card-fetched.stale,.card-age-ts.stale { color:#f59e0b; font-weight:600; }

    /* ── Mobile responsive ───────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .shell { padding:12px 14px 10px; gap:10px; }
      .hdr { flex-wrap:wrap; gap:10px; padding:4px 0 12px; }
      .hdr-left { flex-direction:column; align-items:flex-start; gap:8px; width:100%; }
      .hdr-right { flex-wrap:wrap; justify-content:flex-start; gap:10px; }
      .stats { gap:8px 14px; flex-wrap:wrap; }
      .issues-grid { grid-template-columns:1fr; }
      .footer { flex-wrap:wrap; gap:8px; }
    }

    /* ── Service search filter ─────────────────────────────────────────────── */
    .svc-search-wrap { position:relative; margin-bottom:6px; }
    .svc-search { width:100%; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:9px; color:var(--text); font-family:var(--font); font-size:13px; padding:8px 36px 8px 38px; outline:none; transition:border-color 0.2s, background 0.2s; -webkit-appearance:none; appearance:none; }
    .svc-search:focus { border-color:rgba(255,255,255,0.16); background:rgba(255,255,255,0.05); }
    .svc-search::placeholder { color:var(--muted); }
    .svc-search::-webkit-search-cancel-button { -webkit-appearance:none; }
    .svc-search-icon { position:absolute; left:13px; top:50%; transform:translateY(-50%); width:14px; height:14px; color:var(--muted); pointer-events:none; }
    .svc-search-clear { position:absolute; right:10px; top:50%; transform:translateY(-50%); width:18px; height:18px; display:none; align-items:center; justify-content:center; background:rgba(255,255,255,0.1); border:none; border-radius:50%; color:var(--sub); cursor:pointer; font-size:11px; line-height:1; padding:0; transition:background 0.15s, color 0.15s; }
    .svc-search-clear:hover { background:rgba(255,255,255,0.18); color:var(--text); }
    .svc-search-wrap.has-query .svc-search-clear { display:flex; }
    .light-mode .svc-search-clear { background:rgba(0,0,0,0.1); color:var(--sub); }
    .light-mode .svc-search-clear:hover { background:rgba(0,0,0,0.18); color:var(--text); }

    /* ── Collapsible category sections ─────────────────────────────────────── */
    .svc-cat-hdr { cursor:pointer; }
    .svc-cat-hdr:hover { color:var(--text); }
    .svc-cat-toggle { flex-shrink:0; width:16px; height:16px; display:flex; align-items:center; justify-content:center; color:var(--muted); transition:transform 0.22s cubic-bezier(.22,1,.36,1); }
    .svc-cat-sec.collapsed .svc-cat-toggle { transform:rotate(-90deg); }
    .svc-cat-sec.collapsed .svc-table { display:none; }
    .svc-cat-count { font-size:10px; color:var(--muted); background:rgba(255,255,255,0.05); border:1px solid var(--border); padding:1px 6px; border-radius:4px; white-space:nowrap; flex-shrink:0; }

    /* ── Category header icon ───────────────────────────────────────────────── */
    .svc-cat-icon { width:13px; height:13px; flex-shrink:0; color:var(--muted); opacity:0.65; }

    /* ── Pulsing dot for active issues ─────────────────────────────────────── */
    .svc-dot-pulse { animation:stalePulse 2s ease-in-out infinite; }

    /* ── Footer refresh button ──────────────────────────────────────────────── */
    .f-refresh-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:17px; padding:2px 8px; border-radius:5px; transition:color 0.2s, transform 0.4s cubic-bezier(.22,1,.36,1); line-height:1; flex-shrink:0; }
    .f-refresh-btn:hover { color:var(--sub); }
    .f-refresh-btn:active { transform:rotate(180deg); }

function normalizeIndicator(ind){
  const val=String(ind||'none').toLowerCase().trim();
  if(['none','operational','ok','up'].includes(val)) return 'none';
  if(['rerouting','rerouted','re-routed','re routed','traffic_rerouted','traffic shifted'].includes(val)) return 'rerouting';
  if(['minor','degraded','warning','partial_outage','partial outage'].includes(val)) return 'minor';
  if(['maintenance','under_maintenance','scheduled','scheduled_maintenance'].includes(val)) return 'maintenance';
  if(['major','critical','down','outage'].includes(val)) return 'major';
  return 'major';
}

function hasRerouteSignal(...parts){
  const text=parts.map(p=>String(p||'').toLowerCase()).join(' ');
  return /(re-?rout|rerout|traffic\s+(?:is\s+)?(?:re-?routed|shifted|redirected)|route\s+shift|partially\s+re-?routed)/.test(text);
}

function componentStatusToIndicator(status){
  const val=String(status||'').toLowerCase().trim();
  if(val==='operational') return 'none';
  if(['degraded_performance','partial_outage'].includes(val)) return 'minor';
  if(val==='major_outage') return 'major';
  if(val==='under_maintenance') return 'maintenance';
  return 'unknown';
}

function cloudflareStatusLabel(status){

function cloudflareIncidentStatusLabel(status){

  if(val==='investigating') return 'Investigating';
  if(val==='identified') return 'Identified';
  if(val==='monitoring') return 'Monitoring';
  return '';
}

function normalizeRegionText(value){
  return String(value||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}

function formatGoogleWorkspaceMarkdown(raw){
  const text=String(raw||'').trim();
  if(!text) return {summary:'', body:''};

  const normalized=text.replace(/\r\n?/g,'\n');
  const summaryMatch=normalized.match(/(?:\*\*Summary\*\*|##\s*Summary)\s*([\s\S]*?)(?=\n(?:\*\*Description\*\*|##\s*Description)|$)/i);
  const descriptionMatch=normalized.match(/(?:\*\*Description\*\*|##\s*Description)\s*([\s\S]*)$/i);

  const summary=(summaryMatch?.[1]||'').trim();
  const description=(descriptionMatch?.[1]||'').trim();
  const fallback=normalized
    .replace(/^#\s+.*$/gm,'')
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/^##\s+/gm,'')
    .replace(/\n{3,}/g,'\n\n')
    .trim();

  return {
    summary: summary || fallback.split('\n')[0] || '',
    body: (description || fallback)
      .replace(/\*\*(.*?)\*\*/g,'$1')
      .replace(/^##\s+/gm,'')
      .replace(/\n{3,}/g,'\n\n')
      .trim()
  };
}


function isAwsNorthAmericaEvent(event){
  const region=normalizeRegionText(event?.region_name);
  const text=normalizeRegionText(`${event?.service_name||''} ${event?.summary||''} ${event?.description||''}`);
  const directRegionMatchers=[
    /north america/,
    /united states/,
    /u s /,
    /us gov/,
    /canada/,
    /mexico/
  ];
  const awsRegionMatchers=[
    /us east/,/us west/,/us central/,/us gov/,/ca central/
  ];
  if(directRegionMatchers.some(rx=>rx.test(region))||awsRegionMatchers.some(rx=>rx.test(region))) return true;
  return directRegionMatchers.some(rx=>rx.test(text))||awsRegionMatchers.some(rx=>rx.test(text));
}

const AWS_RSS_ACTIVE_WINDOW_MS=1000*60*60*72;

function parseAwsRssItems(xmlText){
  const parser=new DOMParser();
  const doc=parser.parseFromString(String(xmlText||''), 'application/xml');
  if(doc.querySelector('parsererror')) throw new Error('AWS RSS parse error');
  return [...doc.querySelectorAll('channel > item')].map((item)=>({
    title:stripHtml(item.querySelector('title')?.textContent||''),
    description:stripHtml(item.querySelector('description')?.textContent||''),
    pubDate:item.querySelector('pubDate')?.textContent||'',
    guid:item.querySelector('guid')?.textContent||''
  }));
}

function awsRssItemToIndicator(item){
  const text=`${item?.title||''} ${item?.description||''}`.toLowerCase();
  if(/resolved|complete(?:ly)? recovered|recovered|restored|no longer impacted|fully operational/.test(text)) return 'none';
  if(/service disruption|outage|critical|unavailable|severe/.test(text)) return 'major';
  if(/service impact|degraded|increased error rates|latency|connectivity issues/.test(text)) return 'minor';
  return 'minor';
}

function isAwsRssItemFresh(pubDateText){
  const published=Date.parse(pubDateText||'');
  if(!Number.isFinite(published)) return true;
  return (Date.now()-published)<=AWS_RSS_ACTIVE_WINDOW_MS;
}

function parseAzureRssFeed(xml){
  // Azure RSS feed: active incidents appear as <item> elements.
  // Each item has <title>, <description>, and optionally a severity keyword.
  const doc=new DOMParser().parseFromString(xml,'application/xml');
  const items=[...doc.querySelectorAll('item')];
  return items.map(item=>{
    const title=item.querySelector('title')?.textContent?.trim()||'';
    const desc=item.querySelector('description')?.textContent?.trim()||'';
    return {title,desc};
  });
}

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}


async function ensureAudioReady(){
  const c=getAudioCtx();
  if(c.state==='suspended') await c.resume();
  if(!audioPrimed){
    const warmup=c.createOscillator();
    const warmGain=c.createGain();
    warmGain.gain.setValueAtTime(0.00001, c.currentTime);
    warmup.frequency.setValueAtTime(440, c.currentTime);
    warmup.connect(warmGain);
    warmGain.connect(c.destination);
    warmup.start(c.currentTime);
    warmup.stop(c.currentTime+0.03);
    audioPrimed=true;
  }
  return c;
}

function primeAudio(){
  ensureAudioReady().catch(()=>{});
}

function tone(ctx, start, freq, dur=0.18, type='sine', gain=0.09){
  const prep=0.015;
  const startTime=Math.max(start, ctx.currentTime+prep);
  const oscStart=Math.max(ctx.currentTime, startTime-prep);
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.type=type;
  o.frequency.setValueAtTime(freq, oscStart);
  g.gain.setValueAtTime(0.00001, oscStart);
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(gain, startTime+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, startTime+dur);
  o.connect(g);
  g.connect(ctx.destination);
  o.start(oscStart);
  o.stop(startTime+dur+0.02);
}

function getPreferredVoice(){
  if(!('speechSynthesis' in window)) return null;
  const voices=window.speechSynthesis.getVoices();
  if(!voices.length) return null;
  const preferred=voices.find((v)=>PREFERRED_TTS_VOICES.includes(v.name));
  if(preferred) return preferred;
  return voices.find((v)=>/en[-_](US|GB)/i.test(v.lang)) || voices.find((v)=>/^en/i.test(v.lang)) || null;
}

function speakBannerStatus(serviceName, kind){
  if(_alertsMuted) return;
  if(!('speechSynthesis' in window)) return;
  const status=TTS_STATUS_LABEL[kind] || 'Status Updated';
  const spokenText=`${serviceName}. ${status}.`;
  const utterance=new SpeechSynthesisUtterance(spokenText);
  const voice=getPreferredVoice();
  if(voice) utterance.voice=voice;
  utterance.rate=1;
  utterance.pitch=1;
  utterance.volume=1;
  const estimatedMs=Math.max(2600,Math.round((spokenText.length/14)*1000));
  utterance.onstart=()=>_duckBoardRadio(estimatedMs+900);
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utterance);
}

function chime(kind){
  if(_alertsMuted) return;
  const play=(c,startAt)=>{
    if(kind==='outage'){
      tone(c,startAt,740,0.2,'triangle',0.16);
      tone(c,startAt+0.01,1480,0.16,'square',0.08);
      tone(c,startAt+0.15,622,0.24,'triangle',0.17);
      tone(c,startAt+0.16,1244,0.18,'square',0.085);
      tone(c,startAt+0.31,494,0.34,'triangle',0.18);
      tone(c,startAt+0.32,988,0.26,'square',0.09);
    } else if(kind==='degraded'){
      tone(c,startAt,740,0.2,'triangle',0.12);
      tone(c,startAt+0.16,622,0.25,'triangle',0.12);
      tone(c,startAt+0.33,494,0.34,'sine',0.1);
    } else {
      tone(c,startAt,523,0.14,'sine',0.11);
      tone(c,startAt+0.12,659,0.16,'sine',0.12);
      tone(c,startAt+0.24,784,0.2,'sine',0.13);
      tone(c,startAt+0.38,988,0.22,'triangle',0.1);
    }
  };

  ensureAudioReady()
    .then((c)=>play(c, c.currentTime+0.12))

}

function _initBoardRadioAudio(){

  el.preload='none';

  _boardRadioAudio=el;
  return el;
}

function _setBoardRadioVolume(target){
  if(!_boardRadioAudio) return;
  _boardRadioAudio.volume=Math.min(1,Math.max(0,target));
}

async function _startBoardRadio(){
  if(!_boardModeActive||!_boardRadioEnabled) return;
  const station=_getBoardStation();
  const radio=_initBoardRadioAudio();
  const current=(radio.dataset.stationId||'');
  if(current!==station.id){
    radio.pause();
    // Set src directly — calling load() before play() on a live stream causes
    // an AbortError because the browser interrupts the pending play() request.
    // Setting src and calling play() is sufficient; play() triggers the load.
    radio.src=station.streamUrl;
    radio.dataset.stationId=station.id;
  }
  const savedVol=parseFloat(localStorage.getItem('board-radio-vol'));
  radio.volume=isNaN(savedVol)?(station.baseVolume??BOARD_RADIO_BASE_VOLUME):savedVol;
  try{
    await radio.play();
  }catch(e){
    // AbortError means a concurrent load() interrupted play(); retry once
    if(e?.name==='AbortError'){
      await new Promise(r=>setTimeout(r,300));
      try{ await radio.play(); }catch{}
    }
  }
}

function _stopBoardRadio(){
  if(!_boardRadioAudio) return;
  _boardRadioAudio.pause();
}


function _duckBoardRadio(ms=4500){
  if(!_boardRadioAudio||_boardRadioAudio.paused||!_boardRadioEnabled) return;
  _radioDuckUntil=Math.max(_radioDuckUntil,Date.now()+ms);
  const station=_getBoardStation();
  _setBoardRadioVolume(station.duckVolume ?? BOARD_RADIO_DUCK_VOLUME);
  document.getElementById('tv-now-playing')?.classList.add('tv-np-ducked');
  clearTimeout(_radioDuckTimer);
  const checkRestore=()=>{
    const wait=_radioDuckUntil-Date.now();
    if(wait>0){
      _radioDuckTimer=setTimeout(checkRestore,wait+80);
      return;
    }
    _radioDuckUntil=0;
    const restoreStation=_getBoardStation();
    const savedVol=parseFloat(localStorage.getItem('board-radio-vol'));
    _setBoardRadioVolume(isNaN(savedVol)?(restoreStation.baseVolume??BOARD_RADIO_BASE_VOLUME):savedVol);
    document.getElementById('tv-now-playing')?.classList.remove('tv-np-ducked');
  };
  _radioDuckTimer=setTimeout(checkRestore,ms+80);
}

let bannerTimer;
let bannerSpeechTimer;
const alertQueue = [];
let isAlertPlaying = false;

function processAlertQueue() {
  if (isAlertPlaying || alertQueue.length === 0) return;

  isAlertPlaying = true;
  const { svc, kind } = alertQueue.shift();

  _duckBoardRadio(5200);
  chime(kind);
  showStatusBanner(svc, kind);
}

const MAX_ALERT_QUEUE = 6;

function queueAlert(svc, kind) {
  // Deduplicate: don't enqueue the same service+kind if already waiting
  if (alertQueue.some(a => a.svc.name === svc.name && a.kind === kind)) return;
  // Cap queue to prevent overflow during connectivity blips
  if (alertQueue.length >= MAX_ALERT_QUEUE) return;
  if(kind==='outage'||kind==='degraded') _recordIssue(svc.name);
  alertQueue.push({ svc, kind });
  processAlertQueue();
}

function getAlertPresentation(svc, kind){
  const heading = kind==='outage' ? 'Service Outage' : kind==='degraded' ? 'Service Degraded' : 'Service Restored';
  const icon = kind==='outage' ? '🚨' : kind==='degraded' ? '⚠️' : '✅';
  const detail = kind==='restored'
    ? `${svc.name} is back to operational.`
    : `${svc.name} is now ${TTS_STATUS_LABEL[kind]?.toLowerCase() || svc.label?.toLowerCase() || kind}.`;
  const indCls = kind==='outage' ? 'ind-major' : kind==='degraded' ? 'ind-minor' : 'ind-none';
  return { heading, icon, detail, indCls };
}

function _showBoardAlert(svc, kind) {
  const board = document.getElementById('tv-board');
  if (!board) return;
  // Remove any existing alert card
  board.querySelectorAll('.tv-board-alert-card').forEach(e => e.remove());
  const { icon, heading, detail, indCls } = getAlertPresentation(svc, kind);
  const el = document.createElement('div');
  el.className = `tv-board-alert-card ${indCls}`;
  el.innerHTML = `<div class="tv-board-alert-inner">
    <div class="tv-board-alert-icon">${icon}</div>
    <div class="tv-board-alert-text">
      <div class="tv-board-alert-heading ${indCls}">${heading}</div>
      <div class="tv-board-alert-svc">${esc(svc.name)}</div>
      <div class="tv-board-alert-msg">${esc(detail)}</div>
    </div>
  </div>`;
  board.appendChild(el);
  setTimeout(()=>el.classList.add('tv-alert-hide'), 9000);
  setTimeout(()=>el.remove(), 10000);
}

function showStatusBanner(svc, kind){
  // In board mode the banner is behind the board overlay; just release the queue
  // after the board alert card duration so the next alert can play
  if(_boardModeActive){
    _showBoardAlert(svc, kind);
    const speakDelay=CHIME_SPEECH_DELAY[kind]||650;
    clearTimeout(bannerSpeechTimer);
    bannerSpeechTimer=setTimeout(()=>speakBannerStatus(svc.name, kind), speakDelay);
    clearTimeout(bannerTimer);
    bannerTimer=setTimeout(()=>{ isAlertPlaying=false; processAlertQueue(); }, 10500);
    return;
  }
  const banner=document.getElementById('status-banner');
  if(!banner) {
    isAlertPlaying = false;
    processAlertQueue();
    return;
  }
  const { heading, icon, detail } = getAlertPresentation(svc, kind);
  banner.className=`status-banner ${kind}`;
  banner.innerHTML=`
    <div class="status-banner-main">
      <div class="status-banner-icon">${icon}</div>
      <div class="status-banner-text">
        <div class="status-banner-heading">${heading}</div>
        <div class="status-banner-title">${esc(svc.name)}</div>
        <div class="status-banner-sub">${esc(detail)}</div>
      </div>
    </div>
    <div class="status-banner-time"></div>`;
  requestAnimationFrame(()=>banner.classList.add('show'));
  const speakDelay=CHIME_SPEECH_DELAY[kind] || 650;
  clearTimeout(bannerSpeechTimer);
  bannerSpeechTimer=setTimeout(()=>speakBannerStatus(svc.name, kind), speakDelay);
  clearTimeout(bannerTimer);
  bannerTimer=setTimeout(()=>{
    banner.classList.remove('show');
    setTimeout(()=>{
      if(!banner.classList.contains('show')) banner.innerHTML='';
      isAlertPlaying = false;
      processAlertQueue();
    }, 320);
  }, 30000); // 30 seconds per banner
}

const _uptimeLog=(()=>{ try{ const v=JSON.parse(localStorage.getItem('svc-uptime')||'{}'); return(v&&typeof v==='object'&&!Array.isArray(v))?v:{}; }catch{return{};} })();
let _uptimeFlushTimer=null;
function _flushUptimeLog(){ try{localStorage.setItem('svc-uptime',JSON.stringify(_uptimeLog));}catch{} }
function _recordUptimeCheck(name,hasIssue){
  if(!_uptimeLog[name]) _uptimeLog[name]={};
  const today=new Date().toISOString().slice(0,10);
  if(!_uptimeLog[name][today]) _uptimeLog[name][today]={c:0,i:0};
  _uptimeLog[name][today].c++;
  if(hasIssue) _uptimeLog[name][today].i++;
  // Prune >35-day-old entries
  const cutoff=new Date(Date.now()-35*86400000).toISOString().slice(0,10);
  Object.keys(_uptimeLog[name]).forEach(d=>{ if(d<cutoff) delete _uptimeLog[name][d]; });
  // Batch writes: flush at most once every 5 seconds across all concurrent checks
  clearTimeout(_uptimeFlushTimer);
  _uptimeFlushTimer=setTimeout(_flushUptimeLog,5000);
}
function _getUptime(name){
  const log=_uptimeLog[name];
  if(!log) return null;
  const cutoff=new Date(Date.now()-30*86400000).toISOString().slice(0,10);
  let total=0,issues=0;
  for(const[d,v] of Object.entries(log)){ if(d>=cutoff){total+=v.c;issues+=v.i;} }
  if(total<5) return null;
  return Math.round(((total-issues)/total)*1000)/10;
}

// On deployed origins, try proxy first to avoid browser-side CORS failures/noise.
// Unknown URLs still fall back to direct fetch.
const PROXIES=_IS_DEPLOYED
  ?[u=>{ const k=ROUTE_KEYS[u]; return k?`/proxy?svc=${k}`:undefined; }, u=>u]
  :[u=>u];

async function fetchWithTimeout(url, timeout=15000){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(), timeout);
  try {
    return await fetch(url,{signal:controller.signal});
  } finally {
    clearTimeout(timer);
  }
}

async function getText(url){
  let err;
  for(const proxy of PROXIES){
    const proxyUrl=proxy(url);
    if(proxyUrl===undefined) continue; // this strategy has no proxy for this URL
    try {
      const r=await fetchWithTimeout(proxyUrl);
      if(!r.ok) throw new Error(String(r.status));
      return await r.text();
    } catch(e){ err=e; }
  }
  throw err;
}

async function getJson(url){
  const t=await getText(url);
  return JSON.parse(t.replace(/^﻿/,''));
}

function stripHtml(txt){
  return String(txt||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
}

function eventTimeValue(item){
  const candidates=[
    item?.updated_at,
    item?.created_at,
    item?.display_at,
    item?.started_at,
    item?.start,
    item?.start_time,
    item?.timestamp,
    item?.time,
    item?.date
  ];
  for(const value of candidates){
    if(value==null) continue;
    if(typeof value==='number' && Number.isFinite(value)) return value>1e12 ? value : value*1000;
    const parsed=Date.parse(String(value));
    if(Number.isFinite(parsed)) return parsed;
  }
  return 0;
}

function latestUpdateBody(event){
  const updates=[
    ...(Array.isArray(event?.incident_updates) ? event.incident_updates : []),
    ...(Array.isArray(event?.updates) ? event.updates : [])
  ];
  if(!updates.length) return '';
  updates.sort((a,b)=>eventTimeValue(a)-eventTimeValue(b));
  const latest=updates[updates.length-1] || {};
  return stripHtml(latest.body || latest.text || latest.description || latest.summary || '');
}

function latestUpdateRawText(event){
  const updates=[
    ...(Array.isArray(event?.incident_updates) ? event.incident_updates : []),
    ...(Array.isArray(event?.updates) ? event.updates : [])
  ];
  if(!updates.length) return '';
  updates.sort((a,b)=>eventTimeValue(a)-eventTimeValue(b));
  const latest=updates[updates.length-1] || {};
  return String(latest.text || latest.body || latest.description || latest.summary || '').trim();
}

function mostRecentEvent(events){
  if(!Array.isArray(events) || !events.length) return null;
  return [...events].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a))[0] || events[0];
}
