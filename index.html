<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Service Status</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#09090b">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --ok: #22c55e;
      --warn: #f59e0b;
      --bad: #ef4444;
      --maint: #3b82f6;
      --reroute: #14b8a6;
      --unknown: #6b7280;
      --bg: #09090b;
      --card: #111113;
      --border: rgba(255,255,255,0.07);
      --text: #f4f4f5;
      --sub: #a1a1aa;
      --muted: #52525b;
      --font: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      height:100%; overflow:hidden;
      background:var(--bg); color:var(--text);
      font-family:var(--font); -webkit-font-smoothing:antialiased;
    }
    body::before,
    body::after {
      content:'';
      position:fixed;
      pointer-events:none;
      z-index:0;
      filter:blur(60px);
      opacity:0.22;
      animation:ambientFloat 18s ease-in-out infinite;
    }
    body::before {
      width:44vw;
      height:44vw;
      top:-18vw;
      left:-10vw;
      background:radial-gradient(circle, rgba(59,130,246,0.42), transparent 65%);
    }
    body::after {
      width:40vw;
      height:40vw;
      right:-14vw;
      bottom:-16vw;
      background:radial-gradient(circle, rgba(124,58,237,0.3), transparent 70%);
      animation-delay:-7s;
    }
    @keyframes ambientFloat {
      0%, 100% { transform:translate3d(0, 0, 0) scale(1); }
      50% { transform:translate3d(0, -12px, 0) scale(1.08); }
    }
    .shell { height:100vh; display:flex; flex-direction:column; padding:20px 24px 16px; gap:16px; position:relative; z-index:1; animation:shellIn 0.75s cubic-bezier(.22,1,.36,1) both; }
    @keyframes shellIn { from { opacity:0; transform:translateY(10px) scale(.995); } to { opacity:1; transform:translateY(0) scale(1); } }
    .hdr {
      display:flex;
      align-items:center;
      justify-content:space-between;
      flex-shrink:0;
      flex-wrap:wrap;
      gap:24px;
      padding:6px 0 18px;
      border-bottom:1px solid rgba(255,255,255,0.07);
    }
    .brand { display:flex; align-items:flex-start; gap:11px; }
    .brand-icon {
      width:34px; height:34px; border-radius:9px; flex-shrink:0;
      background:linear-gradient(135deg,#1d4ed8,#7c3aed);
      display:flex; align-items:center; justify-content:center;
    }
    .brand-icon svg { width:17px; height:17px; }
    .brand-name { font-size:clamp(18px, 1.3vw, 28px); font-weight:700; letter-spacing:-0.025em; }
    .brand-sub { font-size:clamp(11px, 0.75vw, 15px); color:var(--sub); margin-top:2px; letter-spacing:0.01em; }
    .brand-meta { display:flex; flex-direction:column; gap:8px; }
    .incident-pin {
      display:none;
      align-items:center;
      gap:6px;
      flex-wrap:wrap;
      max-width:min(52vw, 800px);
    }
    .incident-pin.show { display:flex; }
    .pin-chip {
      display:inline-flex;
      align-items:center;
      gap:7px;
      padding:5px 12px;
      border-radius:20px;
      font-size:clamp(13px, 0.85vw, 16px);
      font-weight:600;
      white-space:nowrap;
      letter-spacing:0.01em;
      border:1px solid transparent;
    }
    .pin-dot {
      width:8px;
      height:8px;
      border-radius:50%;
      flex-shrink:0;
      background:currentColor;
    }
    .chip-none { color:#86efac; background:rgba(34,197,94,0.09); border-color:rgba(34,197,94,0.22); }
    .chip-major { color:#fda4af; background:rgba(239,68,68,0.09); border-color:rgba(239,68,68,0.25); }
    .chip-minor { color:#fcd34d; background:rgba(245,158,11,0.09); border-color:rgba(245,158,11,0.25); }
    .chip-maintenance { color:#93c5fd; background:rgba(59,130,246,0.09); border-color:rgba(59,130,246,0.25); }
    .chip-rerouting { color:#5eead4; background:rgba(20,184,166,0.09); border-color:rgba(20,184,166,0.25); }
    .chip-unknown { color:#d4d4d8; background:rgba(107,114,128,0.1); border-color:rgba(107,114,128,0.25); }
    .hdr-left { display:flex; align-items:center; gap:16px; flex-wrap:wrap; margin-right:auto; }
    .hdr-right { display:flex; align-items:center; gap:20px; flex-wrap:wrap; justify-content:flex-end; }
    .stats { display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:flex-start; }
    .stat { display:flex; align-items:center; gap:5px; font-size:clamp(13px, 0.85vw, 17px); color:var(--sub); }
    .sdot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
    .stat strong { color:var(--text); font-weight:700; font-size:clamp(15px, 1vw, 21px); }
    .stat.reroute-stat { display: none; }
    .stat.reroute-stat.show { display: flex; }
    .stat.unknown-stat { display: none; }
    .stat.unknown-stat.show { display: flex; }
    .clock {
      font-size:clamp(17px, 1.1vw, 26px);
      font-weight:500;
      color:rgba(244,244,245,0.75);
      font-variant-numeric:tabular-nums;
      letter-spacing:0.03em;
      display:inline-flex;
      align-items:baseline;
      gap:2px;
    }
    .clock .clock-unit {
      display:inline-flex;
      align-items:flex-start;
      justify-content:center;
      min-width:1.15em;
      height:1.1em;
      overflow:hidden;
    }
    .clock .clock-num {
      display:block;
      line-height:1.1;
      transform:translateY(0);
    }
    .clock .clock-num.slide-up { animation:clockDigitUp 0.32s cubic-bezier(.22,1,.36,1); }
    .clock .clock-num.slide-down { animation:clockDigitDown 0.32s cubic-bezier(.22,1,.36,1); }
    .clock .clock-sep {
      color:rgba(244,244,245,0.3);
      min-width:6px;
      text-align:center;
    }
    .clock .clock-meridiem {
      font-size:10px;
      letter-spacing:0.12em;
      margin-left:6px;
      color:rgba(244,244,245,0.4);
    }
    @keyframes clockDigitUp { from { transform:translateY(105%); opacity:0; } to { transform:translateY(0); opacity:1; } }
    @keyframes clockDigitDown { from { transform:translateY(-105%); opacity:0; } to { transform:translateY(0); opacity:1; } }
    .test-btn {
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.05);
      color:var(--sub);
      border-radius:7px;
      padding:6px 12px;
      font-size:11px;
      font-weight:600;
      letter-spacing:0.05em;
      text-transform:uppercase;
      cursor:pointer;
      transition:all 0.2s ease;
      white-space:nowrap;
    }
    .test-btn:hover { background:rgba(255,255,255,0.09); color:var(--text); border-color:rgba(255,255,255,0.18); }
    .test-btn:active { transform:translateY(1px); }
    .divider { height:1px; background:var(--border); flex-shrink:0; }
    .grid-wrap { flex:1; min-height:0; overflow:hidden; position:relative; }
    .page {
      position:absolute; inset:0; display:grid; gap:12px; align-content:start;
      opacity:0; pointer-events:none;
      transform:translateX(36px) scale(0.995);
      filter:blur(3px);
    }
    .page.active { opacity:1; pointer-events:auto; position:relative; transform:translateX(0) scale(1); filter:blur(0); }
    .page.enter-next { animation:pageInNext 0.55s cubic-bezier(.22,1,.36,1) both; }
    .page.leave-next { animation:pageOutNext 0.55s cubic-bezier(.22,1,.36,1) both; }
    .page.enter-prev { animation:pageInPrev 0.55s cubic-bezier(.22,1,.36,1) both; }
    .page.leave-prev { animation:pageOutPrev 0.55s cubic-bezier(.22,1,.36,1) both; }
    @keyframes pageInNext { from { opacity:0; transform:translateX(44px) scale(0.99); filter:blur(4px); } to { opacity:1; transform:translateX(0) scale(1); filter:blur(0);} }
    @keyframes pageOutNext { from { opacity:1; transform:translateX(0) scale(1); filter:blur(0);} to { opacity:0; transform:translateX(-44px) scale(0.99); filter:blur(4px);} }
    @keyframes pageInPrev { from { opacity:0; transform:translateX(-44px) scale(0.99); filter:blur(4px);} to { opacity:1; transform:translateX(0) scale(1); filter:blur(0);} }
    @keyframes pageOutPrev { from { opacity:1; transform:translateX(0) scale(1); filter:blur(0);} to { opacity:0; transform:translateX(44px) scale(0.99); filter:blur(4px);} }
    .card.tile-in { animation:tileIn 0.5s cubic-bezier(.22,1,.36,1) both; animation-delay:var(--tile-delay, 0ms); }
    .card.tile-out { animation:tileOut 0.34s cubic-bezier(.4,0,.2,1) both; animation-delay:calc(var(--tile-delay, 0ms) * 0.4); }
    @keyframes tileIn { from { opacity:0; transform:translateY(18px) scale(0.98); filter:blur(3px); } to { opacity:1; transform:translateY(0) scale(1); filter:blur(0);} }
    @keyframes tileOut { from { opacity:1; transform:translateY(0) scale(1); filter:blur(0);} to { opacity:0; transform:translateY(-12px) scale(0.985); filter:blur(2px);} }
    .card {
      background:linear-gradient(170deg, rgba(255,255,255,0.02), transparent 44%), var(--card);
      border:1px solid var(--border); border-radius:16px;
      padding:20px 22px; display:flex; flex-direction:column; position:relative; overflow:hidden;
      transition:border-color 0.3s, box-shadow 0.35s ease, transform 0.35s cubic-bezier(.22,1,.36,1); cursor:pointer; animation:cardIn 0.5s cubic-bezier(.22,1,.36,1) both;
      will-change:transform;
    }
    @keyframes cardIn { from{opacity:0;transform:translateY(14px) scale(.985)} to{opacity:1;transform:translateY(0) scale(1)} }
    .card:hover { border-color:rgba(255,255,255,0.17); transform:translateY(-4px); box-shadow:0 16px 26px rgba(0,0,0,0.34); }
    .card::before {
      content:''; position:absolute; left:0; top:16px; bottom:16px; width:3px;
      border-radius:0 3px 3px 0; background:var(--ok); opacity:0.7;
    }
    .card::after {
      content:'';
      position:absolute;
      inset:-1px;
      background:linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.08) 40%, transparent 60%);
      transform:translateX(-120%);
      transition:transform 0.8s ease;
      pointer-events:none;
    }
    .card:hover::after { transform:translateX(120%); }
    .card.cw::before { background:var(--warn); opacity:0.8; }
    .card.cb::before { background:var(--bad); opacity:0.9; }
    .card.cm::before { background:var(--maint); opacity:0.8; }
    .card.cr::before { background:var(--reroute); opacity:0.8; }
    .card.cu::before { background:var(--unknown); opacity:0.8; }
    .card.cb { border-color:rgba(239,68,68,0.16); background:linear-gradient(160deg, #111113, rgba(239,68,68,0.04)); box-shadow:0 0 32px rgba(239,68,68,0.08); }
    .card.cw { border-color:rgba(245,158,11,0.13); }
    .card.cu { border-color:rgba(107,114,128,0.16); background:linear-gradient(160deg, #111113, rgba(107,114,128,0.04)); }
    .card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .card-title-row { display:flex; align-items:center; gap:12px; min-width:0; }
    .c-icon {
      width:42px; height:42px; border-radius:10px; flex-shrink:0;
      display:flex; align-items:center; justify-content:center; font-size:20px;
    }
    .c-icon.ok { background:rgba(34,197,94,0.1); color:var(--ok); }
    .c-icon.warn { background:rgba(245,158,11,0.1); color:var(--warn); }
    .c-icon.bad { background:rgba(239,68,68,0.1); color:var(--bad); }
    .c-icon.maint { background:rgba(59,130,246,0.1); color:var(--maint); }
    .c-icon.reroute { background:rgba(20,184,166,0.1); color:var(--reroute); }
    .c-icon.unknown { background:rgba(107,114,128,0.1); color:var(--unknown); }
    .c-logo { width:26px; height:26px; border-radius:5px; object-fit:contain; background:rgba(255,255,255,0.92); padding:2px; }
    .c-fallback { font-size:18px; font-weight:700; line-height:1; }
    .c-name { font-size:clamp(14px, 1.2vw, 24px); font-weight:700; letter-spacing:-0.02em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.2; }
    .c-url { font-size:13px; color:var(--muted); margin-top:3px; text-decoration:none; display:inline-flex; align-items:center; gap:4px; transition:color 0.2s; }
    .c-url:hover { color:var(--sub); }
    .c-badge {
      flex-shrink:0; font-size:11px; font-weight:600; letter-spacing:0.03em; text-transform:uppercase;
      padding:4px 10px; border-radius:7px; margin-top:2px;
    }
    .c-badge.ok { background:rgba(34,197,94,0.1); color:var(--ok); border:1px solid rgba(34,197,94,0.2); }
    .c-badge.warn { background:rgba(245,158,11,0.1); color:var(--warn); border:1px solid rgba(245,158,11,0.22); }
    .c-badge.bad { background:rgba(239,68,68,0.1); color:var(--bad); border:1px solid rgba(239,68,68,0.22); }
    .c-badge.maint { background:rgba(59,130,246,0.1); color:var(--maint); border:1px solid rgba(59,130,246,0.22); }
    .c-badge.reroute { background:rgba(20,184,166,0.1); color:var(--reroute); border:1px solid rgba(20,184,166,0.22); }
    .c-badge.unknown { background:rgba(107,114,128,0.1); color:var(--unknown); border:1px solid rgba(107,114,128,0.22); }
    .card-div { height:1px; background:var(--border); margin-bottom:14px; }
    .inc-block { border-radius:10px; padding:12px 14px; margin-bottom:12px; display:flex; flex-direction:column; flex:1; min-height:0; }
    .inc-block.ok-block { background:rgba(34,197,94,0.05); border:1px solid rgba(34,197,94,0.1); }
    .inc-block.bad-block { background:rgba(239,68,68,0.06); border:1px solid rgba(239,68,68,0.15); }
    .inc-block.warn-block { background:rgba(245,158,11,0.06); border:1px solid rgba(245,158,11,0.15); }
    .inc-block.maint-block { background:rgba(59,130,246,0.06); border:1px solid rgba(59,130,246,0.15); }
    .inc-block.reroute-block { background:rgba(20,184,166,0.06); border:1px solid rgba(20,184,166,0.15); }
    .inc-block.unknown-block { background:rgba(107,114,128,0.06); border:1px solid rgba(107,114,128,0.15); }
    .inc-label { font-size:12px; font-weight:600; letter-spacing:0.06em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .inc-label-dot { width:7px; height:7px; border-radius:50%; background:currentColor; }
    .inc-title { font-size:clamp(14px, 1.2vw, 26px); font-weight:600; color:var(--text); line-height:1.35; margin-bottom:5px; overflow-wrap:anywhere; }
    .inc-body { font-size:clamp(12px, 0.95vw, 20px); color:var(--sub); line-height:1.5; display:block; overflow:auto; overflow-wrap:anywhere; min-height:0; padding-right:2px; }
    .status-labels { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px; }
    .status-label { font-size:11px; letter-spacing:0.04em; text-transform:uppercase; color:var(--sub); border:1px solid var(--border); background:rgba(255,255,255,0.04); padding:3px 7px; border-radius:999px; }
    .card.compact .status-label { font-size:10px; padding:2px 6px; }
    .card.dense .inc-title { font-size:clamp(13px, 1.05vw, 22px); }
    .card.dense .inc-body { font-size:clamp(11px, 0.88vw, 18px); }
    .card-meta { display:flex; align-items:center; justify-content:space-between; margin-top:auto; }
    .meta-updated { font-size:clamp(11px, 0.7vw, 14px); color:var(--muted); display:flex; align-items:center; gap:5px; }
    .meta-updated svg { width:12px; height:12px; opacity:0.6; }
    .meta-tag { font-size:clamp(10px, 0.65vw, 13px); font-weight:500; color:var(--muted); padding:3px 7px; border-radius:4px; background:rgba(255,255,255,0.04); border:1px solid var(--border); }

    .card.compact .inc-title { font-size:clamp(13px, 1.05vw, 22px); margin-bottom:3px; }
    .card.compact .inc-body { font-size:clamp(11px, 0.85vw, 18px); }
    .card.compact .meta-updated { font-size:clamp(10px, 0.65vw, 13px); }
    .card.compact .meta-tag { font-size:clamp(10px, 0.62vw, 12px); }

    /* iOS-style widget snap sizes */
    .card.span-tall .inc-title,
    .card.span-large .inc-title { font-size:clamp(16px, 1.4vw, 30px); }
    @media (min-width: 1400px) {
      .inc-body { font-size:clamp(13px, 0.95vw + 0.1rem, 22px); }
      .card.compact .inc-body { font-size:clamp(11px, 0.82vw, 18px); }
      .card.dense .inc-body { font-size:clamp(12px, 0.88vw, 20px); }
    }
    .card.span-large .c-icon { width:50px; height:50px; font-size:24px; }
    .card.span-large .c-name { font-size:clamp(16px, 1.5vw, 30px); }
    .card.span-large .c-badge { font-size:clamp(11px, 0.78vw, 15px); padding:4px 11px; }

    /* Mini cards (no-incident half-size widgets) */
    .card.mini {
      padding:10px 14px;
      justify-content:center;
    }
    .card.mini .card-div,
    .card.mini .inc-block,
    .card.mini .card-meta { display:none; }
    .card.mini .card-top { margin-bottom:0; align-items:center; }
    .card.mini .c-icon { width:32px; height:32px; border-radius:8px; font-size:16px; }
    .card.mini .c-logo { width:20px; height:20px; }
    .card.mini .c-fallback { font-size:14px; }
    .card.mini .c-name { font-size:clamp(11px, 0.88vw, 16px); }
    .card.mini .c-url { display:none; }
    .card.mini .c-badge { font-size:10px; padding:3px 7px; }
    .card.mini .c-name-block { min-width:0; }

    /* Net Connection widget metrics */
    .net-grid { display:flex; flex-direction:column; gap:6px; }
    .net-info-rows { display:flex; flex-direction:column; gap:3px; }
    .net-row { display:flex; justify-content:space-between; align-items:center; gap:8px; padding:2px 0; }
    .net-lbl { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; white-space:nowrap; flex-shrink:0; }
    .net-val { font-size:11px; color:var(--text); font-weight:600; text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .net-metrics { display:grid; grid-template-columns:repeat(5,1fr); gap:5px; }
    .net-metric { display:flex; flex-direction:column; align-items:center; background:rgba(255,255,255,0.03); border:1px solid var(--border); border-radius:7px; padding:6px 4px; }
    .net-metric-val { font-size:clamp(12px,1.1vw,18px); font-weight:700; color:var(--ok); line-height:1.1; }
    .net-metric-lbl { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.03em; text-align:center; margin-top:2px; line-height:1.2; }
    .net-latencies { background:rgba(255,255,255,0.02); border:1px solid var(--border); border-radius:7px; padding:6px 8px; }
    .net-lat-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:0.04em; margin-bottom:3px; }
    .net-lat-vals { font-size:10px; color:var(--sub); font-variant-numeric:tabular-nums; line-height:1.6; word-break:break-all; }
    .net-testing { display:flex; align-items:center; gap:8px; color:var(--muted); font-size:12px; }
    .net-spinner { width:12px; height:12px; border:2px solid rgba(255,255,255,0.1); border-top-color:rgba(59,130,246,0.7); border-radius:50%; animation:spin 0.8s linear infinite; flex-shrink:0; }
    .footer { display:flex; align-items:center; justify-content:space-between; flex-shrink:0; gap:16px; }
    .f-left { display:flex; align-items:center; gap:20px; }
    .f-meta { font-size:12px; color:var(--muted); }
    .pdots { display:flex; align-items:center; gap:6px; }
    .pdot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.15); cursor:pointer; transition:all 0.3s; }
    .pdot.active { background:#fff; transform:scale(1.35); }
    .prog-track { width:200px; height:2px; background:rgba(255,255,255,0.07); border-radius:1px; overflow:hidden; }
    .prog-fill { height:100%; width:0%; background:linear-gradient(90deg,#3b82f6,#8b5cf6); transition:width 0.4s linear; }
    .loading { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; }
    .spinner { width:32px; height:32px; border:2.5px solid rgba(255,255,255,0.07); border-top-color:#3b82f6; border-radius:50%; animation:spin 0.8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .load-t { font-size:13px; color:var(--muted); }
    .status-banner-wrap {
      position:fixed;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      width:min(1080px, calc(100vw - 28px));
      z-index:45;

(function tick(){
  const e=document.getElementById('clock');
  const now=new Date();
  let h=now.getHours();
  const m=String(now.getMinutes()).padStart(2,'0');
  const sec=String(now.getSeconds()).padStart(2,'0');
  const ampm=h>=12?'PM':'AM';
  h=h%12 || 12;
  const hh=String(h).padStart(2,'0');
  const next=[hh,m,sec,ampm];

  if(!e.dataset.ready){
    e.innerHTML=`<span class="clock-unit"><span class="clock-num" data-part="0">${hh}</span></span><span class="clock-sep">:</span><span class="clock-unit"><span class="clock-num" data-part="1">${m}</span></span><span class="clock-sep">:</span><span class="clock-unit"><span class="clock-num" data-part="2">${sec}</span></span><span class="clock-meridiem"><span class="clock-num" data-part="3">${ampm}</span></span>`;
    e.dataset.prev=next.join('|');
    e.dataset.ready='1';
  } else {
    const prev=(e.dataset.prev||'').split('|');
    e.querySelectorAll('.clock-num[data-part]').forEach((node)=>{
      const i=Number(node.dataset.part);
      const nextVal=next[i];
      if(node.textContent!==nextVal){
        const oldVal=prev[i] ?? node.textContent ?? '0';
        const oldNum=Number(oldVal);
        const newNum=Number(nextVal);
        const direction=(Number.isFinite(oldNum) && Number.isFinite(newNum) && newNum < oldNum) ? 'slide-down' : 'slide-up';
        const clone=node.cloneNode(true);
        clone.textContent=nextVal;
        clone.classList.add(direction);
        node.replaceWith(clone);
      }
    });
    e.dataset.prev=next.join('|');
  }

  setTimeout(tick, 1000-now.getMilliseconds());
})();;

function normalizeIndicator(ind){
  const val=String(ind||'none').toLowerCase().trim();
  if(['none','operational','ok','up'].includes(val)) return 'none';
  if(['rerouting','rerouted','re-routed','re routed','traffic_rerouted','traffic shifted'].includes(val)) return 'rerouting';
  if(['minor','degraded','warning','partial_outage','partial outage'].includes(val)) return 'minor';
  if(['maintenance','under_maintenance','scheduled','scheduled_maintenance'].includes(val)) return 'maintenance';
  if(['major','critical','down','outage'].includes(val)) return 'major';
  return 'major';
}

function hasRerouteSignal(...parts){
  const text=parts.map(p=>String(p||'').toLowerCase()).join(' ');
  return /(re-?rout|rerout|traffic\s+(?:is\s+)?(?:re-?routed|shifted|redirected)|route\s+shift|partially\s+re-?routed)/.test(text);
}

function componentStatusToIndicator(status){
  const val=String(status||'').toLowerCase().trim();
  if(val==='operational') return 'none';
  if(['degraded_performance','partial_outage'].includes(val)) return 'minor';
  if(val==='major_outage') return 'major';
  if(val==='under_maintenance') return 'maintenance';
  return 'unknown';
}

function cloudflareStatusLabel(status){
  const val=String(status||'').toLowerCase().trim();
  if(val==='operational') return 'Operational';
  if(val==='under_maintenance') return 'Maintenance';
  if(val==='degraded_performance') return 'Partially Re-routed';
  if(val==='partial_outage') return 'Partially Re-routed';

}

function normalizeRegionText(value){
  return String(value||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim();
}

function formatGoogleWorkspaceMarkdown(raw){
  const text=String(raw||'').trim();
  if(!text) return {summary:'', body:''};

  const normalized=text.replace(/\r\n?/g,'\n');
  const summaryMatch=normalized.match(/(?:\*\*Summary\*\*|##\s*Summary)\s*([\s\S]*?)(?=\n(?:\*\*Description\*\*|##\s*Description)|$)/i);
  const descriptionMatch=normalized.match(/(?:\*\*Description\*\*|##\s*Description)\s*([\s\S]*)$/i);

  const summary=(summaryMatch?.[1]||'').trim();
  const description=(descriptionMatch?.[1]||'').trim();
  const fallback=normalized
    .replace(/^#\s+.*$/gm,'')
    .replace(/\*\*(.*?)\*\*/g,'$1')
    .replace(/^##\s+/gm,'')
    .replace(/\n{3,}/g,'\n\n')
    .trim();

  return {
    summary: summary || fallback.split('\n')[0] || '',
    body: (description || fallback)
      .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
      .replace(/^##\s+/gm,'')
      .replace(/\n{2,}/g,'<br><br>')
      .replace(/\n/g,'<br>')
  };
}


function isAwsNorthAmericaEvent(event){
  const region=normalizeRegionText(event?.region_name);
  const text=normalizeRegionText(`${event?.service_name||''} ${event?.summary||''} ${event?.description||''}`);
  const directRegionMatchers=[
    /north america/,
    /united states/,
    /u s /,
    /us gov/,
    /canada/,
    /mexico/
  ];
  const awsRegionMatchers=[
    /us east/,/us west/,/us central/,/us gov/,/ca central/
  ];
  if(directRegionMatchers.some(rx=>rx.test(region))||awsRegionMatchers.some(rx=>rx.test(region))) return true;
  return directRegionMatchers.some(rx=>rx.test(text))||awsRegionMatchers.some(rx=>rx.test(text));
}

const AWS_RSS_ACTIVE_WINDOW_MS=1000*60*60*72;

function parseAwsRssItems(xmlText){
  const parser=new DOMParser();
  const doc=parser.parseFromString(String(xmlText||''), 'application/xml');
  if(doc.querySelector('parsererror')) throw new Error('AWS RSS parse error');
  return [...doc.querySelectorAll('channel > item')].map((item)=>({
    title:stripHtml(item.querySelector('title')?.textContent||''),
    description:stripHtml(item.querySelector('description')?.textContent||''),
    pubDate:item.querySelector('pubDate')?.textContent||'',
    guid:item.querySelector('guid')?.textContent||''
  }));
}

function awsRssItemToIndicator(item){
  const text=`${item?.title||''} ${item?.description||''}`.toLowerCase();
  if(/resolved|complete(?:ly)? recovered|recovered|restored|no longer impacted|fully operational/.test(text)) return 'none';
  if(/service disruption|outage|critical|unavailable|severe/.test(text)) return 'major';
  if(/service impact|degraded|increased error rates|latency|connectivity issues/.test(text)) return 'minor';
  return 'minor';
}

function isAwsRssItemFresh(pubDateText){
  const published=Date.parse(pubDateText||'');
  if(!Number.isFinite(published)) return true;
  return (Date.now()-published)<=AWS_RSS_ACTIVE_WINDOW_MS;
}

function extractAzureAmericasTable(html){
  const m=html.match(/<table[^>]*data-zone-name=["']americas["'][^>]*class=["'][^"']*region-status-table[^"']*["'][^>]*>[\s\S]*?<\/table>/i);
  return m ? m[0] : '';
}

function parseAzureAmericasStatus(tableHtml){
  const rowRegex=/<tr>([\s\S]*?)<\/tr>/gi;
  const labels=[];
  const impactedRows=[];
  let rowMatch;
  while((rowMatch=rowRegex.exec(tableHtml))!==null){
    const row=rowMatch[1];
    const nameMatch=row.match(/<td[^>]*>\s*([\s\S]*?)<\/td>/i);
    const serviceName=nameMatch ? stripHtml(nameMatch[1]).replace(/\s+/g,' ').trim() : '';
    const rowLabels=[...row.matchAll(/data-label=["']([^"']+)["']/gi)].map(m=>String(m[1]||'').trim());
    if(!rowLabels.length) continue;
    labels.push(...rowLabels);
    if(rowLabels.some(label=>/critical|warning|degraded|disrupted/i.test(label))){
      impactedRows.push({serviceName, labels:rowLabels});
    }
  }
  return {labels, impactedRows};
}

function getAudioCtx(){
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}


async function ensureAudioReady(){
  const c=getAudioCtx();
  if(c.state==='suspended') await c.resume();
  if(!audioPrimed){
    const warmup=c.createOscillator();
    const warmGain=c.createGain();
    warmGain.gain.setValueAtTime(0.00001, c.currentTime);
    warmup.frequency.setValueAtTime(440, c.currentTime);
    warmup.connect(warmGain);
    warmGain.connect(c.destination);
    warmup.start(c.currentTime);
    warmup.stop(c.currentTime+0.03);
    audioPrimed=true;
  }
  return c;
}

function primeAudio(){
  ensureAudioReady().catch(()=>{});
}

function tone(ctx, start, freq, dur=0.18, type='sine', gain=0.09){
  const prep=0.015;
  const startTime=Math.max(start, ctx.currentTime+prep);
  const oscStart=Math.max(ctx.currentTime, startTime-prep);
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.type=type;
  o.frequency.setValueAtTime(freq, oscStart);
  g.gain.setValueAtTime(0.00001, oscStart);
  g.gain.setValueAtTime(0, startTime);
  g.gain.linearRampToValueAtTime(gain, startTime+0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, startTime+dur);
  o.connect(g);
  g.connect(ctx.destination);
  o.start(oscStart);
  o.stop(startTime+dur+0.02);
}

function getPreferredVoice(){
  if(!('speechSynthesis' in window)) return null;
  const voices=window.speechSynthesis.getVoices();
  if(!voices.length) return null;
  const preferred=voices.find((v)=>PREFERRED_TTS_VOICES.includes(v.name));
  if(preferred) return preferred;
  return voices.find((v)=>/en[-_](US|GB)/i.test(v.lang)) || voices.find((v)=>/^en/i.test(v.lang)) || null;
}

function speakBannerStatus(serviceName, kind){
  if(!('speechSynthesis' in window)) return;
  const status=TTS_STATUS_LABEL[kind] || 'Status Updated';
  const utterance=new SpeechSynthesisUtterance(`${serviceName}. ${status}.`);
  const voice=getPreferredVoice();
  if(voice) utterance.voice=voice;
  utterance.rate=1;
  utterance.pitch=1;
  utterance.volume=1;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utterance);
}

if('speechSynthesis' in window){

function chime(kind){
  const play=(c,startAt)=>{
    if(kind==='outage'){
      tone(c,startAt,740,0.2,'triangle',0.16);
      tone(c,startAt+0.01,1480,0.16,'square',0.08);
      tone(c,startAt+0.15,622,0.24,'triangle',0.17);
      tone(c,startAt+0.16,1244,0.18,'square',0.085);
      tone(c,startAt+0.31,494,0.34,'triangle',0.18);
      tone(c,startAt+0.32,988,0.26,'square',0.09);
    } else if(kind==='degraded'){
      tone(c,startAt,740,0.2,'triangle',0.12);
      tone(c,startAt+0.16,622,0.25,'triangle',0.12);
      tone(c,startAt+0.33,494,0.34,'sine',0.1);
    } else {
      tone(c,startAt,523,0.14,'sine',0.11);
      tone(c,startAt+0.12,659,0.16,'sine',0.12);
      tone(c,startAt+0.24,784,0.2,'sine',0.13);
      tone(c,startAt+0.38,988,0.22,'triangle',0.1);
    }
  };

  ensureAudioReady()
    .then((c)=>play(c, c.currentTime+0.12))
    .catch(()=>{});
}

let bannerTimer;
let bannerSpeechTimer;
const alertQueue = [];
let isAlertPlaying = false;

function processAlertQueue() {
  if (isAlertPlaying || alertQueue.length === 0) return;

  isAlertPlaying = true;
  const { svc, kind } = alertQueue.shift();

  chime(kind);
  showStatusBanner(svc, kind);
}

const MAX_ALERT_QUEUE = 6;

function queueAlert(svc, kind) {
  // Deduplicate: don't enqueue the same service+kind if already waiting
  if (alertQueue.some(a => a.svc.name === svc.name && a.kind === kind)) return;
  // Cap queue to prevent overflow during connectivity blips
  if (alertQueue.length >= MAX_ALERT_QUEUE) return;
  alertQueue.push({ svc, kind });
  processAlertQueue();
}

function showStatusBanner(svc, kind){
  const banner=document.getElementById('status-banner');
  if(!banner) {
    isAlertPlaying = false;
    processAlertQueue();
    return;
  }
  const heading=kind==='outage'
    ? 'Service Outage'
    : kind==='degraded'
      ? 'Service Degraded'
      : 'Service Restored';
  const detail=kind==='restored'
    ? `${svc.name} is back to operational.`
    : `${svc.name} is now ${svc.label.toLowerCase()}.`;
  banner.className=`status-banner ${kind}`;
  banner.innerHTML=`
    <div class="status-banner-main">
      <div class="status-banner-icon">${kind==='outage'?'🚨':kind==='degraded'?'⚠️':'✅'}</div>
      <div class="status-banner-text">
        <div class="status-banner-heading">${heading}</div>
        <div class="status-banner-title">${svc.name}</div>
        <div class="status-banner-sub">${detail}</div>
      </div>
    </div>
    <div class="status-banner-time"></div>`;
  requestAnimationFrame(()=>banner.classList.add('show'));
  const speakDelay=CHIME_SPEECH_DELAY[kind] || 650;
  clearTimeout(bannerSpeechTimer);
  bannerSpeechTimer=setTimeout(()=>speakBannerStatus(svc.name, kind), speakDelay);
  clearTimeout(bannerTimer);
  bannerTimer=setTimeout(()=>{
    banner.classList.remove('show');
    setTimeout(()=>{
      if(!banner.classList.contains('show')) banner.innerHTML='';
      isAlertPlaying = false;
      processAlertQueue();
    }, 320);
  }, 30000); // 30 seconds per banner
}

let netConnCache=null;
let netConnTesting=false;
let netConnLastRun=0;
const NET_CONN_INTERVAL_MS=10*60*1000; // 10 minutes

async function fetchWithOpts(url, opts={}, timeout=20000){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(), timeout);
  try {
    return await fetch(url, {...opts, signal:controller.signal});
  } finally {
    clearTimeout(timer);
  }
}

async function pingLatencies(count=10){
  const times=[];
  const base='https://speed.cloudflare.com/__down?bytes=0&nc=';
  for(let i=0;i<count;i++){
    const t0=performance.now();
    try {
      const r=await fetchWithOpts(base+Date.now()+i, {cache:'no-store'}, 5000);
      await r.arrayBuffer();
      times.push(performance.now()-t0);
    } catch(e){ /* count as packet loss */ }
  }
  return times;
}

function calcJitter(times){
  if(times.length<2) return 0;
  let sum=0;
  for(let i=1;i<times.length;i++) sum+=Math.abs(times[i]-times[i-1]);
  return sum/(times.length-1);
}

async function measureDownloadMbps(){
  const bytes=10*1024*1024; // 10 MB
  const url=`https://speed.cloudflare.com/__down?bytes=${bytes}&nc=${Date.now()}`;
  const t0=performance.now();
  try {
    const r=await fetchWithOpts(url, {cache:'no-store'}, 40000);
    const data=await r.arrayBuffer();
    const elapsed=(performance.now()-t0)/1000;
    return (data.byteLength*8)/elapsed/1e6; // Mbps
  } catch(e){ return null; }
}

async function measureUploadMbps(){
  const bytes=2*1024*1024; // 2 MB
  const body=new Uint8Array(bytes);
  const url='https://speed.cloudflare.com/__up?nc='+Date.now();
  const t0=performance.now();
  try {
    const r=await fetchWithOpts(url, {method:'POST',body,cache:'no-store',headers:{'Content-Type':'application/octet-stream'}}, 40000);
    if(!r.ok) return null;
    const elapsed=(performance.now()-t0)/1000;
    return (bytes*8)/elapsed/1e6; // Mbps
  } catch(e){ return null; }
}

async function runNetConnectionTest(){
  if(netConnTesting) return;
  netConnTesting=true;
  netConnLastRun=Date.now();
  try {
    // 1. Fetch metadata (IP, ISP, server location, HTTP protocol)
    let meta={};
    try {
      const r=await fetchWithOpts('https://speed.cloudflare.com/meta', {cache:'no-store'}, 10000);
      if(r.ok) meta=await r.json();
    } catch(e){}

    // 2. Latency measurements (10 pings)
    const latencies=await pingLatencies(10);
    const packetLoss=((10-latencies.length)/10)*100;
    const avgLatency=latencies.length ? latencies.reduce((a,b)=>a+b,0)/latencies.length : null;
    const jitter=calcJitter(latencies);

    // 3. Download / Upload speed
    const downloadMbps=await measureDownloadMbps();
    const uploadMbps=await measureUploadMbps();

    netConnCache={meta, latencies, avgLatency, jitter, packetLoss, downloadMbps, uploadMbps, timestamp:Date.now(), error:false};
  } catch(e){
    netConnCache={error:true, timestamp:Date.now()};
  } finally {
    netConnTesting=false;
  }
}

const PROXIES=[
  u=>u,
  u=>'https://api.codetabs.com/v1/proxy/?quest='+encodeURIComponent(u),
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u=>'https://cors.isomorphic-git.org/'+u
];

function proxyOrder(provider){
  if(provider==='aws') return [2,0,3,1];
  return (provider==='adobe' || provider==='follett') ? [1,0,2,3] : [0,1,2,3];
}

async function fetchWithTimeout(url, timeout=15000){
  const controller=new AbortController();
  const timer=setTimeout(()=>controller.abort(), timeout);
  try {
    return await fetch(url,{signal:controller.signal});
  } finally {
    clearTimeout(timer);
  }
}

async function getText(url, provider){
  let err;
  for(const idx of proxyOrder(provider)){
    try {
      const r=await fetchWithTimeout(PROXIES[idx](url));
      if(!r.ok) throw new Error(String(r.status));
      return await r.text();
    } catch(e){ err=e; }
  }
  throw err;
}

async function getJson(url, provider){
  const t=await getText(url, provider);
  return JSON.parse(t.replace(/^﻿/,''));
}

function stripHtml(txt){
  return String(txt||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
}

function eventTimeValue(item){
  const candidates=[
    item?.updated_at,
    item?.created_at,
    item?.display_at,
    item?.started_at,
    item?.start,
    item?.start_time,
    item?.timestamp,
    item?.time,
    item?.date
  ];
  for(const value of candidates){
    if(value==null) continue;
    if(typeof value==='number' && Number.isFinite(value)) return value>1e12 ? value : value*1000;
    const parsed=Date.parse(String(value));
    if(Number.isFinite(parsed)) return parsed;
  }
  return 0;
}

function latestUpdateBody(event){
  const updates=[
    ...(Array.isArray(event?.incident_updates) ? event.incident_updates : []),
    ...(Array.isArray(event?.updates) ? event.updates : [])
  ];
  if(!updates.length) return '';
  updates.sort((a,b)=>eventTimeValue(a)-eventTimeValue(b));
  const latest=updates[updates.length-1] || {};
  return stripHtml(latest.body || latest.text || latest.description || latest.summary || '');
}

function latestUpdateRawText(event){
  const updates=[
    ...(Array.isArray(event?.incident_updates) ? event.incident_updates : []),
    ...(Array.isArray(event?.updates) ? event.updates : [])
  ];
  if(!updates.length) return '';
  updates.sort((a,b)=>eventTimeValue(a)-eventTimeValue(b));
  const latest=updates[updates.length-1] || {};
  return String(latest.text || latest.body || latest.description || latest.summary || '').trim();
}

function mostRecentEvent(events){
  if(!Array.isArray(events) || !events.length) return null;
  return [...events].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a))[0] || events[0];
}

function mk(name,ind,title,body,updated,url,labelOverride,labels=[]){
  return {name,ind,label:labelOverride||LABELS[ind]||'Unknown',title,body,updated,url,labels:Array.isArray(labels)?labels:[]};
}

function errSvc(s){
  return {name:s.name,ind:'unknown',label:'Stale / Unknown',title:'Cannot reach status API',body:'We are currently unable to reach the status API. Check the status page manually.',updated:'—',url:s.hu};
}

function adobeSeverityToIndicator(sev, impact){
  const value=String(sev || impact || '').toLowerCase().trim();
  if(!value || value==='none' || value==='na' || value==='n/a') return 'none';
  if(/maint|scheduled/.test(value)) return 'maintenance';
  if(/major|critical|sev1|sev2|outage|down/.test(value)) return 'major';
  if(/minor|degrad|partial|sev3|sev4|performance/.test(value)) return 'minor';
  return 'minor';
}

function isOpenAdobeStatus(status){
  const s=String(status||'').toLowerCase().trim();
  return !!s && !['closed','resolved','complete','completed','cancelled','canceled'].includes(s);
}

async function fetchOne(s){

    const connVia=m.httpProtocol||'Unknown';

    const network=m.asOrganization||(m.asn ? `ASN ${m.asn}` : 'Unknown');

    const latMs=fmt(c.avgLatency,0);

    const plPct=fmt(c.packetLoss,0);
    const dlMbps=fmt(c.downloadMbps);
    const ulMbps=fmt(c.uploadMbps);
    const latArr=(c.latencies||[]).map(t=>t.toFixed(0)+'ms').join(' · ')||'—';
    const body=`<div class="net-grid">

  </div>

    <div class="net-metric"><span class="net-metric-val">${latMs}</span><span class="net-metric-lbl">Latency<br>ms</span></div>
    <div class="net-metric"><span class="net-metric-val">${jitMs}</span><span class="net-metric-lbl">Jitter<br>ms</span></div>
    <div class="net-metric"><span class="net-metric-val">${plPct}%</span><span class="net-metric-lbl">Packet<br>Loss</span></div>
  </div>

    const result=mk(s.name,'none','Net Connection',body,new Date(c.timestamp).toLocaleString(),s.hu);
    result.noMini=true;

  if(s.p==='adobe'){
    try {
      const [registry, events]=await Promise.all([getJson(s.su, s.p), getJson(s.iu, s.p)]);
      const ccEntry=Object.values(registry?.clouds||{}).find(c=>String(c?.name||'').toLowerCase()==='creative cloud');
      const ccId=ccEntry?.id;
      if(!ccId) return mk(s.name,'major','Adobe source format changed','Could not locate Creative Cloud in Adobe status registry.',new Date().toLocaleString(),s.hu);

      const active=[];
      const collectActive=(collection, kind)=>{
        Object.values(collection||{}).forEach(item=>{
          if(!item?.clouds || !(ccId in item.clouds)) return;
          const hist=item.history || {};
          const keys=Object.keys(hist).sort((a,b)=>Number(a)-Number(b));
          const last=keys.length ? hist[keys[keys.length-1]] : null;

          const ind=kind==='maintenance'

            : adobeSeverityToIndicator(last?.severity || item.severity, last?.customerImpact || item.customerImpact);

  if(s.p==='follett'){

      let ind='none';
      if(d.generalStatus==='issues') ind='minor';
      else if(d.generalStatus==='maintenance') ind='maintenance';

        else if(/maintenance/.test(statusBarText)) ind='maintenance';

  if(s.p==='azure'){
    try {

      const americasTable=extractAzureAmericasTable(html);
      if(!americasTable){
        return mk(s.name,'unknown','Azure status format changed','Could not locate the Americas status table.',new Date().toLocaleString(),s.hu);
      }
      const {labels, impactedRows}=parseAzureAmericasStatus(americasTable);
      if(!labels.length){
        return mk(s.name,'unknown','Azure status format changed','No status labels found in the Americas table.',new Date().toLocaleString(),s.hu);
      }
      const hasCritical=labels.some(label=>/critical/i.test(label));
      const hasWarning=labels.some(label=>/warning|degraded|disrupted/i.test(label));
      if(!hasCritical && !hasWarning){
        return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
      }
      if(hasCritical||hasWarning){
        const ind=hasCritical ? 'major' : 'minor';
        const top=impactedRows[0];
        const severity=top?.labels?.find(label=>/critical|warning|degraded|disrupted/i.test(label));
        const title=top?.serviceName ? `${top.serviceName} (${severity||'Issue'})` : 'Americas Service Issue Detected';
        return mk(s.name,ind,title,'Monitoring Azure Americas status table only.',new Date().toLocaleString(),s.hu);
      }
      return mk(s.name,'none','','',new Date().toLocaleString(),s.hu);
    } catch { return errSvc(s); }
  }

  if(s.p==='cloudflare'){
    try {
      const [sd,id,cd,md]=await Promise.all([
        getJson(s.su, s.p),
        s.iu ? getJson(s.iu, s.p).catch(()=>({incidents:[]})) : Promise.resolve({incidents:[]}),
        s.cu ? getJson(s.cu, s.p).catch(()=>({components:[]})) : Promise.resolve({components:[]}),
        s.mu ? getJson(s.mu, s.p).catch(()=>({scheduled_maintenances:[]})) : Promise.resolve({scheduled_maintenances:[]})
      ]);
      let ind='none';
      const updated=sd?.page?.updated_at ? new Date(sd.page.updated_at).toLocaleString() : new Date().toLocaleString();

      const targetGroups=['north america','cloudflare sites and services'];
      const components=cd?.components||[];
      const targetGroupIds=new Set(
        components
          .filter(c=>c.group && targetGroups.includes(String(c.name||'').toLowerCase().trim()))
          .map(c=>c.id)
      );
      const northAmericaGroupId=components.find(c=>c.group && String(c.name||'').toLowerCase().trim()==='north america')?.id;
      const watched=components.filter(c=>targetGroupIds.has(c.id) || targetGroupIds.has(c.group_id));
      const watchedIds=new Set(watched.map(c=>c.id));
      const cloudflareComponentIndicator=(component)=>{
        const base=componentStatusToIndicator(component?.status);
        if(base==='none' || base==='maintenance' || base==='unknown') return base;
        const isNorthAmericaChild=!!northAmericaGroupId && component?.group_id===northAmericaGroupId;
        if(isNorthAmericaChild || hasRerouteSignal(component?.name, component?.description)) return 'rerouting';
        return base;
      };
      const affectedNorthAmerica=watched
        .filter(c=>c.group_id===northAmericaGroupId && cloudflareComponentIndicator(c)!=='none')
        .sort((a,b)=>((PRI[cloudflareComponentIndicator(a)]||9)-(PRI[cloudflareComponentIndicator(b)]||9)) || a.name.localeCompare(b.name));

      if(watched.length){
        const worst=watched.reduce((max,c)=>{
          const ci=cloudflareComponentIndicator(c);
          return (PRI[ci]||9) < (PRI[max]||9) ? ci : max;
        }, 'none');
        ind=worst;
      } else {
        ind=normalizeIndicator(sd?.status?.indicator||'none');
      }

      const active=(id?.incidents||[]).filter(x=>{
        if(!['investigating','identified','monitoring'].includes((x.status||'').toLowerCase())) return false;
        if(!x.components?.length) return true;
        return x.components.some(c=>watchedIds.has(c.id));
      });
      const activeMaintenance=(md?.scheduled_maintenances||[]).filter(x=>{
        if(!['in_progress','verifying','monitoring'].includes((x.status||'').toLowerCase())) return false;
        if(!x.components?.length) return true;
        return x.components.some(c=>watchedIds.has(c.id));
      });

      let title='', body='', labelOverride='';
      let hasRerouteNotice=false;
      const extraStatuses=[];
      if(active.length){
        const sortedActive=[...active].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a));
        const a=sortedActive[0];
        if(ind==='none'){
          const impact=normalizeIndicator(a.impact||'none');
          if(impact!=='none') ind=impact;
        }
        const incidentSummaries=sortedActive.map(evt=>{
          let desc=latestUpdateBody(evt);
          if(!desc) desc=stripHtml(evt.description||'');
          return {name:evt.name||'Service Disruption', desc};
        });
        if(sortedActive.some(evt=>hasRerouteSignal(evt.name, evt.impact, evt.status, evt.description, latestUpdateBody(evt)))){
          hasRerouteNotice=true;
          if(ind==='minor') ind='none';
        }
        title=incidentSummaries[0].name;
        body=incidentSummaries[0].desc;
        if(incidentSummaries.length>1){
          const rest=incidentSummaries.slice(1).map(evt=>`• ${evt.name}${evt.desc ? ` — ${evt.desc}` : ''}`).join('<br>');
          body=`${body ? `${body}<br><br>` : ''}<strong>Additional active incidents:</strong><br>${rest}`;
        }
      }

      if(activeMaintenance.length){
        extraStatuses.push('Maintenance');
        const maintSummaries=[...activeMaintenance].sort((a,b)=>eventTimeValue(b)-eventTimeValue(a)).map(evt=>{
          const desc=latestUpdateBody(evt) || stripHtml(evt.body || 'Cloudflare is performing ongoing maintenance.');
          return {name:evt.name||'Ongoing maintenance', desc};
        });
        if(ind!=='major') ind='maintenance';
        if(!title) title=maintSummaries[0].name;
        if(!body) body=maintSummaries[0].desc;
        const maintLines=maintSummaries.map(evt=>`• ${evt.name}${evt.desc ? ` — ${evt.desc}` : ''}`).join('<br>');
        body=`${body ? `${body}<br><br>` : ''}<strong>Active maintenance events:</strong><br>${maintLines}`;
      }

      if(affectedNorthAmerica.length){
        if(ind==='minor' && affectedNorthAmerica.every(c=>cloudflareComponentIndicator(c)==='minor') && hasRerouteSignal(title, body)){
          hasRerouteNotice=true;
          ind='none';
        }
        const impactsList=affectedNorthAmerica
          .map(c=>`• ${c.name}: ${LABELS[cloudflareComponentIndicator(c)]||'Impacted'}`)
          .join('<br>');

        if(!title){
          title=`${affectedNorthAmerica.length} non-operational North America status${affectedNorthAmerica.length===1?'':'es'}`;
        }
        body=`${body ? `${body}<br><br>` : ''}<strong>North America affected areas:</strong><br>${impactsList}`;
      } else if(watched.length && ind!=='none' && !title){
        const topIssue=watched
          .filter(c=>cloudflareComponentIndicator(c)!=='none')
          .sort((a,b)=>((PRI[cloudflareComponentIndicator(a)]||9)-(PRI[cloudflareComponentIndicator(b)]||9)) || a.name.localeCompare(b.name))[0];
        if(topIssue){
          title=`${topIssue.name} is ${LABELS[cloudflareComponentIndicator(topIssue)]||'impacted'}`;
          body='Monitoring Cloudflare Sites and Services + North America categories only.';
          labelOverride=cloudflareStatusLabel(topIssue.status);
        }
      }
      if(ind==='rerouting'){
        hasRerouteNotice=true;
        ind='none';
      }
      if(!labelOverride && watched.length){
        const top=watched
          .filter(c=>componentStatusToIndicator(c.status)!=='none')
          .sort((a,b)=>((PRI[componentStatusToIndicator(a.status)]||9)-(PRI[componentStatusToIndicator(b.status)]||9)) || a.name.localeCompare(b.name))[0];
        if(top) labelOverride=cloudflareStatusLabel(top.status);
      }
      if(hasRerouteNotice){
        extraStatuses.push('Re-routed');
        if(!labelOverride && ind==='none') labelOverride='Operational';
      }
      const statusLabels=[...new Set(extraStatuses.filter(Boolean))];
      return mk(s.name,ind,title,body,updated,s.hu,labelOverride,statusLabels);
    } catch { return errSvc(s); }
  }

  try {
    const [sd,id]=await Promise.all([
      getJson(s.su, s.p),
      s.iu ? getJson(s.iu, s.p).catch(()=>({incidents:[]})) : Promise.resolve({incidents:[]})
    ]);
    let ind=normalizeIndicator(sd?.status?.indicator||'none');
    const updated=sd?.page?.updated_at ? new Date(sd.page.updated_at).toLocaleString() : new Date().toLocaleString();
    const active=(id?.incidents||[]).filter(x=>['investigating','identified','monitoring'].includes((x.status||'').toLowerCase()));
    let title='', body='';
    if(active.length){
      const a=mostRecentEvent(active) || active[0];
      if(ind==='none'){
        const impact=normalizeIndicator(a.impact||'none');
        if(impact!=='none') ind=impact;
      }
      title=a.name||'';
      let desc=latestUpdateBody(a);
      if(!desc) desc=stripHtml(a.description||'');
      body=desc;
    }
    return mk(s.name,ind,title,body,updated,s.hu);
  } catch { return errSvc(s); }
}

function logoSources(svc){
  const sources=[];
  const companyDomain=LOGO_DOMAINS[svc.name] || '';
  const statusHost=(svc.url||'').replace(/^https?:\/\//,'').replace(/\/$/,'');

  if(companyDomain){
    sources.push(`https://logo.clearbit.com/${companyDomain}`);
    sources.push(`https://icons.duckduckgo.com/ip3/${companyDomain}.ico`);
    sources.push(`https://www.google.com/s2/favicons?domain=${encodeURIComponent(companyDomain)}&sz=64`);
  }
  if(statusHost){
    sources.push(`https://icons.duckduckgo.com/ip3/${statusHost}.ico`);
    sources.push(`https://www.google.com/s2/favicons?domain=${encodeURIComponent(statusHost)}&sz=64`);
  }
  return [...new Set(sources.filter(Boolean))];
}

function nextLogo(img){
  const sources=(img.dataset.sources||'').split('|').filter(Boolean);
  const idx=Number(img.dataset.idx||'0')+1;
  if(idx>=sources.length){
    img.style.display='none';
    if(img.nextElementSibling) img.nextElementSibling.style.display='inline';
    return;
  }
  img.dataset.idx=String(idx);
  img.src=sources[idx];
}

// Returns the iOS-style snap size for a widget based on incident text volume.
// Grid uses 4 rows per page so mini (no-incident) = 1 row ≈ half the old normal height.
// Sizes: 1×1 mini (no incidents), 1×2 normal, 2×2 expanded-wide, 1×3 expanded-tall, 2×4 large.
function getCardSize(svc, cols){
  // Special widget (e.g. Net Connection): always 2-wide × 2-tall (normal footprint)
  if(svc.noMini && svc.ind==='none') return {spanCol:Math.min(2,cols), spanRow:2};
  // No incidents, not a special widget → mini half-size card
  if(svc.ind==='none') return {spanCol:1, spanRow:1};
  const score=(svc.title||'').length+(svc.body||'').length+(svc.label||'').length*0.7+(svc.labels||[]).join(' ').length*1.6;
  if(score<130 || cols<2) return {spanCol:1, spanRow:2};  // normal
  if(score<320) return {spanCol:2, spanRow:2};             // expanded wide
  if(score<620) return {spanCol:1, spanRow:3};             // expanded tall
  return {spanCol:2, spanRow:4};                           // large — full page column
}

// Pack items into pages of `cols × rows` cells, respecting each item's span.
// Returns an array of pages; each page is an array of items with added
// gridCol, gridRow (1-based), spanCol, spanRow properties.
function packToPages(items, cols, rows){
  const pages=[];
  let grid, placed;
  function reset(){ grid=Array.from({length:rows},()=>Array(cols).fill(false)); placed=[]; }
  reset();

  function findPos(w,h){
    for(let r=0;r<=rows-h;r++){
      for(let c=0;c<=cols-w;c++){
        let ok=true;
        for(let dr=0;dr<h&&ok;dr++) for(let dc=0;dc<w&&ok;dc++) if(grid[r+dr][c+dc]) ok=false;
        if(ok) return [r,c];
      }
    }
    return null;
  }
  function mark(r,c,w,h){ for(let dr=0;dr<h;dr++) for(let dc=0;dc<w;dc++) grid[r+dr][c+dc]=true; }

  for(const item of items){
    let sc=Math.min(item.spanCol,cols);
    let sr=Math.min(item.spanRow,rows);
    let pos=findPos(sc,sr);
    if(!pos){ pages.push(placed); reset(); pos=findPos(sc,sr); }
    // If still no fit (shouldn't happen), shrink to 1×1
    if(!pos){ sc=1; sr=1; pos=findPos(1,1); }
    if(pos){
      mark(pos[0],pos[1],sc,sr);
      placed.push({...item,spanCol:sc,spanRow:sr,gridRow:pos[0]+1,gridCol:pos[1]+1});
    }
  }
  if(placed.length) pages.push(placed);
  return pages;
}

function mkCard(svc, delay){
  const d=document.createElement('div');
  const isMini=svc.ind==='none' && !svc.noMini;
  d.className=`card ${CC[svc.ind]||''}${isMini?' mini':''}`;
  d.style.animationDelay=delay+'ms';
  d.style.setProperty('--tile-delay', delay+'ms');
  if(svc.url) d.addEventListener('click',()=>window.open(svc.url,'_blank','noopener'));

  const color=LABEL_COLOR[svc.ind]||'var(--sub)';
  const blockCls=BLOCK_CLS[svc.ind]||'ok-block';
  const incTitle=svc.ind==='none' ? (svc.title||'No incidents') : (svc.title||svc.label);
  const incBody=svc.ind==='none' ? (svc.body||'All systems operating normally.') : (svc.body||'See the status page for full details.');
  const urlHost=svc.url ? svc.url.replace(/^https?:\/\//,'').replace(/\/$/,'') : '';
  const logos=logoSources(svc);
  const fallback=(svc.name||'?').trim().charAt(0).toUpperCase();
  const labels=[svc.label, ...(svc.labels||[])].filter((v,i,a)=>v && a.indexOf(v)===i);
  const statusLabels=labels.length>1 ? `<div class="status-labels">${labels.map(label=>`<span class="status-label">${label}</span>`).join('')}</div>` : '';
  const densityScore=(incTitle.length*1.5)+(incBody.length)+(labels.join(' ').length*1.2);
  if(densityScore>320) d.classList.add('dense');

  // Mini cards only show the top bar (icon + name + badge); incident block is hidden via CSS
  d.innerHTML=`
    <div class="card-top">
      <div class="card-title-row">
        <div class="c-icon ${IC[svc.ind]||'ok'}">${logos.length ? `<img class="c-logo" src="${logos[0]}" data-sources="${logos.join('|')}" data-idx="0" alt="${svc.name} logo" onerror="nextLogo(this)">` : ""}<span class="c-fallback" style="display:${logos.length?'none':'inline'}">${fallback || ICONS[svc.ind] || "?"}</span></div>
        <div class="c-name-block">
          <div class="c-name">${svc.name}</div>
          ${!isMini && urlHost ? `<a class="c-url" href="${svc.url}" target="_blank" rel="noopener" onclick="event.stopPropagation()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="10" height="10"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>${urlHost}</a>` : ''}
        </div>
      </div>
      <div class="c-badge ${IC[svc.ind]||'ok'}">${svc.label}</div>
    </div>
    ${isMini ? '' : `
    <div class="card-div"></div>
    <div class="inc-block ${blockCls}">
      <div class="inc-label" style="color:${color}"><span class="inc-label-dot" style="background:${color}"></span>${svc.ind==='none'?'Current Status':svc.ind==='rerouting'?'Traffic Notice':'Active Incident'}</div>
      ${statusLabels}
      <div class="inc-title">${incTitle}</div>
      <div class="inc-body">${incBody}</div>
    </div>
    <div class="card-meta">
      <div class="meta-updated"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Updated ${svc.updated}</div>
      <div class="meta-tag">${svc.ind==='none' ? '100% uptime' : svc.ind==='maintenance' ? 'Scheduled' : svc.ind==='rerouting' ? 'Rerouted' : 'Investigating'}${(svc.labels||[]).length>1 ? ' · Multi-status' : ''}</div>
    </div>`}`;
  return d;
}

let cur=0, rTimer=null, pTimer=null, pStart=0, pageAnimTimer=null, pageAnimating=false;
const ROT_MS=60000;

let refreshFailCount=0;
let lastSuccessfulRefresh=null;
let isRefreshing=false;

function setRefreshing(on){
  isRefreshing=on;
  const sp=document.getElementById('refresh-spinner');
  if(sp) sp.classList.toggle('active', on);
}

function setStale(on){
  const badge=document.getElementById('stale-badge');
  if(badge) badge.classList.toggle('show', on);
}

function goPage(idx){
  const pages=[...document.querySelectorAll('.page')];
  if(!pages.length) return;
  if(pageAnimating) return;
  idx=((idx%pages.length)+pages.length)%pages.length;

  [...document.querySelectorAll('.pdot')].forEach((d,i)=>d.classList.toggle('active',i===idx));

  if(idx===cur){
    resetProg();
    return;
  }

  pageAnimating=true;
  const prev=cur;
  const forward=(idx>prev) || (prev===pages.length-1 && idx===0);
  const outgoing=pages[prev];
  const incoming=pages[idx];
  const enterCls=forward?'enter-next':'enter-prev';
  const leaveCls=forward?'leave-next':'leave-prev';

  clearTimeout(pageAnimTimer);
  pages.forEach(p=>p.classList.remove('enter-next','enter-prev','leave-next','leave-prev'));
  outgoing.classList.add(leaveCls);

  incoming.classList.add('active', enterCls);
  incoming.querySelectorAll('.card').forEach(card=>{
    card.classList.remove('tile-in','tile-out');
    card.classList.add('tile-in');
  });

  pageAnimTimer=setTimeout(()=>{
    outgoing.classList.remove('active', leaveCls);
    outgoing.querySelectorAll('.card').forEach(card=>card.classList.remove('tile-in','tile-out'));
    incoming.classList.remove(enterCls);
    incoming.querySelectorAll('.card').forEach(card=>card.classList.remove('tile-in','tile-out'));
    pageAnimating=false;
  }, 620);

  cur=idx;
  resetProg();
}

function resetProg(){
  clearInterval(pTimer);
  const fill=document.getElementById('prog-fill');
  pStart=Date.now();
  fill.style.width='0%';
  pTimer=setInterval(()=>{ fill.style.width=Math.min(100,(Date.now()-pStart)/ROT_MS*100)+'%'; },300);
}

function startRot(n){
  clearInterval(rTimer);
  if(n>1) rTimer=setInterval(()=>goPage((cur+1)%n),ROT_MS);
}

function updateIncidentPin(data){
  const pin=document.getElementById('incident-pin');
  if(!pin) return;

  const active=data
    .filter(s=>s.ind!=='none' && s.ind!=='unknown')
    .sort((a,b)=>{
      const pd=(PRI[a.ind]||9)-(PRI[b.ind]||9);
      return pd!==0 ? pd : a.name.localeCompare(b.name);
    });

  pin.className='incident-pin show';

  if(!active.length){
    pin.innerHTML='<span class="pin-chip chip-none"><span class="pin-dot"></span>All Systems Operational</span>';
    return;
  }

  pin.innerHTML=active.map(s=>`<span class="pin-chip chip-${s.ind||'unknown'}"><span class="pin-dot"></span>${s.name}</span>`).join('');
}


function updateStats(data){
  const ok=data.filter(s=>s.ind==='none').length;
  const wn=data.filter(s=>s.ind==='minor').length;
  const bd=data.filter(s=>s.ind==='major').length;
  const mt=data.filter(s=>s.ind==='maintenance').length;
  const rt=data.filter(s=>s.ind==='rerouting').length;
  const un=data.filter(s=>s.ind==='unknown').length;
  document.getElementById('n-ok').textContent=ok;
  document.getElementById('n-warn').textContent=wn;
  document.getElementById('n-bad').textContent=bd;
  document.getElementById('n-maint').textContent=mt;
  document.getElementById('n-reroute').textContent=rt;
  document.getElementById('n-unknown').textContent=un;

  const statReroute = document.getElementById('stat-reroute');
  if(rt>0) statReroute.classList.add('show');
  else statReroute.classList.remove('show');

  const statUnknown = document.getElementById('stat-unknown');
  if(un>0) statUnknown.classList.add('show');
  else statUnknown.classList.remove('show');

  const fmeta=document.getElementById('f-meta');
  if(fmeta) fmeta.textContent='Updated '+new Date().toLocaleTimeString('en-US',{hour12:true,hour:'numeric',minute:'2-digit',second:'2-digit'})+'  ·  '+SVCS.length+' services monitored';
}

async function init(){
  if(isRefreshing) return; // don't overlap concurrent refreshes
  setRefreshing(true);

  const wrap=document.getElementById('grid-wrap');
  const dotsEl=document.getElementById('pdots');

  let results;
  try {
    results=await Promise.all(SVCS.map((s,i)=>new Promise(res=>setTimeout(()=>fetchOne(s).then(res).catch(()=>res(errSvc(s))), i*120))));
  } catch(e) {
    refreshFailCount++;
    if(refreshFailCount>=2) setStale(true);
    setRefreshing(false);
    return;
  }

  // Successful fetch
  refreshFailCount=0;
  lastSuccessfulRefresh=Date.now();
  setStale(false);
  setRefreshing(false);

  // Attach category and flags from SVCS and alert on status changes
  const svcCatMap=Object.fromEntries(SVCS.map(s=>[s.name, s.cat||'app']));
  const svcNoMiniMap=Object.fromEntries(SVCS.map(s=>[s.name, !!(s.noMini)]));
  results.forEach(s=>{
    s.cat=svcCatMap[s.name]||'app';
    s.noMini=svcNoMiniMap[s.name]||false;
    const prev=window._pi[s.name];
    // don't alert for unknown transitions
    if(prev && prev==='none' && (s.ind==='minor' || s.ind==='major')){
      const kind=s.ind==='major' ? 'outage' : 'degraded';
      queueAlert(s, kind);
    } else if(prev && (prev==='minor' || prev==='major') && s.ind==='none'){
      queueAlert(s, 'restored');
    }
    window._pi[s.name]=s.ind;
  });
  updateStats(results);
  updateIncidentPin(results);

  const W=wrap.clientWidth || 1280;
  const H=wrap.clientHeight || 640;
  const GAP=12;
  const SECTION_HDR_H=32;
  const cols=W>=1600 ? 4 : W>=960 ? 3 : 2;
  const rowsPerPage=4; // 4 rows: mini (no-incident) cards = 1 row, normal = 2 rows, expanded = 3, large = 4
  const CARD_H=Math.floor((H - GAP*(rowsPerPage-1)) / rowsPerPage);
  // Header pages: same row count, cards slightly shorter to fit the section label
  const hdrAvailH=H - SECTION_HDR_H - GAP;
  const CARD_H_HDR=Math.floor((hdrAvailH - GAP*(rowsPerPage-1)) / rowsPerPage);
  // A "normal" card occupies 2 rows; compact if that height is small
  const normalCardH=CARD_H*2+GAP;
  const compactCards=normalCardH<260;
  const perPage=cols*rowsPerPage; // same card count on all pages

  // Group and sort each category independently
  const sort=(arr)=>[...arr].sort((a,b)=>{
    const pd=(PRI[a.ind]||9)-(PRI[b.ind]||9);
    return pd!==0 ? pd : a.name.localeCompare(b.name);
  });
  const makeGroup=(label, items)=>{
    const sorted=sort(items);
    const issues=sorted.filter(s=>s.ind!=='none' && s.ind!=='unknown').length;
    const hasOutage=sorted.some(s=>s.ind==='major');
    const hasDegraded=sorted.some(s=>s.ind==='minor' || s.ind==='rerouting');
    return {label, items:sorted, issues, hasOutage, hasDegraded};
  };
  const groups=[
    makeGroup('Applications & Platforms', results.filter(s=>s.cat==='app')),
    makeGroup('Infrastructure',           results.filter(s=>s.cat==='infra'))
  ].filter(g=>g.items.length);

  // Compute iOS-style snap size for every item then bin-pack into pages
  groups.forEach(g=>{
    g.items=g.items.map(s=>({...s,...getCardSize(s,cols)}));
  });

  const pages=[];
  for(const group of groups){
    const packed=packToPages(group.items,cols,rowsPerPage);
    packed.forEach((pageCards,idx)=>{
      pages.push({
        header:idx===0?group.label:null,
        headerMeta:idx===0?{issues:group.issues,hasOutage:group.hasOutage,hasDegraded:group.hasDegraded}:null,
        cards:pageCards
      });
    });
  }
  const totalPages=pages.length;

  clearInterval(rTimer); clearInterval(pTimer);
  wrap.innerHTML=''; dotsEl.innerHTML=''; cur=0; pageAnimating=false;

  pages.forEach((pageData, p)=>{
    const pg=document.createElement('div');
    pg.className=`page ${p===0?'active':''}`;
    // Always use the full column count so spanning works correctly
    pg.style.gridTemplateColumns=`repeat(${cols}, 1fr)`;

    // Row offset: pages with a section header reserve row 1 for the header label
    const rowOffset=pageData.header ? 1 : 0;

    if(pageData.header){
      // Explicit rows: header row + rowsPerPage card rows
      pg.style.gridTemplateRows=`${SECTION_HDR_H}px ${Array(rowsPerPage).fill(CARD_H_HDR+'px').join(' ')}`;
      const hdr=document.createElement('div');
      hdr.className='section-hdr';
      const meta=pageData.headerMeta||{};
      let badge='';
      if(meta.issues>0){
        const cls=meta.hasOutage?'outage':meta.hasDegraded?'degraded':'maint';
        badge=`<span class="section-hdr-badge ${cls}">${meta.issues} issue${meta.issues!==1?'s':''}</span>`;
      } else {
        badge=`<span class="section-hdr-badge ok">All clear</span>`;
      }
      hdr.innerHTML=`<span>${pageData.header}</span>${badge}`;
      pg.appendChild(hdr);
    } else {
      pg.style.gridTemplateRows=`${Array(rowsPerPage).fill(CARD_H+'px').join(' ')}`;
    }

    pageData.cards.forEach((s,i)=>{
      const card=mkCard(s,i*30);
      // Place card at its packed position and apply CSS span
      card.style.gridColumn=`${s.gridCol} / span ${s.spanCol}`;
      card.style.gridRow=`${s.gridRow+rowOffset} / span ${s.spanRow}`;
      // Add iOS-style size class for body-line and typography overrides
      if(s.spanCol===2 && s.spanRow===2) card.classList.add('span-large');
      else if(s.spanRow===2) card.classList.add('span-tall');
      else if(s.spanCol===2) card.classList.add('span-wide');
      if(compactCards) card.classList.add('compact');
      pg.appendChild(card);
    });
    wrap.appendChild(pg);

    if(totalPages>1){
      const dot=document.createElement('div');
      dot.className=`pdot ${p===0?'active':''}`;
      dot.title=`Page ${p+1} of ${totalPages}`;
      dot.addEventListener('click',()=>{ clearInterval(rTimer); goPage(p); startRot(totalPages); });
      dotsEl.appendChild(dot);
    }
  });

  document.getElementById('prog-track').style.display=totalPages>1 ? '' : 'none';
  startRot(totalPages);
  if(totalPages>1) resetProg();
}

// Retry every 30s when stale; no-ops immediately when data is fresh
let refreshInterval = null;
function scheduleRefresh(){
  clearInterval(refreshInterval);
  refreshInterval = setInterval(()=>{ if(refreshFailCount>=2) init(); }, 30000);
}

// Screen Wake Lock — keeps the display on in kiosk mode
let wakeLock = null;
async function requestWakeLock(){
  if(!('wakeLock' in navigator)) return;
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    wakeLock.addEventListener('release', () => { wakeLock = null; });
  } catch(e) { /* silently ignore — not critical */ }
}

window.addEventListener('DOMContentLoaded',()=>{
  const testBtn=document.getElementById('test-alert-btn');
  if(testBtn) testBtn.addEventListener('click', runAlertTest);

  window.addEventListener('pointerdown', primeAudio, {once:true, passive:true});
  window.addEventListener('keydown', primeAudio, {once:true});

  let idleTimer;
  const resetIdleTimer = () => {
    document.body.classList.remove('idle');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
      document.body.classList.add('idle');
    }, 3000);
  };
  window.addEventListener('mousemove', resetIdleTimer);
  window.addEventListener('mousedown', resetIdleTimer);
  window.addEventListener('keydown', resetIdleTimer);
  window.addEventListener('touchstart', resetIdleTimer);
  resetIdleTimer();

  window.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowRight' || e.key === 'ArrowDown') {
      const pages = document.querySelectorAll('.page');
      if(pages.length > 1) {
        clearInterval(rTimer);
        goPage(cur + 1);
        startRot(pages.length);
      }
    } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
      const pages = document.querySelectorAll('.page');
      if(pages.length > 1) {
        clearInterval(rTimer);
        goPage(cur - 1);
        startRot(pages.length);
      }
    }
  });

  // Re-acquire wake lock and refresh data when the tab/window becomes visible again
  document.addEventListener('visibilitychange', ()=>{
    if(document.hidden) return;
    // Re-request wake lock (it's released when page is hidden)
    requestWakeLock();
    // If data is stale or it's been a long time since last refresh, update immediately
    const staleThreshold = 3 * 60 * 1000; // 3 minutes
    if(!lastSuccessfulRefresh || Date.now() - lastSuccessfulRefresh > staleThreshold){
      init();
    }
  });

  // Request wake lock on load
  requestWakeLock();

  // Start net connection speed test immediately, then repeat every 10 minutes
  runNetConnectionTest();
  setInterval(()=>{
    if(!netConnTesting && Date.now()-netConnLastRun>=NET_CONN_INTERVAL_MS) runNetConnectionTest();
  }, 60000); // check every minute whether it's time to re-run

  init();
  setInterval(init, 120000); // normal 2-minute refresh cycle
  scheduleRefresh();           // aggressive retry when stale
});
</script>
